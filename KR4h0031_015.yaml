body:
  text: 二程文集卷下附録朱子辨論胡本錯誤書南軒語附近略到城中歸方數日見平父示近間承寄聲存問感感但所論二先生集則愚意不能無疑伯逢主張家學固應如此熹不敢議所不可解者以老兄之聰明博識欽夫之造詣精深而不曉此此可怪耳若此書是文定所著即須依文定本為正今此乃是二先生集但彼中本偶出文定家文定當時亦只是據所傳録之本雖文定蓋不能保其無一字之訛也今别得善本復加補綴乃是文定所欲聞文定復生亦無嫌間不知二兄何苦尚爾依違也此間所用二本固不能盡善亦有灼然却是此間本誤者當時更不曾寫去但只是平氣虛心看得義理通處便當從之豈可肚裏先橫却一箇胡文定後不復信道理邪如定性書及明道叙述上富公與謝帥書中删却數千字及辭官表倒却次序易傳序改沿為泝祭文改姪為猶子之類皆非本文必是文定删改熹看得此數處有無甚害者但亦可惜改却本文蓋本文自不害義理故也叙述及富謝書是也有曲為回互而反失事實害義理者辭表是也欲為回互便是私意害義理矣惟定性書首尾雖非切要之辭然明道謂橫渠實父表弟聞道雖有先後然不應以聞道之故傲其父兄如此語録說二先生與學者語有不合處明道則曰更有商量伊川則直云不是明道氣𧰼如此與今所删之書氣象類乎不類乎且文定答學者書雖有不合亦甚宛轉不至如此無含蓄况明道乎今如此删去不過是減得數十箇閒字而壞却一箇從容和樂底大體氣象恐文定亦是偶然一時意思欲直截發明向上事更不暇照管此等處或是當時未見全本亦不可知今豈可曲意苟從邪向見李先生本出龜山家猶雜以游察院之文比訪得游集乃知其誤以白先生先生歎息曰此書所自來可謂端的猶有此誤况其他又可盡信邪只此便是虛已從善公平正大之心本亦不是難事但今人先著一箇私意橫在肚裏便見此等事為難及耳又猶子二字前論未盡禮記云喪服兄弟之子猶子也言人為兄弟之子喪服猶已之子非所施於平時也况猶字本亦不是稱呼只是記禮者之詞如下文嫂叔之無服姑姊妹之薄也今豈可沿此遂謂嫂為無服而名姑姊妹以薄乎古人固不謂兄弟之子為姪然亦無云猶子者但云兄之子弟之子孫亦曰兄孫耳二先生非不知此然猶從俗稱姪者蓋亦無害於義理也此等處文定既得以一時已見改易二程本文今人乃不得據相傳别本改正文定所改之未安處此何理邪又明道論王霸劄子等數篇胡本亦無乃此間録去有所脫誤非文定之失伊川上仁廟書此間本無後來乃是用欽夫元寄胡家本校亦脫兩句此非以他人本改文定本乃是印本自不曽依得文定本耳似此之類恐是全不曽參照只見人來說自家刻得文字多錯校得不精便一切逆拒之幾何而不為訑訑之聲音顔色距人於千里之外乎夫樂聞過勇遷善有大於此者猶將有望於兩兄不意只此一小事便只如此殊失所望然則區區所以劇論不置者正恐此私意根株消磨不去隨事滋長為害不細亦不專為二先生之文也如必以胡氏之書一字不可改易則又請以一事明之集中與吕與叔論中書注云子居和叔之子胡氏編語録時意其為邢恕之子遂削此注直於正文子居之上加一邢字頃疑吕氏亦有和叔因以書問欽天答云嘗問之邢氏果無子居者以此例之則胡氏之書亦豈能一無謬誤乃欲不問是非一切從之乎况此乃文字間舛誤與其本原節目處初無所妨何必一一遵之而不敢改乎近以文定當立祠於鄉郡說應求邦彥二公皆指其小節疑之魏元履至為扼腕今二兄欲尊師之而又守其尤小節處以為不可改是文定有所謂大者終不見知於當世也此等處非特二先生之文之不幸亦文定之不幸耳今既用官錢刋一部書却全不睹是只守却胡家錯本文字以為至當可謂直截不成議論恐文定之心却須該遍流通决不如是之陋也若說文定决然主張此書以為天下後世必當依此即與王介甫主張三經字說何異作是說者却是謗文定矣設使微似有此亦是克未盡底已私所謂賢者之過橫渠所謂其不善者共改之正所望於後賢不當守已殘而妬道真使其遺風餘弊波蕩於末流也程子嘗言人之為學其失在於自主張太過橫渠猶戒以自處太重無復以來天下之善今觀二兄主張此事得無近此聖賢稽衆舍已兼聽并觀之意似不然也胡子知言亦云學欲約不欲陋此得無近於陋邪如云當於他處别看此尤是不情悠悠之說與月攘一雞何異非小子所敢聞也每恨此道衰微邪說昌熾舉世無可告語者望二兄於千里之外蓋不翅飢渴之於飲食乃不知主意如此偏枯若得從容賓客之後終日正言又不知所以不合者復幾何耳欽夫尊兄不及别狀所欲言者不過如此幸為呈似所言或不中理却望指教熹却不敢憚改也向所録去數紙合改處當時極費心力又且勞煩衆人意以為必依此改正故此間更無别本今既不用切勿毁棄千萬盡為收拾便中寄來當什襲藏之以俟後世耳向求數十本欲遍遺朋友今亦不須寄來熹不敢以此等錯本文字誤朋友也天寒手凍作字不成不能傾竭懷抱惟加察而恕其狂妄可也朱子與劉共夫昨見共殳家問以為二先生集中誤字老兄以為嘗經文定之手更不可改愚意未曉所謂夫文定固有不可改者如尊君父定內外討亂臣誅賊子之大倫大法雖聖賢復出不能改也若文字之訛安知非當時所傳亦有未盡善者而未得善本以正之與至所特改數處竊以義理求之恐亦不若先生舊本之善若如老兄所論則是伊川所謂昔所未遑今不得復作前所未安後不得復正者又將起於今日矣已作共父書詳言之復此具禀更望虛心平氣去彼我之嫌而專以義理求之則於取舍從違之間知所處矣道術衰微俗學淺陋極矣振起之任平日深於吾兄望之忽聞此論大以為憂若每事自主張如此則必無好問察言之理將來任事必有不滿人意處而其流風餘弊又將傳於後學非直一時之害也只如近世諸先達聞道固有淺深涵養固有厚薄擴充運用固有廣狹然亦不能不各有偏倚處但公吾心以玩其氣象自見有當矯革處不可以火濟火以水濟水而益其疾也熹聞道雖晚賴老兄提掖之賜今幸略窺倣佛然於此不能無疑不敢自鄙外於明哲故敢控瀝一盡所言不審尊意以為如何其詳則又具於共父書中幸取而並觀之無怪其詞之太直也與張欽夫不先天而開人各因時而立政胡本天作時欽天云作天字大害事愚謂此言先天與文言之先天不同文言之云先天後天乃是左右參贊之意如左傳云實先後之意思却在中間正合天運不差毫髮所謂啐啄同時也此序所云先天却是天時未至而妄以私意先之若耕穫菑畬之類耳兩先天文同而意不同先天先時却初不異但上言天下言人上言時下言政於文為協耳窺聖人之用心胡本無心字欽夫云著心字亦大害事請深思之愚謂孟子云堯舜之治天下豈無所用其心哉言用心莫亦無害於理否並同上稱姪固未安稱猶子亦不典按禮有從祖從父之名則亦當有從子從孫之目矣以此為稱似稍穩當慮偶及此因以求教非敢復議改先生之文也與富公及謝帥書全篇反覆無非義理卒章之言止是直言義理之效感應之常如易六十四卦無非言吉凶禍福書四十八篇無非言災祥成敗詩之雅頌極陳福祿壽考之盛以歆動其君而告戒之者尤不為少卷阿尤著孟子最不言利然對梁王亦曰未有仁義而遺後其君親者答宋牼亦曰然而不王者未之有也此豈以利害動之哉但人以以私心計之便以為利故不肖者則起貪欲之心賢者則有嫌避之意所趣雖殊然其處心之私則一也若夫聖賢以大公至正之心出大公至正之言原始要終莫非至理又何嫌疑之可避哉若使先生全篇主意専用此說則誠害理矣向所見教同行異情之說於此亦可見矣春秋序兩處觀其語脉文勢似熹所據之本為是先天二字卷中論之詳矣莫無害於理否理既無害文意又協何為而不可從也聖人之用下著心字語意方足尤見親切主宰處下文所謂得其意者是也不能窺其用心則其用豈易言哉故得其意然後能法其用語序然也其精微曲折蓋有不苟然者矣若謂用心非所以言聖人則孟子易傳中言聖人之用心者多矣蓋人之用處無不是心自聖人至於下愚一也但所以用之者有精粗邪正之不同故有聖賢下愚之别不可謂聖人全不用心又不可謂聖人無心可用但其用也妙異乎常人之用耳然又須知即心即用非有是心而又有用之者也别紙伏䝉垂諭向論程集之誤定性書辭官表兩處已蒙收録其他亦多見納用此見髙明擇善而從初無適莫而小人向者妄發之過也然所謂不必改不當改者反復求之又似未能不惑於心輒復條陳以丐指諭夫所謂不必改者豈以為文句之間小小異同無所繫於義理之得失而不必改邪熹所論出於已意則用此說可也今此乃是集諸本而證之按其舊文然後刋正雖或不能一一盡同亦是類㑹數說而求其文勢語氣所趨之便除所謂疑當作某一例之外未嘗敢妄以已意更定一㸃畫也此其合於先生當日本文無疑今若有尊敬重正而不敢忽易之心則當一循其舊不容復有毫髮苟且遷就於其間乃為盡善惟其不爾故字義迂晦者必承誤强說而後通如遵誤作尊今便强說為尊其所聞之類是也語句刓闕者須以意屬讀然後備如嘗食絮羮叱止之無皆字則不成文之類是也此等不惟於文字有害反求諸心則隱微之間得無未免於自欺邪且如吾輩秉筆書事惟務明白其肯故舍所宜用之字而更用他字使人強說而後通邪其肯故為刓闕之句使人屬讀而後備邪人情不大相逺有以知其必不然矣改之不過印本字數稀密不勻不為觀美而他無所害然則胡為而不改也卷子內如此處已悉用朱圈其上復以上呈然所未圈者似亦不無可取方執筆時不能不小有嫌避之私故不能盡此心今人又來督書不容再閲矣更乞詳之可也所謂不當改者豈謂富謝書春秋序之屬而書中所喻沿泝猶子二說又不當改之尤者邪以熹觀之所謂尤不當改者乃所以為尤當改也大抵熹之愚意止是不欲專輒改易前賢文字稍存謙退敬讓之心耳若聖賢成書稍有不愜已意處便率情奮筆恣行塗改恐此氣象亦自不佳蓋雖所改盡善猶啓末流輕肆自大之弊况未必盡善乎伊川先生嘗語學者病其於已之言有所不合則置不復思所以終不能同也楊迪及門二書見集今熹觀此等改字處竊恐先生之意尚有不可不思者而改者未之思也蓋不特已不之思又使後人不復得見先生手筆之本文雖欲思之以逹於先生之意亦不可得此其為害豈不甚哉夫以言乎已則失其恭敬退讓之心以言乎人則啓其輕肆妄作之弊以言乎先生之意則恐猶有未盡者而絶人之思姑無問其所改之得失而以是三者論之其不可已曉然矣老兄試思前聖入太廟每事問存餼羊謹闕文述而不作信而好古深戒不知而作教人多聞闕疑之心為如何而視今日紛更專轍之意氣又為如何審此則於此宜亦無待乎熹之言而决且知熹之所以再三冒瀆貢其所不樂聞者豈好已之說勝得已而不已者哉熹請復論沿泝猶子之說以實前議夫改沿為泝之說熹亦竊聞之矣如此曉破不為無力然所以不可改者蓋先生之言垂世已久此字又無大害義理若不以文詞害其指意則只為沿字而以因字尋字循字之屬訓之於文似無所害而意亦頗覺寬舒必欲改為泝字雖不無一至之得然其氣象却殊迫急似有強探力取之弊疑先生所以不用此字之意或出於此不然夫豈不知沿泝之别而有此謬哉蓋古書沿字亦不皆為順流而下之字也荀子云反鉛察之注云鉛與沿同循也惜乎當時莫或疑而扣之以祛後人之惑後之疑者又不能闕而遽改之是以先生之意終已不明而舉世之人亦莫之思也大抵古書有未安處隨事論著使人知之可矣若遽改之以沒其實則安知其果無未盡之意邪漢儒釋經有欲改易者但云某當作某後世猶或非之况遽改乎且非特漢儒而已孔子刪書血流漂杵之文因而不改孟子繼之亦曰吾於武成取二三策而已終不刋去此文以從已意之便也然熹又竊料改此字者當時之意亦但欲使人知有此意未必不若孟子之於武成但後人崇信太過便慿此語塗改舊文自為失耳愚竊以為此字决當從舊尤所當改若老兄必欲存之以見泝字之有力則請正文只作沿字而注其下云某人云沿當作泝不則云胡本沿作泝不則但云或人可也如此兩存使讀者知用力之方改者無專轍之咎而先生之微音餘韻後世尚有默而識之者豈不兩全其道而無所傷乎猶子之稱謂不當改亦所未喻蓋來教但云姪止是相沿稱之而未見其害義不可稱之意云稱猶子尚庶幾焉亦未見其所以庶幾之說是以愚瞢未能卒曉然以書傳考之則亦有所自來蓋爾雅云女子謂兄弟之子為姪注引左氏姪其從姑以釋之而反覆考尋終不言男子謂兄弟之子為何也以漢書考之二疏乃今世所謂叔姪而傳以父子稱之則是古人直謂之子雖漢人猶然也蓋古人淳質不以為嫌故如是稱之自以為安降及後世則心有以為不可不辨者如是假其所以自名於姑者而稱焉雖非古制然亦得别嫌明微之意而伯父叔父與夫所謂姑者又皆吾父之同氣也亦何害於親親之義哉今若欲從古則直稱子而已若且從俗則伊川橫渠二先生者皆當稱之伊川嘗言禮從宜使從俗有大害義理處則須改之夫以其言如此而猶稱姪云者是必以為無大害於義理故也故其遺文出於其家而其子序之以行於世舉無所謂猶子云者而胡本特然稱之是必出於家庭之所筆削無疑也若曰何故他處不改蓋有不可改者如祭文則有對偶之類是也若以稱姪為非而改之為是亦當從其舊文而附以新意况本無害理而可遽改之乎今所改者出於檀弓之文而彼文止為喪服兄弟之子與已子同故曰兄弟之子猶子也與下文嫂叔之無服也姑姊妹之薄也之文同耳豈以為親屬之定名哉猶即如也其義繫於上文不可殊絶明矣若單稱之即與世俗歇後之語無異若平居假借稱之猶之可也豈可指為親屬之定名乎若必以為是則自我作古别為一家之俗夫亦孰能止之似不必強挽前逹使之同已以起後世之惑也故愚於此亦以為尤所當改以從其舊者若必欲改之則請亦用前例正文作姪注云胡本作猶子則亦可矣春秋序富謝書其說略其卷中不知是否更欲細論以求可否此人行速屢來督書不暇及矣若猶以為疑則亦且注其下云元本有某某若干字庶幾讀者既見當時言意之實又不掩後賢刪削之功其他亦多類此幸賜詳觀即見區區非有偏主必勝之私但欲此集早成完書不誤後學耳計老兄之意豈異於此但恐見理太明故於文意瑣細之間不無濶略之處用心太剛故於一時意見所安必欲主張到底所以紛紛未能卒定如熹則淺暗遲鈍一生在文義上做窠窟苟所見未明實不敢妄為主張農馬智専所以於此等處不敢便承誨諭而不自知其僣易也伏惟稍賜寬假使得盡愚將來改定新本便中幸白共父寄兩本來容更參定箋注求教所以欲兩本者蓋欲留得一本作底以備後復有所得也儻蒙矜恕不録其過而留聽焉不勝幸甚同上右明道先生遺文九篇長沙學官既刻二先生文集後三年新安朱熹復以此寄拭云得之玉山汪應辰敬以授教授何藴俾嗣刻之乾道己丑四月朔廣漢張拭謹書南軒書明道先生遺文後河南二程先生文集憲使楊公已鋟板三山學官遺書外書則庾司舊有之乙未之火與他書俱燬不存諸書雖未能復是書胡可緩師耕承乏此來亟將故本易以大字與文集為一體刻之後圃明教堂賴吾同志相與校訂視舊加密二先生之書於是乎全時淳祐丙午古汴趙師耕書麻沙本後序程氏遺書長沙本最善而字頗小閲歲之久板已漫漶教授王君湜出示五羊本參校既精大字亦便觀覽然無外書襲之乃模鋟於舂陵郡庫又取長沙所刋外書附刻焉願與同志者共學淳祐六年立秋日東川李襲之謹題舂陵本後序右河南程氏遺書外書俱出程門弟子手記考亭朱夫子家藏類訪旁搜先後次第為此世所刋本無不同者獨二先生文集出胡文定公家頗有改削如定性書及明道行述上富公與謝帥書中刪却數十字辭官表之顛倒次第易傳序之改沿為泝祭文之改姪為猶子劉張二公以是本刻之長沙考亭定其所當改者數紙與共父劉帥書及與南軒張子屢書凛然承舛習訛末流波蕩之為懼而卒亦莫之從也今所傳文集大率渾本是固不能無餘論矣臨川談善心元之蚤讀二書慮其傳本寢少悉為刻棗而於文集復加詳審與蜀郡虞槃叔常往復討論以復乎考亭所改之舊且注劉張本異同於其下其餘遺文凡集所未録者各以類附焉至若伊川經說其目見近思録其書見時氏本特易傳止繫辭上篇春秋傳止魯桓九年書解止舜格於文祖詩解止四方以無拂論語解止吾從下恨多誤字不敢臆决惟易繫取吕氏精義所編春秋傳取尹氏纂集所補以舊板本審校先刋而他書則俟求善本讎校續刻此其為意固將以集程氏書文之全明程朱授受之正稽之往哲而不悖傳之來裔而無窮觀此書者如挹座春而立門雪俱非苟然為之也嗚呼元之之用心亦可謂勤也已裝褫成帙家學人誦謹緝大意書於左方至治二年壬戌之秋七月既望臨川後學鄒次陳謹書周二程張邵書豫以朝昭德讀書志校之周子通書一卷明道中庸解一卷程氏易一卷書說一卷詩說兩卷論語說十卷孟子解十四卷伊川集二十卷程氏雜說十卷張子正蒙書十卷漁樵問對一卷信聞紀一卷孟子解十四卷易說十卷春秋說一卷橫渠崇文集十卷邵子皇極經世十二卷觀物篇六卷擊壤集二十卷凡十九部一百五十四卷所謂程氏雜說十卷者疑即朱子所謂諸公各自為書散出并行之一者也而遺書所録不見其目朱子因其先人舊藏益以類訪為遺書二十五卷又為外書十二卷益多雜說數倍而雜說固不傳合朝氏所記與今所傳續蓋可見矣然今所傳本皆家藏故書數十年前所刻就令刻板具在意且漫漶廢棄不少矣清廟雅樂姑以備數而鄭衛之聲人爭愛之則此日少而彼日多者亦其勢然也近年始有新刻邵子書聞風而起者或誚為迂濶且笑之宜黃談善心同邑傳君友諒之同人也奮然不顧取二程遺書文集刻之且將考訂程氏經說以次鋟木槃託中表之好乃得預聞其說喜其事之有成而學者得以傳讀先儒之遺文而不倦其卓然之見良有可取故題其後以勉同志之士云蜀郡後學虞槃二程文集附録卷下

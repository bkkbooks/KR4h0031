body:
  text: 二程文集卷二明道文集二宋程皓撰奏疏表論王霸之辨臣伏謂得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者霸者之事也王道如砥本乎人情出乎禮義若履大路而行無復回曲霸者﨑嶇反側於曲徑之中而卒不可與入堯舜之道故誠心而王則王矣假之而霸則霸矣二者其道不同在審其初而已易所謂差若毫釐繆以千里者其初不可不審也故治天下者必先立其志正志先立則邪說不能移異端不能惑故力進於道而莫之禦也苟以霸者之心而求王道之成是衒石以為玉也故仲尼之徒無道桓文之事而曽西恥比管仲者義所不由也况下於霸者哉陛下躬堯舜之資處堯舜之位必以堯舜之心自任然後為能充其道漢唐之君有可稱者論其人則非先王之學考其時則皆駁雜之政乃以一曲之見幸致小康其創法垂統非可繼於後世者皆不足為也然欲行仁政而不素講其具使其道大眀而後行則或出或入終莫有所至也夫事有大小有先後察其小忽其大先其所後後其所先皆不可以適治且志不可慢時不可失惟陛下稽先聖之言察人事之理知堯舜之道備於已反身而誠之推之以及四海擇同心一德之臣與之共成天下之務書所謂尹躬暨湯咸有一德又曰一哉王心言致一而後可以為也古者三公不必備惟其人誠以為不得其人而居之則不若闕之之愈也蓋小人之事君子所不能同豈聖賢之事而庸人可參之哉欲為聖賢之事而使庸人參之則其命亂矣既任君子之謀而又入小人之議則聰明不専而志意惑矣今將救千古深錮之弊為生民長久之計非夫極聽覽之明盡正邪之辨致一而不二其能勝之乎或謂人君舉動不可不慎易於更張則為害大矣臣獨以為不然所謂更張者顧理所當耳其動皆稽古質義而行則為慎莫大焉豈若因循苟簡卒致敗亂者哉自古以來何嘗有師聖人之言法先王之治將大有為而返成禍患者乎願陛下奮天錫之勇智體乾剛而獨斷霈然不疑則萬世幸甚熙寧二年上時為監察御史裏行論遣張載按獄臣伏聞差著作佐郎張載往明州推勘苖振公事竊謂載經術德義久為士人師法近侍之臣以其學行論薦故得召對䝉陛下親加延問屢形天奬中外翕然知陛下崇尚儒學優禮賢俊為善之人孰不知勸今朝廷必欲究觀其學業詳試其器能則事周有繫教化之本源於治政之大體者儻使之講求議論則足以盡其所至夫推案詔一作訟獄非謂儒者之不當為臣今所論者朝廷待士之道爾蓋試之以治獄雖足以見其鈎深練核之能攻摘斷擊之用正可試諸能吏非所以盡儒者之事業徒使四方之人謂朝廷以儒術賢業進人而以獄吏之事試之則抱道修潔之士益難自進矣於朝廷尊賢取士之體將有所失況苖振罪犯明白情狀已具得一公平幹敏之人便足了事伏乞朝廷别賜選差貴全事體謹具狀奏聞熙寧二年閏十一月上時為監察御史裹行論君道一作上殿劄子臣伏謂君道之大在乎稽古正學明善惡之端辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心誠意擇善而固執之也夫義理不先盡則多聽而易惑志意不先定則守善而或移惟在以聖人之訓為必當從先王之治為必可法不為後世駁雜之政所牽制一作滯不為流俗因循之論所遷惑自知極於明信道極於篤一本此句在上句上任賢勿二去邪勿疑必期致世如三代之隆而後已也然天下之事患常生於忽微而志亦戒乎漸習是故古之人君雖出入從容閒燕必有誦訓針諫之臣左右前後無非正人所以成其德業伏願陛下禮命老成賢儒不必勞以職事俾曰親便座講論道義以輔養聖德又擇天下賢俊使得陪侍法從朝夕延見開陳善道講磨治體以廣聞聽如是則聖智益明王猷允塞矣今四海靡靡日入偷薄末俗嘵嘵無復亷恥蓋亦朝廷尊德樂道一作義之風未孚而篤誠忠厚之教尚鬱也惟陛下稽聖人之訓法先王之治一一作正心誠意體乾剛健而力行之則天下幸甚請修學校尊師儒取士劄子臣伏謂治天下以正風俗得賢才為本宋興百餘年而教化未大醇人情未盡美士人微謙退之節鄉閭無亷恥之行刑雖繁而奸不止官雖冗而材不足者此蓋學校之不修師儒之不尊無以風勸養勵之使然耳竊以去聖久逺師道不立儒者之學幾於廢熄惟朝廷崇尚教育之則不日而復古者一道德以同俗苟師學不正則道德何從而一方今人執私見家為異說支離經訓無復統一道之不明不行乃在於此臣謂宜先禮命近侍賢儒各以類舉及百執事方嶽州縣之吏悉心推訪凡有明先王之道德業充備足為師表者其次有篤志好學材良行修者皆以名聞其髙蹈一作尚之士朝廷當厚禮延聘其餘命州縣敦遣萃於京師館之寬閒之宇豐其廪餼恤其家之有無以大臣之賢典領其事俾羣儒朝夕相與講明正學其道必本於人倫明乎物理其教自小學灑掃應對以往修其孝悌忠信周旋禮樂其所以誘掖激勵漸摩成就之道皆有節序其要在於擇善修身至於化成天下自鄉人而可至於聖人之道其學行皆中於是者為成德又其次取材識明達可進於善者使日受其業稍久則舉其賢傑以備髙任擇其學業大明德義可尊者為大學之師次以分教天下之學始自藩府至於列郡擇士之願學民之俊秀者入學皆優其廪給而蠲其身役凡其有父母骨肉之養者亦通其優遊往來以察其行其大不率教者斥之從役漸自大學及州郡之學擇其道業之成可為人師者使教於縣之學如州郡之制異日則十室之鄉達於黨遂皆當修其庠序之制為之立師學者以次而察焉縣令每歲與學之師以鄉飲之禮㑹其鄉老學者衆推經明行修材能可任之士升於州之學以觀其實學荒行虧者罷歸而罪其吏與師其升於州而當者復其家之役郡守又歲與學之師行鄉飲酒之禮大㑹郡士以經義性行材能三物賔興其士於太學太學又聚而教之其學不明行不修與材之下者罷歸以為郡守學師之罪升於大學者亦聽其以時還鄉里復來於學太學歲論其賢者能者於朝謂之選士朝廷問之經以考其言試之職以觀其材然後辨論其等差而命之秩凡處郡縣之學與太學者皆滿三歲然後得充薦其自州郡升於太學者一歲而後薦其有學行超卓衆所信服者雖不處於學或處學而未久亦得備數論薦凡選士之法皆以性行端潔居家孝悌有亷恥禮遜通明學業曉達治道者在州縣之學則先使其鄉里長老次及學衆推之在太學者先使其同黨次及博士推之其學之師與州縣之長無或専其私苟不以實其懷㚥罔上者師長皆除其仕籍終身不齒失者亦奪官二等勿以赦及去職論州縣之長蒞事未滿半歲者皆不薦士師皆取學者成否之分數為之賞罰凡公卿大夫之子弟皆入學在京師者入太學在外者各入其所在州之學謂之國子其有當補䕃者並如舊制惟不選於學者不授以職每歲諸路别言一路國子之秀者升於太學其升而不當者罪其監司與州郡之司太學歲論國子之有學行材能者於朝其在學賔興考試之法皆如選士國子自入學中外通及七年或太學五年年及三十以上所學不成者辨而為二等上者聽授以管庫之任自非其後學業修進中於論選則不復使親民政其下者罷歸之雖歲滿願留學者亦聽其在外學七歲而不中升選者皆論致太學而考察之為二等之法國子之大不率教者亦斥罷之凡有職任之人其學業材行應薦者諸路及近侍以聞處之太學其論試亦如選士之法取其賢能而進用之凡國子之有官者中選則增其秩臣謂既一以道德仁義教養之又専以行實材學升進去其聲律小碎糊名謄録一切無義理之弊不數年間學者靡然丕變矣豈惟得士浸廣天下風俗將日入醇正王化之本也臣謂帝王之道莫尚於此願陛下特留宸意為萬世行之熙寧元年上時為監察御史裏行諫新法疏熙寧二年三月四日臣近纍上言乞罷預借青苖錢利息及汰去提舉官事朝夕以覬未䝉施行臣竊謂明者見於未形智者防於未亂况今日事理顯白易知若不因機亟決持之愈堅必貽後悔悔而後改則為害已多蓋安危之本在乎人情治亂之機繫乎事始衆心暌乖則有言不信萬邦協和則所為必成固不可以威力取强言語必勝而近日所聞尤為未便伏見制置條例司疏駁大臣之奏舉劾不奉行之官徒使中外物情愈致驚駭是乃舉一偏而盡沮公議因小事而先失一作動衆心權其輕重未見其可臣竊謂陛下固已燭見事體究知是非在聖心非吝改張由柄臣尚持固必是致輿情大鬱衆論益歡若欲遂行必難終濟伏望陛下奮神明之威斷審成敗之先機與其遂一失而廢百為孰若沛大恩而新衆志外汰使人之擾亟推去息之仁况糶糴之法兼行則儲蓄之資自廣在朝廷未失於舉措使議論何名而沸騰伏乞檢㑹臣所上言再賜施行則天下幸甚時為監寨御史裏行上語及程皓疏安石曰皓至中書臣略諭以方鎮沮毁朝廷法令朝廷申明使知法意不得謂之疏駮大臣章奏皓乃言大臣論列事當包含此言尤為害理若不申明意法意使中外具知則是縱使邪說誣民而令詔令本更不眀於天下如此則異議何由帖息再上疏熙寧三年四月十七日臣聞天下之理本諸簡易而行之以順道則事無不成故曰智者若禹之行水行其所無事也捨而之於險阻則不足以言智矣蓋自古興治雖有専任獨決能就事功者未聞輔弼大臣人各有心暌戾不一致國政異出名分不正中外人情交謂不可而能有為者也况於措置失冝沮廢公議一二小臣實與大計用賤陵貴以邪妨正者乎凡此皆天下之理不冝有成而智者之所不行也設令由此僥幸事小有成而興利之臣日進尚德之風浸衰尤非朝廷之福矧復天時未順地震連年四方人心日益搖動此皆陛下所當仰測天意俯察人事者也臣奉職不肖議論無補望允前奏早賜降責時權監察御史裏行由是罷為權發遣京西路同提典刑獄辭西京提刑奏狀臣伏䝉聖恩差權發遣京西路提㸃刑獄已瀝懇誠不敢祗受願從竄謫日冀允俞不避煩瀆輒再陳請臣出自冗散過䝉陛下拔擢置在言責伏自供職已來每有論列惟知以憂國愛君為心不敢以揚已矜衆為事陛下亮其愚直每加優容故常指陳安危辨析邪正知人主不當自聖則未嘗為諂諛之言知人臣義無私交則不忍為阿黨之計明則陛下幽則鬼神臣之微誠實仰臨照然臣學術寡陋智識濶疏徒有捧土之心曽微回天之力近以力陳時政之失併論大臣之非不能裨補聖明是臣隳廢職業既已抗章自劾屏居俟命豈意刑書未正而恩典過頒使臣粗知亷隅必不敢䝉恥願就如其見利忘義靦面受之陛下有臣如此亦將安用况臺諫之任朝廷綱紀所憑使不以言之是非皆得進職而去臣恐綱紀自此弛廢臣雖無狀敢以死請伏望陛下開白日之照厲嚴霜之刑投諸荒陬實所甘分臣無任瀝血祈天之至熙寧三年四月上上謂王安石曰人情如此紛紛奈何安石曰陳襄程皓専黨吕公著都無助陛下為治之實今當邪說紛紛之時乃用襄知制誥皓提㸃刑獄人稱其平正此輩小人若附公著得行其志則天下之利皆歸之既不得志又不失陛下奬用可為肯退聽而不為善乃以為僉書鎮寧軍節度判官事論十事劄子師傅兵役六官民食經界四民鄉黨川澤貢士分數臣竊謂聖人創法皆本諸人情極乎物理雖二帝三王不無隨時因革踵一作稱事增損之制然至乎為治之大原牧民之要道則前聖後聖豈不同條而共貫哉蓋無古今無治亂如生民之理有窮則聖人之法可改後世能盡其道則大治或用其偏則小康此厯代彰灼著明之效也茍或徒知泥古而不能施之於今姑欲循名而遂廢其實此則陋儒之見何足以論治道哉然儻謂今人之情皆已異於古先王之迹不可復於今趣便目前不務髙逺則亦恐非大有為之論而未足以濟當今之極弊也謂如衣服飲食宫室器用之類茍便於今而有法度者豈亦遽當改革哉惟其天理之不可易人所賴以生非有古今之異聖人之所必為者固可槩舉然行之有先後用之有緩速若夫裁成運動周旋曲當則在朝廷講求設施如何耳古者自天子達於庶人必須師友以成就其德業故舜禹文武之聖亦皆有所從學今師傅之職不修友臣之義未著所以尊德樂善之風未成於天下此非有古今之異者也王者必奉天建官故天地四時之職厯二帝三王未之或改所以百度修而萬化理也至唐猶僅存其略當其治時尚得綱紀小正今官秩淆亂職業廢弛太平之治所以未至此亦非有古今之異也天生蒸民立之君使司牧之必制其恆産使之厚生則經界不可不正井地不可不均此為治之大本也唐尚能有口分授田之制今則蕩然無法富者跨州縣而莫之止貧者流離餓莩而莫之恤幸民雖多而衣食不足者蓋無紀極生齒曰益繁而不為之制則衣食日蹙轉死日多此乃治亂之機也豈可不漸圖其制之之道哉此亦非有古今之異者也古者政教始乎鄉里其法起於比閭族黨州鄉鄼遂以相聨屬統治故民相安而親睦刑法鮮犯亷恥易格此亦人情之所自然行之則效亦非有古今之異者也庠序之教先王所以明人倫化成天下今師學廢而道德不一鄉射亡而禮樂不興貢士不本於鄉里而行實不修秀民不養於學校而人材多廢此較然之事亦非有古今之異者也古者府史胥徒受祿公上而兵農未始判也今驕兵耗匱國力亦已極矣臣謂禁衛之外不漸歸之於農則將貽深慮府史胥徒之役毒遍天下不更其制則未免大患此亦至明之理非有古今之異者也古者民必有九年之食無三年之食者以為國非其國臣觀天下耕之者少食之者衆地力不盡人功不勤雖富室强宗鮮有餘積况其貧弱者乎或一州一縣有年歲之凶即盜賊縱橫饑羸滿路如不幸有方三二千里之灾或連年之歉則未知朝廷以何道處之則其患不可勝言矣豈可曰昔何久不至是因以幸為可恃也哉固宜漸從古制均田務農公私交為儲粟之法以為之傋此亦無古今之異者也古者四民各有常職而農者十居八九故衣食易給而民無所苦困今京師浮民數逾百萬游手不可資度觀其窮蹙辛苦孤貧疾病變詐巧僞以自求生而常不足以生曰益歲滋久將若何事已窮極非聖人能變而通之則無以免患豈可謂無可奈何而已哉此在酌古變今均多恤寡漸為之業以救之耳此亦非有古今之異者也聖人奉天理物之道在乎六府六府之任治於五官山虞澤衡各有常禁故萬物阜豐而財用不乏今五官不修六府不治用之無節取之不時豈惟物失其性林木所資天下皆已童赭斧斤焚蕩尚且侵尋不禁而川澤漁獵之繁暴殄天物亦已耗竭則將若之何此乃窮弊之極矣惟修虞衡之職使將養之則有變通長久之勢此亦非有古今之異者也古者冠婚喪祭車服器用等差分别莫敢踰僣故財用易給而民有恆心今禮制未修奢靡相尚卿大夫之家莫能中禮而商販之類或踰王公禮制不足以檢飭人情名數不足以旌别貴賤既無定分則奸詐攘奪人人求厭其欲而後已豈有止息者哉此爭亂之道也則先王之法豈得不講求而損益哉此亦非有古今之異者也此十者特其端緒耳臣特論其大端以為三代之法有必可施行之驗如其綱條度數施為注措之道則審行之必也稽之經訓而合施之人情而宜此曉然之定理豈徒若迂疏無用之說哉惟聖明裁擇論養賢劄子臣竊以議當代者皆知得賢則天下治而未知所以致賢之道也是雖衆論紛然未極其要朝廷亦以行之為艱而不為也三代養賢必本於學而德化行焉治道出焉本朝踵循唐舊而館閣清選止為文字之職名實未正欲招賢養材以輔時贊化將何從而致之也臣厯觀古先哲王所以虛已求治何嘗不盡天下之才以成已之德也故曰大舜有大焉善與人同樂取於人以為善今天下之大豈為乏賢而朝廷無養賢之地以容徐察其器實髙下而進退之也臣今欲乞朝廷設延英院以待四方之賢凡公論推薦及巖穴之賢必招致優禮視品給俸而不可遽進以官止以應詔命名凡有政治則委之詳定凡有典禮則委之討論經畫得以奏陳而治亂得以講究也俾羣居切磨日盡其材行其志使政府及近侍之臣互與相接陛下時賜召對詔以治道可觀其材識器能也察以纍歲人品益分然後使賢者就位能者任職或委付郡縣或師表士儒其德業尤異漸進以帥臣職司之任為輔弼為公卿無施之不稱也若是則引彚並進野無遺賢陛下尊賢待士之心可謂無負於天下矣取進止謝澶州簽判表論議無補職業不修國有典刑罪在誅戮曲䝉𢎞貸仰荷鴻私期於糜捐莫可報謝中謝臣性質朴魯學術空虛志意粗修智識無取陛下講圖大政博謀羣材過聽侍臣之言猥加風憲之任臣既遭遇明聖亦思誓竭疲駑惟知直道以事君豈忍曲學而阿世屢進濶疏之論愧非擊搏之才徒嘗刳瀝肺肝曽無裨補毫髮既不能繩愆糾繆固不願沽直買名豈敢冒寵以居惟是奉身而退自劾之章繼上闔門之請突堅天意未回憲章尚屈更奉發中之詔俾分提憲之權不惟沮諍論之風亦懼廢賞刑之實力形奏述恭俟誅夷此蓋伏遇皇帝陛下極天清明普日照臨洞正邪之心迹辨真僞於幽微察臣忠誠恕臣狂直不忍置諸重辟投之逺荒解其察視之官處以便安之地生成之賜義固等於乾坤涵容之恩重益逾於山嶽臣敢不日新素學力蹈所知秉心不回信道愈篤願狥小夫之志不為儒者之羞或能自進於尋常庶可仰酬於萬一二程文集卷二

body:
  text: 二程文集卷八伊川文集三宋程頤撰學制三學看詳文元祐元年五月一三學制看詳舊制公私試試上舍補內舍蓋無虛月皆糊名考校排定髙下煩勞費用不可勝言於學者都無所益學校禮義相先之地而月使之爭殊非教養之道今立法改試為課更不考定髙下只輪番請召學生當面下㸃抹教其未至所貴有益學者不失庠序之體舊制考察行藝以不犯罰為行試在髙等為藝有注官免省試免解三等旌擢今不用舊考察法只於內舍推擇才學行藝為衆所稱者升為上舍上舍學行才器堪為時用者長二狀其行能聞於朝廷一三學制看詳太學舊制博士二人同講一經論語孟子又置學諭分講聖人之道雖一而治經家法各有不同二人同講一經則學者所從不一今立法置博士十人六人分講六經餘四人分講論語孟子講大經終者却講小經諸經輪互講說有專經者亦許通那一律學制看詳律學之設蓋欲居官者知為政之方其未出官及未有官人且當專意經術並令入太學乃學古入官之義今立法到吏部人方許入律學一武學制看詳所治經書有三略六韜尉繚子鄙淺無取今減去却添入孝經論語孟子左氏傳言兵事一三學制看詳舊來條制有期親尊長服不許應舉後來改法雖祖父母喪亦許應舉夫尊祖之義人道之本若許居喪進取深害義理今立法學生遭祖父母喪給長假行服貢舉條貫乞朝廷指揮修改論改學制事目一舊來博士只是講說考校不治學事所以别置正録十員今已立法博士分治學事及增置職事人其正録並合減罷所減罷官乞與比類差遣俸給如舊及依元條年限改官一舊制八十齊每齊三十人學生以二千四百人為額每齊五間容三十人極甚迫窄至兩人共一卧榻暑月難處遂更互請假出外學者失所如此而願留者止為解額優寬而已今欲以七間為一齊容三十人除學官職事人及諸般占使外可為五十齊所容千五百人在朝廷廣教之意雖為未足而齊舍未能遽增所容止可如此若朝廷選通儒為教導之官去利誘來實學之士人數雖減成才必多一國學解額嘉祐以前一百人自元豐後欲得舉人入學遂設利誘之法改作太學解額五百人又患來者遽去復立一年之限以拘留之近日朝廷知其非便已改去逐次科場一年之限然而人數歲歲增添以外處解名比之五百人額當有萬餘人奔凑使萬餘人捨父母之養忘骨肉之愛往來道路旅寓他土人心日偷士風日薄所費財幾何所破産幾何少年子弟逺父兄而放蕩者幾何父母骨肉離别悲念以至失所者幾何以萬餘人聚之京師弊害不可勝言今欲量留一百人解額以待在學者取應餘四百人分在州郡解額窄處自然士人各安鄉土養其孝愛之心息其奔趨流浪之志風俗亦當稍厚况人於鄉里行迹易知冒濫之弊因而少革一近年編修敕條並立看詳要見刪改因依今來國子監敕令是有司所行條貫已立看詳外有三學制皆是庠序之事與他處條貫體面不同今來條立所存舊文甚少觀文可見義理乞更不立看詳回禮部取問狀凖尚書禮部帖子仰國子監修太學條制手分依下項所問事理具印狀送尚書禮部一本部看詳創法有司推行之際須有條目事實方可經久施行今來尊賢立堂待賓吏師立齊並繫創立即未見得祭酒司業以下如何延請尊禮學録以下如何供億條目合有幾其人在學若干歲月朝廷如何進用又待賓吏師二齊不言無人即虛若無其人未委合與不合亦虛勘㑹學制尊賢堂以延天下道德之士學者所矜式者長二以下尊禮之學録一人專主供億無其人則虛之所謂道德之士不必逺引古者以近時言之如胡太常瑗張著作載邵推官雍之輩所居之鄉學者不逺千里而至願一識其面一聞其言以為模楷有如此之人至於京師則長二造門求見道學者願得矜式之意延請居於堂中或一至或時來或淹留旬時不可必其久速也不獨學者得以矜式而已又以見長二之為教不敢足諸已既上求古之人復博采今之士取善服義如恐不及乃為教之大本化人之要道如此待之即是尊禮所謂供億只是灑掃堂室供給飲膳學録專主所貴整肅不須更立條目待賓吏師體皆相類無人則虛理自當爾只於一處立文自可見矣一看詳文稱朝廷廣教之意不當有限只於齊舍立定可容人數每齊改為七間繫咸二十四齊止容一千六百餘人即是立限比舊更窄又條稱三舍每齊七楹其看詳文却稱七間為一齊有此間架不同又稱舊制每齊五間至兩人共一卧榻暑月難處未見得今來各展兩間設與不設三十卧榻其大學見今屋宇若依新立條貫一齊七間修截得若干齊舍有無妨闕又條稱若學行著聞及曾得解人並免試使入內舍如何容著勘㑹看詳文稱朝廷廣教之意不當有限蓋謂不當立定二千四百人之限若逐齊人數自是據地位所容難為強使之多齊舍多少則繫朝廷處之雖使未及徐圗之可也蓋無立定限數之意若不恤齊舍寬窄苟欲人數之多使學者不安其居乃是徒為美觀不務實事非聖朝立事之意所稱每齊七楹則是七間别無間架不同見今學舍除學官職事人及諸般占使外可為五十餘齊每齊置三十卧榻並是量度丈尺算計可容舊來常是二人或有三人共一榻不惟暑月難處兼䙝瀆至甚其學行著聞及曾得解人免試入學逐齊人數自定即無容著不得之理一舊制考行藝以不犯罰為行試在髙等為藝今來看詳文稱不用舊考察法只於內舍推擇才學行藝為衆所稱者升為上舍上舍學行才器堪為時用者長二狀其行能聞於朝廷未見得長二如何推擇及狀其行能其條目事實各合如何聞於朝廷如何推恩又既不用舊法考察若曾犯罰及課曾在退等合與不合推擇如推擇有不當及生員在齊供課代筆竊用他人文字如何防察勘㑹舊考察法專據文簿計校等差所以今來立法只委長二以公議推擇凡所推擇一繫長二鑒裁長二公明與否則繫朝廷所任用在朝廷豈可不信所任用而專考驗於案籍自古推賢進善未聞如此今但取學行才器堪為時用者聞於朝廷所推恩數自繫朝廷裁處有司不當立法所狀行能各隨人之所有難為更立條目既推學行才器之人推擇不當自有論如律之文更不須繁文勘㑹犯罰退等之類其在齊供課明有長諭察視不得交互課卷之文兼供課與舊來公私試不同别無升黜自少代筆竊用之事有則自當罰格若更苛細曲為防間甚失庠序之體一舉人及仕宦家子弟鬬毆使酒等本監採察牒開封府或本貫施行本部看詳條稱仕宦家子弟據文即雖作工商諸色在公之人其家各曾仕宦及見仕宦亦是仕宦家子弟如何却令國子監採察若本監止是採察仕宦家子弟為舉人者即今來立文未盡又稱舉人及仕宦家子弟據文即舉人家子弟亦在其中若本監不採察舉人家子弟即立文亦是未盡兼看詳假有舉人本貫是廣南因游學在西川若有犯牒與本貫施行有無迂枉本所勘㑹監敕稱舉人及仕宦家子弟蓋是兩般猶言舉人若仕宦家子弟也凡文若是一事而言及者必須以重及輕未有以輕及重者豈有先言舉人以及仕宦之理如或以為不明即可改及為若古者四民各世其業後世法度不立失守易業仕族之貴而為工商雜類者有矣此朝廷當禁而未能者固未嘗立文許其然也既流落入於非類豈復能責其士人行檢况自來條制凡為品官家立法皆是仕族之體未嘗更開說若為工商之類時則如何也略舉一二事以為證如舊衣服令五品以上子孫婚聽假以爵辨即不言若充軍及遭黥杖者之類許假與否又雜令品官家雖不請券並聽入驛即不言子弟為卒僕乞丐者之類許入驛與否此蓋大體立法不可亦謂之立文不盡欲厚風教當由仕族始所以立法之意欲并包仕族子弟若指定為舉人者則年少學業未成或治家不暇應舉者皆不及也所云牒開封府或本貫施行或者疑辭量可而行爾安得便見迂枉必云牒本貫者蓋人之惡最恥聞於鄉里立文所以為警且暴一罪而使之一鄉知戒所益甚大一新制稱四方士人願觀光者掌儀引入游覽堂舍觀禮儀聽絃誦唯不得入齊願觀光者既不得入齊即未見得於何處觀禮儀聽絃誦又其觀聽繫在何時若願觀光者無時得入即掌儀疲於接引亦非學校之體若限以時則新制無法又言士人願觀講說者聽堂上相見今看詳願觀講說者未見令何人引入如何相見若願觀之人衆至位次不足如何序齒如何令坐皆未有法本所勘㑹太學首善之地將以流化天下從來賓客不得過客位天下之士徒聞朝廷有學而不得見其規制視其法度所以今來立觀光之法觀學者出入往來少長有敘威儀濟濟即是觀禮儀行廊廡之間聞諸齊絃誦之聲即是聽絃誦自可使觀光之士以為盛談流傳天下何必須入齊中及更立處所學制通客之時自有明文即無無時得入之說所謂掌儀疲於引接亦無是理以太學之大掌儀八人之多又早晚不許通客不當升堂掌禮之時常輪一人延接四方之士極非過當設使美化大行願觀者衆數時之間不過數番而已樂使人嚮善者固不憚其煩也况又更休願觀講說者即是賓客明有學制門吏白直學後報所見之人相見自有常儀坐位自有爵齒不須煩文往年胡博士瑗講易常有外來請聽者多或至千數人孫殿丞復說春秋初講旬日間來者莫知其數堂上不容然後謝之立聽户外者甚衆當時春秋之學為之一盛至今數十年傳為美事一合支用條制所不載者長二裁度支破今要見如何裁度支破因何刪去舊條比類二字本所勘㑹本監支費隨宜應用條制豈能具載舊條長二審量比類支給若須比類必多拘礙或無類例亦須裁度所以立法但云裁度刪去比類二字用比類字則關防之意多去二字則委付之意重朝廷之任長二自當有體論禮部看詳狀准都省送下禮部狀看詳三學制國子監敕勒送國子監長二與元修官同共再行看詳已於某月日與長二同狀供去訖竊慮朝廷只見禮部一面辭說未盡見元初立法之意今却將禮部看詳事節逐一開析如後一學制尊賢堂待賓齊吏師齊等先准禮部帖子取問修條制所今來尊賢立堂待賓吏師立齊即未見得祭酒以下如何延請尊禮學録以下如何供億條目各合有幾其人在學若干歲月朝廷如何進用本所為見禮部所問與立法意全不相似遂逐一開析供答今來送到禮部看詳所駁之事却已改換了前來所難之意却稱學士大夫有賢可尊朝廷自當褒顯以勸多士不應有遺却於學校立法俟其自至京師然後祭酒以下延請尊禮再詳所駁依前誤認立法之意雖是朝廷褒顯之士苟未大用何妨學校延請何必須待朝廷所遺方得尊禮不應有遺之說大非朝廷用心雖古盛治之世賢才並用尚旁求博采未嘗敢言已無遺也又云若一至或時來或淹留旬時殆非尊禮之實亦恐道德之士出處去來不應如此此蓋因禮部取問其人在學若干歲月故本所如此供答大意謂道德之士一見其人足以矜式一聞其言足以興起得其一至猶足為益况淹久乎或速或久繫其人所處之勢固難必也如此尊賢之道可謂至矣而禮部以為非尊禮之實不知如何乃謂之實也夫與人為善君子所樂亂國之聘夫子亦往從太學之禮請而云道德之士出處去來不應如此似不知君子出處之道本所供答禮部狀稱全文具回禮部取問狀內今來禮部看詳引所供狀只至矜式而已字便住將一段文義中間截斷要切義理都將刪去又云尊賢堂稱無人則虛待賓吏師二齊不言無人則虛有司無所執守切緣學制是學校之事將付之儒臣以治學者與尋常吏文不同今來禮部蓋欲全用吏文若使吏人以吏文格之則新修之學制皆不可用一禮部看詳四方士人願觀光一事但云難議施行不言所以伏乞朝廷詳酌一禮部看詳舊法每齊五間容三十人不聞有訴窄狹者今新立條制每齊展為七間止容得一千六百餘人有八百餘人須至遣出勘㑹自來暑月齊舍中難處須至更互請假出外今年尤甚應是在學已及一年可以應舉者往往遷出朝廷立定齊舍間數豈有學者自訴窄狹之理今來立定逐齊所容人數之法亦須乘學者稀少之時漸次修展某年只幾人豈有一旦遣出之事以至增添牀榻皆有法度並是據間架丈尺算計不惟寬涼兼是齊整又云即是齊舍數目未有定論夫今日所設學官職事人及其餘事皆是且據今日學舍為之安用須立數目定論太平日久則文風益盛學者益衆故唐至貞觀六年以後學生增至三千二百異日朝廷美化大行事力克盛學生之員增至唐生員之數未為過也何必須要立定數目一三舍升補推擇法禮部所駁最詳竊以舊法惟三舍升補一事最為未便天下人所以議論言者所以為言朝廷所以重修及爭競之端獄訟之興皆由於此而禮部乃云三舍升補法為最完密不可以廢則禮部用意可見其看詳云行法以來至今七年得推恩授官才一人其中選艱難又如此夫朝廷養士唯欲成材之多豈以艱難為貴以二千人之衆七年之久通其去來不知幾千人矣應授官者才一人何其少也正由書行藝考察之法不可用爾夫人之美行天之尊爵莫過於仁義忠信樂善不倦不知前日有書此而䝉考察者乎又云今來一切略去此法惟令長二推擇行藝衆所稱者升為上舍緣行藝若無法考驗即無事實可據恐人情不服别致爭訟夫案文責跡有司之事非庠序育材論秀之道且立之以格考之以文則人案跡以求差殊爭心所以起也授之賢才重其委任則人無辭以犯分義訟所以息也今以專任長二為不可是不知治體之甚古之時天子擇宰相而任之政宰相擇諸司長官而委之治諸司長官各擇其屬而授以事治功所以成也後世朝廷授法必達乎下長官守法而不得有為前日考察之法是也始於諸齊而由正録博士以及長二諸齊所取學官就其中而論之不得有易也學官所考長二就其中而論之不得有易也易之則按文責跡入於罪矣是事成於下而下得以制其上此後世所以不治也今欲朝廷專任長二長二自委之屬官以達於下取舍在長二則上下之體順而各得致其功先王為治之道也難者必曰長二得人則善矣或非其人不若使防間詳密上下相制為可循守也此世俗鄙論烏足以言治道先王制法待人而行未聞立不得人之法也苟長二非人不知教育之道徒守虛文密法果足以成人才乎自古以來未有如是而能成治者也一禮部看詳博士十人六人分講六經四人分講論語孟子難以施行今詳禮部所駁之意却是不知太學有四堂自來分講諸經四處各講論語孟子又云諸經輪互講說若治經家法不同愈見紛亂夫人講一經則終一經是一家之學比之人講一授安得却為紛亂又云一人日專一經不惟已勞如有疾故在假月日稍久不免别那博士代講學者所從亦安能一博士之職比之他官極為清簡日講書一授不足為勞人專一經所從自一若疾病稍久或他事故則出無可奈何不當以此為限一禮部看詳武學入學之法難以施行乃是禮部未喻立法之意乞自朝廷詳察其中更不引試便入外舍尤為疏簡其間豈無隳業苟求之人亦是禮部未詳外舍之法其外舍立法已甚詳密不過一月須試又不許請假隳業之人無由久容一禮部看詳律學本以教習法律今來却令講經讀史不唯事情迂濶兼妨廢生員專意法律夫法律之意蓋本諸經先能知經乃可議律專意法律者胥吏之事可以行文案治期㑹貫通經義者士人之事也可以為政治民所以律學必使兼治經史又云太學博士通取幕職州縣官律學博士却止取承務郎以上難以施行緣太學生秖是布衣之士或未出官人設有已歷官人願入亦是能自折節之人律學皆是已從仕者所以教官須宜稍重一禮部看詳武學制減去三略六韜尉繚子却合添習孝經論語孟子於事情迂濶難以施行勘㑹元立法減去三略等蓋為鄙淺無取今禮部以為有取恐是不曾研究其添入孝經論語等蓋欲武勇之士能知義理比之漢明帝令羽林通孝經唐太宗使飛騎受經尚未足為迂濶一禮部看詳未有官人不許入律學即舉人盡當遣出但立入學之法先在學之人久須自去豈有遣出之理又云已有官人使之習學法律以應吏部試格正其宜分難令與未有官人一例不許入學難以施行夫學古入官古之制也未出官人且令入太學專治經術最為善意不可改也一禮部看詳國子監敕主簿書庫官職事不至繁重難以不依常制舉官勘㑹主簿專管莊土支收文案諸事最為繁重書庫官本職外准備本監逐時差委幹當皆須公勤幹敏之人立法不依常制舉官所貴得人禮部又引本所修立上條不曾申明得㫖敕條不許既曰修條即須損益舊法豈可却引舊條破難朝廷差官修條即當盡其所見聽朝廷取舍若令逐事先申明取㫖不唯於體非是兼亦於法無文一禮部看詳助教雖緣進納亦繫有官人難以却令繳納誥敕繫抵牾勘㑹上條繫舊法竊詳元初立法之意蓋為助教皆是富民只納數百千便得為士人即恐流類混雜又不可絶人進善所以願納誥身乃許入學今來禮部駁難必為專指助教其餘進納官却無此法蓋進納自齊郎以上朝廷許其臨政治民難為不許入學監學立法又不可侵議進納條貫所以專指助教一禮部看詳大率以檢察士人為不可竊以朝廷欲厚風教必自士人始近世士風薄惡士人不修行檢或無異於市井小人朝廷未嘗有法以教勵檢束之也近年方有檢察舉人條貫今來立法更加增益使之詳備蓋欲士人有所忌憚而天下知朝廷欲厚風教之意習俗漸化今禮部難云牒開封府或本貫施行即不說如何施行事節又帖子文具回禮部取問狀勘㑹學生在學有犯則依學規待學者之道也舉人及仕族子弟有犯於外自有條法更令本監察訪者蓋欲朝廷有法檢束士人知所戒懼爾况所察皆是顯惡失士人之行者難為因本監察訪不用常憲又云假有舉人本貫是廣南游學在西川若有所犯却牒廣南施行顯是迂枉今令本監採訪及牒開封府則是在京所以更云或本貫者或者疑辭蓋量宜可牒本貫則牒本貫欲其一鄉知戒爾禮部有西川牒廣南之說乃是誤認立法之意一禮部看詳稱三舍升補法不可以廢須用命官正録其三舍升補舊法事理甚明白賢愚所共知繫在朝廷取舍又云新條添置學生充正録人給錢米屋若干未見支錢米去處切緣自來職事人皆有俸錢禮部合知支錢去處又云屋見繫出賃收掠房錢難以施行錢既可支屋亦何異新條明載於閒慢處支撥無難行之理一禮部看詳舊條錢物格令所不載者長二審詳比類支給今來所修新條刪去比類二字只令長二裁度支破緣存比類二字即臨時輕重多寡有所依倣不至過有支破合依舊存比類二字禮部先有帖子取問本所因何刪去舊條比類二字本所供答稱勘㑹本監支費文具回禮部取問狀內其事理甚明乞自朝廷詳酌一禮部勘㑹官員在職遭祖父母喪不許解官行服今若獨令舉人不得應舉考之人情法意皆所未安竊以官員在職蓋守其常舉人應舉乃是求進律禁冒哀求仕不聞禁冒哀守常也官員與舉人事體不同又云今乞修改貢舉條貫及立到上條遭祖父母喪給長假奔喪等事難議施行學生遭祖父母喪非有君事官守安然不奔自非不孝甚惡之人不應至此學校所以厚人倫立法固當教以尊祖若祖父母喪不許奔深害人理一禮部看詳新制博士減去二員又令一人專講一經無輪講法又添分治學事比舊已是煩勞兼月課先須考較緣又考課卷不少又令五人為番請召對面㸃抹慮日力不給却成苟簡亦生員請益恐不暇應答難以施行自來學中生員整㑹假限辨理事節自有牒訴如聽訟之所今來修改法制無致訟之端學事清簡博士日逐說書治學事不為煩勞改試為課乃學校大體當面㸃抹教告為益最多舊來公私試排比名次衆人爭計髙下必銖銖而校之用功甚多當面讀過指其瑕病用力甚少一日只請三番計人數十日可畢今限半月已甚優游又有長二察其當否之法無日力不足却成苟簡之事自來學官學生皆不相識今則人人相接易為誘益一禮部看詳改齊諭為學諭名稱不正自慶厯學制逐齊置學諭蓋學正者大學之正也學諭者教諭為學者也義各不同非是名稱不正齊諭之名不成意義今來改作學諭本為正名又云長二選差與舊法不同難議施行帖子稱舊令繫令博士參預不唯知接生員親於長二亦或互相防檢無所容私新條立意大率唯是欲朝廷重倚任故使長二自委其屬禮部所難大率唯是欲密為防檢恐其有私若使屬與其長互相防檢非先王之道一禮部看詳保官狀式舊條稱私罪徒今條稱私罪情重舊條稱徭人并相容隱之人不許為保今條內刪去又舊條稱曾經屏斥之人不許人保今條內稱自來士行無闕舊條稱未及七十今條內稱年若干並無刪改因依兼慮士行無闕立文太泛有司難以執用勘㑹私罪雖不至徒有情重不可為保者徭人與歸明無異相隱之人及七十以上自有海行格式既云士行無闕則曾經屏斥在其中矣一禮部看詳學規舊制不齒之罰一曰盜博鬬毆今刪去盜字即未委犯盜合如何施行若謂行止乖惡注云乖惡多端犯名教者皆是包盜在內又緣謗訕悖慢凶恣受賕鬬毆之類亦是有犯名教亦是包括在內今却分立兼行止乖惡舊無此一項切緣學校所以檢束學者不可設盜賊之法况有行止乖惡一條凡言之醜者皆麗其中他犯可言者自合分立條項二程文集卷八

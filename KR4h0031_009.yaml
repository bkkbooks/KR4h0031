body:
  text: 二程文集巻九伊川文集宋程頤撰雜著顔子所好何學論先生始冠遊太學胡安定以是試諸生得此論大驚異之即請相見遂以先生為學職聖人之門其徒三千獨稱顔子為好學夫詩書六藝三千子非不習而通也然則顔子所獨好者何學也學以至聖人之道也聖人可學而至歟曰然學之道如何曰天地儲精得五行之秀者為人其本也真而静其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀樂愛惡欲情既熾而益蕩其性鑿矣是故覺者約其情始合於中正其心養其性故曰性其情愚者則不知制之縱其情而至於邪僻梏其性而亡之故曰情其性凡學之道正其心養其性而已中正而誠則聖矣君子之學必先明諸心知所養一作徃然後力行以求至所謂自明而誠也故學必盡其心盡其心則知其性知其性反而誠之聖人也故洪範曰思曰睿睿作聖誠之之道在乎信道篤信道篤則行之果行之果則守之固仁義忠信不離乎心造次必於是顛沛必於是出處語黙必於是久而弗失則居之安動容周旋中禮而邪僻之心無自生矣故顔子所事則曰非禮勿視非禮勿聴非禮勿言非禮勿動仲尼稱之則曰得一善則拳拳服膺而弗失之矣又曰不遷怒不貳過有不善未嘗不知知之未嘗復行也此其好之篤學之之道也視聴言動皆禮矣所異於聖人者盖聖人則不思而得不勉而中從容中道顔子則必思而後得必勉而後中故曰顔子之與聖人相去一息孟子曰充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神顔子之徳可謂充實而有光輝矣所未至者守之也非化之也以其好學之心假之以年則不日而化矣故仲尼曰不幸短命死矣盖傷其不得至於聖人也所謂化之者入於神而自然不思而得不勉而中之謂也孔子曰七十而從心所欲不踰矩是也或曰聖人生而知之者也今謂可學而至其有稽乎曰然孟子曰堯舜性之也湯武反之也性之者生而知之者也反之者學而知之者也又曰孔子則生而知也孟子則學而知也後人不達以謂聖本生知非學可至而為學之道遂失不求諸已而求諸外以博聞强記巧文麗辭為工榮華其言鮮有至於道者則今之學與顔子所好異矣漢文殺薄昭論古人謂忠孝不兩全恩義有相奪非至論也忠孝恩義一理也不忠則非孝無恩則無義並行而不相悖故或捐親以盡節或舎君以全孝惟所當而已唐李衞公以為漢文誅薄昭斷則明矣義則未安司馬温公以為法者天下之公器惟善持法者親疎如一無所不行皆執一之論未盡於義也義既未安則非明也有所不行不害其為公器也不得於義則非恩之正害恩之正則不得為義使薄昭盗長陵土則太后雖不食而死昭不可不誅也其殺漢使為類亦有異焉若昭有罪命使徃治昭執而殺之太后之心可傷也昭不可赦也后若必害其生則存昭以全后可也或與忿争而殺之則貸昭以慰母心可也此之謂能權盖先王之制也八議設而後重輕得其宜義豈有屈乎法主於義義當而謂之屈法不知法者也賑濟論不制民之産無儲蓄之備飢而後發廪以食之廪有竭而飢者不可勝濟也今不暇論其本救目前之死亡唯有節則所及廣常見今時州縣濟飢之法或給之米豆或食以粥飯來者與之不復有辨中雖欲辨之亦不能也榖貴之時何人不願得食倉廩既竭則殍死者在前無以救之矣數年前一親戚為郡守愛恤之心可謂至矣鷄鳴而起親視俵散官吏後至者必責怒之於是流民歌咏至者日衆未㡬榖盡殍者滿道愚常矜其用心而嗤其不善處事救飢者使之免死而已非欲其豐肥也當擇寛廣之處宿戒使晨入至已則闔門不納午而後與之食申而出給米者午即出日得一食則不死矣其力自能營一食者皆不來矣比之不擇而與當活數倍之多也凡濟飢當分兩處擇羸弱者作稀粥早晩兩給勿使至飽俟氣稍完然後一給第一先營寛廣居處切不得令相枕藉如作粥須官員親嘗恐生及入石灰不給浮浪游手無是理也平日當禁游惰至其饑餓則哀矜之一也為太中作試漢州學生䇿問三首問士之所以貴乎人倫者以明道也若止於治聲律為祿利而已則與夫工技之事將何異乎夫所謂道固若大路然人皆可勉而至也如不可學而至則古聖人何為教人勤勤如是豈其欺後世邪然學之之道當如何後之儒者莫不以為文章治經術為務文章則華靡其詞新竒其意取悦人耳目而已經術則解釋詞訓較先儒短長立異説以為已工而已如是之學果可至於道乎仲尼之門獨稱顔子為好學則曰不遷怒不貳過也與今之學不其異乎或曰如是則在修身謹行而已夫檢行者設曰勉强之可也通諸身者姑謹修而可能乎况無諸中不能强於外也此為儒之本諒諸君之所素存也幸明辨而詳著於篇問聖人之道傳諸經學者必以經為本然而諸經之奥多所難明今取其大要各舉其一以言之夫易卦之徳曰元亨利貞或為四曰元也亨也利也貞也或為二曰大亨也利於貞也其詞既同義可異乎所以異者何謂春秋垂褒貶之法所貶則明矣所褒者何事詩之美刺聖人取其止乎禮義者以為法於後世晉武公身為并奪無衣美之其教安在書為王者軌範不獨著聖之事以為法也亦存其失以示戒爾五子之歌是也如盤庚之遷國穆王之訓刑為是而可法邪為非而可戒邪禮記雜出於漢諸儒所傳謬亂多矣考之完合於聖人者其篇有㡬夫古人之學貴專不以泛濫為賢諸君之於經必各有所治人言其所學可也惟毋泛毋略問儒者積學於已以待用也當世之故固當講明若夫朝廷之治君相謨之斯無間矣以一郡而言守之職豈不以養人為本然而民産不制何術以濟乎困窮吏繇有數何道以寛乎力役比閭無法教化何由而可行衣食不足風俗何縁而可厚自唐而上世有循吏著之史冊何今世獨無其人豈古之治不可行於今耶抑為之者不得其道邪思欲仰希前哲之為上副聖朝之寄何所施設而能及斯諸君從事於學既勤且久為政之方固當明其體要至於民一作風俗一作之利病皆耳目之所接也願陳髙論得以矜式修立孔氏條制一添賜田并舊賜為五百頃設溝封為奉聖鄉世襲奉聖公爵以奉祭祀不使更為他官位在中大夫之下如有髙才重徳朝廷必頼其用即令嗣子奉祀事一所賜田蠲免稅賦依鄉川厚薄召人種佃其佃户並免差徭夫役一奉聖公表章慶賀進奉聖節並依兖州例朝廷頒厯賜衣等恩數並依兖州知州每遇大禮許入覲陪位一奉聖公差當直兵士二十人一奉聖公宅教授一人主導翊襲封之人及教導其嗣子吏部於舉到學官選差一置官一員主其家事或只令仙源縣簿尉兼管四箴并序顔淵問克已復禮之目夫子曰非禮勿視非禮勿聴非禮勿言非禮勿動四者身之用也由乎中而應乎外制於外所以養其中也顔淵事斯語所以進於聖人後之學聖人者宜服膺而勿失也因箴以自警視箴心兮本虛應物無迹操之有要視為之一作之為則蔽交於前其中則遷制之於外以安其内克已復禮久而誠矣聴箴人有秉彝本乎天性知誘物化遂亡其正卓彼先覺知止有定閑邪存誠非禮勿聴言箴人心之動因言以宣發禁躁妄内斯静專矧是樞機興戎出好吉㐫榮辱惟其所召傷易則誕傷煩則支已肆物忤出悖來違非法不道欽哉訓辭動箴哲人知㡬誠之於思志士厲行守之於為順理則裕從欲惟一作為危造次克念戰兢自持習與性成聖賢同歸印銘我祖裔伯始封於程及其後世以國為姓惟我皇考卜居近程復爵為伯子孫是稱程伯之後崇寧癸未嵗二月丁卯頥銘褉飲詩序上已褉飲風流逺矣而蘭亭之㑹最為後人所稱慕者何哉盖其遊多豪逸之才而右軍之書復為好事者所重爾事之顯晦未嘗不在人也潁川陳公廙始治洛居則引流迴環為泛觴之所元豐乙未首修褉事公廙好古重道所命皆儒學之士既樂嘉賔形於咏歌有不媿山隂之句諸君屬而和者皆有髙致野人程頥不能賦詩因論今昔之異而為之評曰以我好賢方逐樂之心禮義為疎曠之比道藝當筆札之工誠不媿矣安知後日之視今日不若今人之慕昔人也哉遺金閑志元豐庚申嵗予行至雍華間闗西學者相從者六七人予以千錢掛馬鞍比就舎則亡矣僕夫曰非晨􅋔而亡之則涉水而墜之矣予不覺嘆曰千錢可惜坐中二人應聲曰千錢失去甚可惜也次一人曰千錢微物何足為意後一人曰水中囊中可以一視人亡人得又何嘆乎予曰人得之乃非亡也吾嘆夫有用之物若沉水中則不復為用矣至雍以語與叔曰人之器識固不同自上聖至於下愚不知有㡬等同行者數人耳其不同如此也與叔曰夫數子者之言如何予曰最後者善與叔曰誠善矣然觀先生之言則見其有體而無用也予因書而志之後十五年紹聖乙亥秋九月因閲故編偶見之思與叔之不幸早死為之涕下蜀守記成都人稱近時鎮蜀之善者莫如田元均文潞公語不善者必曰蔣堂程戡故謡言曰彦博虧虧猶言不如也田况程戡勝蔣堂言最善之中田更優不善之中程猶差勝也予嘗訪之士大夫以至閭里間察其善不善之迹所謂善者得民心之悦固有可善焉所謂最不善者乃可謂至善者也至今人言及蔣公時事必有不樂之言問其所不樂者衆口所同惟三事而已减損遨樂毁后土廟及諸滛祠伐江瀆廟木修府舎也其尤失人心者節遨樂也前蔣者數十年為政闕養魚記時年二十二書齋之前有石盆池家人買魚子食猫見其煦沫也不忍因擇可生者得百餘養其中大者如指細者如箸支頥而觀之者竟日始舎之洋洋然魚之得其所也終觀之戚戚焉吾之感於中也吾讀古聖人書觀古聖人之政禁數罟不得入洿池魚尾不盈尺不中取市不得鬻人不得食聖人之仁養物而不傷也如是物獲如是則吾人之樂其生遂其性宜何如哉思是一無此二十字魚之一無之字於是時寧有是困耶推是魚孰不可見耶魚乎魚乎細鈎宻網吾不得禁之於彼炮燔咀嚼吾得免爾於此吾知江海之大足使爾遂其性思置汝於彼而未得其路徒能以斗斛之水生汝之命生汝誠吾心汝得生已多萬類天地中吾心將奈何魚乎魚乎感吾心之戚戚者豈止魚而已乎因作養魚記一無此上十一字有爾乎二字至和甲午季夏記書養魚記後吾昔作養魚記於兹幾三十年矣故藳中偶見之竊自嘆少而有志不忍毁去觀昔日之所知循今日之所至愧負初心不㡬於自棄者乎示諸小子當以吾為戒元豐己未正月戊戌西齋南牕下書為太中書家藏寶字後先臣少師以府僚事太宗皇帝於開封被眷特異前後所賜親筆多矣天聖中遭家難諸父繼亡臣時未冠復在逺方京師賜第外姻守之寶藏之物既於盗手於今在者乃其遺也故太宗遺書惟存十二字其六乃開封文移皆縁祭祀及貢舉事臣恭思太宗皇帝以介弟之貴晉王之重尹正天府而常事之小者皆親書之自来大臣領州小事多不親書聖心可見矣盖於祀事之嚴取士之重雖細故必親誠孝恭䖍之心也急賢好士之心也嗚呼成萬世無窮之基豈不由是心乎愚臣竊謂是心也宜為後聖法元祐四年己巳十一月癸未大中大夫致仕上柱國永年縣開國伯食邑九百户臣程珦題詩聞侯舅應辟南征詩時年十八辭華奔競至道離茫茫學者争驅馳先生獨奮孟軻舌扶持聖教増光輝志期周禮制區夏人稱孔子生闗西當途聞聲交薦牘蒼生無福徒爾為道大不為當世用著書將期來者知今朝有客闗内至聞從大幕征南垂南垂㐫㓂陷州郡久張螳臂抗天威聖皇赫怒㨗書緩虎侯秉鉞驅熊羆宏才未得天下宰良謀且作軍中師蕞爾小蠻何足殄庶㡬聊吐胸中竒游嵩山鞭羸百里逺來遊巖谷隂雲暝不收遮斷好山教不見如何天意異人謀謝王佺期寄藥至誠通聖一作化藥通神逺寄衰翁濟病身我亦有丹君信否用時還觧夀斯民雜説三首父母之於子愛之至也子不孝則愛心弛焉聖人之於民雖窮凶極惡而陷於刑戮哀矜之心無有異也情有替也誠無息也言命所以安義從義不復語命以命安義非循理者也仲尼之徒豈皆聖人其見豈能盡同於仲尼惟其不敢信已而信其師故常舎已以求合聖人之教是以卒歸於不異也及夫子没則漸異也二程文集巻九

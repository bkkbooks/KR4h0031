body:
  text: 二程文集巻一明道文集一宋程顥撰銘詩顔樂亭銘為孔周翰作天之生民是為物則非學非師孰覺孰識聖賢之分古難其明有孔之遇有顔之生聖以道化賢以學行萬世心目破昏為醒周爰闕里惟顔舊止巷汙於榛井堙而圮鄉閭蚩蚩弗視弗履有卓其誰師門之嗣追古念今有惻其心良賈善諭發帑以金巷治以闢井㳿而深清泉澤物佳木成陰載基載落亭曰顔樂昔人有心予忖予度千載之上顔惟孔學百世之下顔居孔作盛德彌光風流日長道之無疆古今所常水不忍廢地不忍荒嗚呼正學其何可忘偶成時作鄠縣主簿雲淡風輕近午天望花隨柳過前川旁人不識予心樂將謂偷閒學少年游鄠山詩序僕自幼時已聞秦山多竒占有扈者尤復秀出常恨遊賞無便嘉祐二年始應舉得官遂請於天官氏願主簿書於是邑謂厭飫雲山以償素志今到官幾二年矣中間被符移奔走外幹者三居其二其一則簿書期㑹倉廥出入固無暇息惟白雲特在山面最為近邑常乗間兩至其餘佳處都未得往變化初心辜負泉石五年二月初吉聞貳車晁公來遊諸山先是晁公見約同往㑹探吏失期二日早晁公以書見命始知車騎已留草堂走白邑大夫張君時民産有在山麓者以罪没官府符方命量其租入之數因請以往鞭馬至山而晁公已由髙觀登紫閣還憇下院見待已久遂奉陪西遊經李氏五花莊息駕池上夜宿白雲精舍詰旦晁公西首僕復傍山東遊紫閣登南山望仙掌囘抵髙觀谷探石穴窺石潭因周視所定田徜徉於花林水竹間夜止草堂是晩雨氣自西山來始慮不得徧詣諸境一霎遂霽明旦入太平谷憇息於重雲下院自入太平谷山水益竒絶殆非人境石道甚巇下視可悸往往步亂石間入長嘯洞過虎溪西南下至重雲閣訪鳯池觀雲頂凌霄羅漢三峰登東嶺望大頂積雪後東北來雲際下深澗白石磷磷於水間水聲清冷可愛坐石掬水戀戀不能去者久之遂宿大定寺凌晨登上方候日初上西望藥山北眺大頂千峰萬巒目極無際下山縁東澗渡横橋復憇於重雲下院出谷遊太平宫故基而歸馬上率爾口語往往成詩章自入山至歸凡四日得長短詠共十二篇姑存之以誌遊覽之次第云白雲道中吏身拘絆同疏屬俗眼塵昏甚瞽矇辜負終南好泉石一年一度到山中馬上偶成身勞無補公家事心冗空令學業衰世路嶮巇功業逺未能歸去不男兒遊紫閣山仙掌逺相招縈紆渡石橋瞑雲生澗底寒雨下山腰樹色千層亂天形一罅遙吏紛難久駐囘首羡漁樵獼猴山僧云晏元獻公來獼猴滿山聞説獼猴性頗靈相車來便滿山迎鞭羸到此何曾見始覺毛蟲更世情髙觀谷轟雷疊皷響前峰來自彤雲翠藹中洞壑積陰成氣象鬼神憑暗㺯威風噴崖雨露千尋濕落石珠璣萬顆紅縱有虬龍難駐足還應不是旱時功草堂寺在竹林之心其竹蓋將十頃參差臺殿緑雲中四面篔簹一徑通曾讀華陽真誥上神仙居在碧琳宫長嘯巖中得冰以石敲餐甚佳車倦人煩渴思長巖中冰片玉成方老仙笑我塵勞久乞與雲膏洗俗腸游重雲久厭塵籠萬慮昏喜尋泉石暫清神目勞足倦深山裏猶勝低睂對俗人長嘯洞北囘望大頂如列屛幛比到山前却不見蓋為仙掌所蔽行盡重雲幾曲山囘頭方見碧峰寒天將仙掌都遮斷元恐塵中俗眼看凌霄三峰長嘯巖東古寺前三峰相倚勢相連偶逢雲静得見日若有路通須近天陰吹響雷生谷底老松如箸見崖顛結根不得居平地猶與蓮花逺比肩雲際山南藥東邊白閣西登臨身共白雲齊上方頂上朝來望陡覺羣峰四面低下山偶成襟裾三日絶塵埃欲上籃輿首重迴不是吾儒本經濟等閒爭肯出山來是遊也得小松黄楊各四本植於公署之西窗戲作五絶呈邑令張寺丞興宗中春時節百花明何必繁絃列管聲借問近郊行樂地潢溪山水照人清心閒不為管絃樂道勝豈因名利榮莫謂冗官難自適暇時還得肆游行功名不是闗心事富貴由來自有天任是𣙜酤虧課利不過抽得俸中錢有生得遇唐虞聖為政仍逢守令賢縱得無能閒主簿嬉遊不負艶陽天獄訟已聞寃滯雪田農還喜土膏勻只應野叟猶相笑不與溪山作主人春雪二月將臨尾羣陰久退潜只知桃李艶何復雪霜嫌密霰仍先集飄霙忽散霑帯風成料峭和雨作亷纎江漢初彌望珠璣亦間兼片痕才著瓦斜勢漸穿簾鳥化遼城鶴途鋪越女縑落英時鬭舞飛絮或同黏直把瓊瑶比誰疑鵠鷺撏透肌錐共利洒面刅爭銛寒怯開闈賞光凝伴月覘價増樵市炭興入酒家帘駐足銀粧履昻頭玉裹髯如何欺煦律重復困窮閻薪乏經朝備衣因恃暖拈擷芳游女恨憂歲老農占惜竹頻敲葉愁花旋覆苫失權悲太皥助虐有飛亷驟降初疑勇旋消亦訝謙朔雲雖借便水后可無厭縱任陰靈巧難令木氣殱寒威徒自奮春氣亦時添積勢方平壠澌流已墜簷暗空猶沓沓近地即佔佔逺水難遮面髙峰不裹尖著墻聊畫粉蓋地豈成鹽紈扇驚塵曀崑崗認火炎端來薦融釋空復助洳漸積潤終滋嫩驚雷亦震淹東君莫惆悵杲日待重瞻晩春人生百年永光景我逾半中間幾悲歡况復多聚散青陽變晩春弱條成老榦不為時節驚把酒欲誰勸桃花菊仙人紺髪粉紅腮近自武陵源上來此花近歳方有不比常花羞晩發故將春色待秋開存留金蘂天偏與漏泄春香衆始猜兼得佳名共堅節曉霜還獨對樓臺早寒一夜威霜特地嚴朝來寒氣入書簾乍須火暖親爐獸初覺冰澌結硯蟾敗葉巻風輕䔩䔩逺峰經曉静尖尖出門未要貂狐燠且著輕裘次第添新晴野步青帝方成萬物春如何滛雨害芳晨乞求共指雲間日悔恨輕嫌陌上塵消盡風威猶料峭放開山色已嶙峋燕遊莫道王孫樂亦有羲皇更上人陰曀消除六幕寛嬉遊何事我心閒鳥聲人意融和候草色花芳杳藹間水底斷霞光出岸雲頭斜日影銜山縁情若論詩家興却恐騷人合厚顔西湖潩水橋邊鴨子陂樓臺只在郡城西煙波乍見心先快島嶼將尋路欲迷盡日無風横舴艋有時經雨飲虹霓如何咫尺塵埃地能使遊人意不齊環翠亭城居不見萬山重因起髙亭破逺空虚曠直疑天宇外周旋如在畫屏中凝嵐散藹層層出削玉排青面面同暫得登臨已忘去四時佳致屬賢公中秋月雲静好風吹清光溢四垂金行方盛日陰魄正中時髣髴窺瑶闕分明露桂枝遴英同醉賞誰復歎官覉象戲大都博奕皆戲劇象戲翻能學用兵車馬尚存周戰法偏裨兼備漢官名中權八面將軍重河外尖斜步卒輕却凭紋楸聊自笑雄如劉項亦閒爭九日訪張子直承出看花戲書學舍五首平日邀相見過門又不逄貪隨看花伴應笑我龍鍾須知春色醲於酒醉得遊人意自狂直使華顛老公子看花爭入少年塲貪花自是少年事沉酒定嫌醒者非顧我疎慵老山野却騎歸馬背斜暉下馬問老僕言公賞花去只在近園中業深不知處桃李飄零杏子青滿城車馬響春霆就中得意張公子十日花前醉不醒贈王求甫鐵如意妖言莫信傳張惡虚氣休將碎唾壺借問閒窗静狐背何如爭勝擊珊瑚送吕晦叔赴河陽曉日都門颭斾旌晩風鐃吹入三城知公再為蒼生起不是尋常刺史行贈司馬君實二龍閒卧洛波清今日都門獨餞行願得賢人均出處始知深意在蒼生陪陸子履遊白石萬固條山蒼蒼河流黄中蒲形勢天下彊帝得賢侯殿一方四年不更慰民望元豐戊午季春月上心閔雨愁黎蒼使車四出走羣望我亦奉命來侯疆情誠感格天意順詔書才下雨已霶病麥還青禾出土野農鼓舞歌君王故人相見不道舊為雨歡喜殊未央聖主寛憂小臣樂自可放蕩舒胸腸白石萬固皆勝地主人為我攜壺觴况逢佳日俗所尚車馬未曉填康莊扶提十里雜老幼迤邐千騎明戈槍初聽鳴鐃入青靄漸見朱斾輝朝陽遨頭自是謝康樂後乗獨慚元漫郎侯來雖知有賓客衆喜更為將豐穰臨溪坐石遍巖谷幽處往往聞絲簧山光似迎好客動日景定為遊人長乗髙望逺興不盡戀戀不知歧路忙人生汨没苦百態得此樂事真難常我辭佳境已惆悵侯亦那得久此鄉他時㑹合重相語辜負泉石何能忘戲題曾是去年賞春日春光過了又逡巡却是去年春自去我心依舊去年春題淮南寺南去北來休便休白蘋吹盡楚江秋道人不是悲秋客一任晩山相對愁和家君早寒之什滿地清霜結曉寒平明飛霰洒柴闗乍憑酒力温肌骨陡覺風威著面顔閭里相呼泥北戸牛羊收牧下前山急須趂日藏薪炭凍後髙枝不易攀和詠草漸覺東皇意思勻陳根初動夜來新忽驚平地有輕緑已蓋六街無舊塵莫為枯榮吟野草恐當作火且憐愁醉柅舊作枕香輪詩人空怨王孫逺極目萋萋又一春和邵堯夫打乖吟二首打乖非是要安身道大方能混世塵陋巷一生顔氏樂清風千古伯夷貧客求墨妙多攜巻天為詩豪剰借春儘把笑談親俗子德容猶足慰鄉人聖賢事業本經綸肯為巢由繼後塵三幣未囘伊尹志萬鍾難換子輿貧且因經世藏千古已占西軒度十春時止時行皆有命先生不是打乖人和堯夫首尾吟先生非是愛吟詩為要形容至樂時醉裏乾坤都寓物閒來風月更輸誰死生有命人何與消長隨時我不悲直到希夷無事處先生非是愛吟詩和堯夫西街之什二首先生相與賞西街小子親攜几杖來行次毎容參劇論坐隅還許侍餘盃檻前流水心同樂林外青山眼重開時泰身閒難兩得直須乗興數追陪先生髙蹈隱西街風月猶牽賦詠才暫到隣家賞池舘便將佳句寫瓊瑰壯圖已譲心先快劇韻仍降字占挼只有一條誇大甚水邊曾未兩三盃遊月陂月陂堤上四徘徊北有中天百尺臺萬物已隨秋氣改一鐏聊為晩凉開水心雲影閒相照林下泉聲静自來世事無端何足計但逢佳日約重陪秋日偶成二首寥寥天氣已髙秋更倚凌虚百尺樓世上利名羣蠛蠓古來興廢幾浮漚退居陋巷顔囘樂不見長安李白愁兩事到頭須有得我心處處自優游閒來無事不從容睡覺東窗日已紅萬物静觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不滛貧賤樂男兒到此是豪雄代少卿和王宣徽遊崇福宫睿祖開真宇祥光下紫微威容凝粹穆仙仗儼周圍嗣聖嚴追奉神遊遂此歸冕旒臨秘殿天日照西畿朱鳯銜星蓋清童護玉衣鶴笙鳴逺吹珠蘂㺯晴暉瑶草春常在瓊霜曉未晞木文靈像出太一醴泉飛醮夕思飊馭香晨望絳闈衰遲愧宫職蕭洒自忘機和王安之五首小園閒坊西曲奉常家景物天然占一窳恰似庾園基址小全勝浥澗路途賖知君陋巷心猶樂比我僑居事已􅑞且喜杖藜相過易隔牆無用少游車白樂天有詩戲盧中丞浥澗山居去城之逺野軒誰憐大第多竒景自愛貧家有古風㑹向紅塵生野思始知泉石在胸中汙亭強潔猶來真有為好髙安得是無心汙亭妙㫖君須㑹物我何争事莫侵藥軒嚢中數味應千種砌下栽苖過百名好是微風入庭户清香交送滿檐楹晩暉亭亭下花光春正好亭頭山色晩尤佳欲知剰占清一作春風處思順街東第一家和花菴得意即為適種花非貴多一區才丈席滿目自雲蘿静聽禽聲樂閒招月色過期公在康濟終柰此情何子直示以新詩一軸偶為四韻奉謝治劇君能佚居閒我更慵自惟降藻麗不解斷舂容寡和知高唱深情見古風静吟梁甫意真似卧隆中和諸公梅臺急須乗興賞春英莫待空枝謾寄聲淑景暖風前日事淡雲微雨此時情後一日再和常勸嬉遊須及辰莫辭巾屨染埃塵秪應風雨梅臺上已減前時一半春郊行即事芳原緑野恣行時春入遥山碧四圍興逐亂紅穿柳巷困臨流水坐苔磯莫辭盞酒十分醉秪恐風花一片飛况是清明好天氣不妨游衍莫忘歸春日江上新蒲嫩柳滿汀洲春入漁舟一棹浮雲幕倒遮天外日風帘輕颺竹間樓望窮逺岫微茫見興逐歸槎汗漫游不畏蛟螭起波浪却憐清泚向東流下白徑嶺先寄孔周翰郎中驟經微雨過芳郊轉覺長河氣象豪歸騎已登吳坂峻飛雲猶認華山髙門前岐路通西國城上樓臺壓巨濤欲問甘棠舊風化主人邀客醉香醪盆荷二首庭下竹青青一作圓盆荷水面平誰言無逺趣自覺有餘清影倒假山翠波光朝日明漣漪尤緑淨凉吹夜來生衡茅岑寂掩柴闗庭下蕭疎竹數竿狹地難容大池沼淺盆聊作小波瀾澄澄皓月供宵影瑟瑟凉風助曉寒不校蹄涔與滄海未知清興有誰安陳公廙園修禊事席上賦盛集蘭亭舊風流洛社今坐中無俗客水曲有清音香篆來還去花枝泛復沉未須愁日暮天際是輕陰酬韓持國資政湖上獨酌見贈對花酌酒公能樂飯糗羮藜我自貧若語至誠無内外却應分别更迷真韓詩云曲肱飲水程夫子宴坐焚香范使君愧我未能忘外樂縁尊紅芰對西曛哭張子厚先生歎息斯文約共修如何夫子便長休山東無復蒼生望西土誰共後學求千古聲名聨棣萼二年零落去山丘寢門慟哭知何限豈獨交親念舊游二程文集巻一

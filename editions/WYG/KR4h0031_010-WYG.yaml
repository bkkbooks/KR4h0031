body:
  text: 二程文集巻十伊川文集宋程頤撰書啓為家君上宰相書珦聞古之君子相其君而能致天下於大治者無他術善惡明而勸懲之道至焉爾勸得其道而天下樂為善懲得其道而天下懼為惡二者為政之大權也然行之必始於朝廷而至要莫先於諡法何則刑罰雖嚴可警於一時爵賞雖重不及於後世帷美惡之諡一定則榮辱之名不朽矣故厯代聖君賢相莫不持此以勵世風一作也伏惟閣下以上賢之資為聖主之輔深功厚徳卓出前古所以致今日之治者盖由盡心勸懲之道而天下之善惡明也今若有善人於此而不得彰顯以至於冺沒則於閣下豈不甚惜而欲聞之乎珦是以敢忘其僣易之罪而布其誠懇於左右伏念珦之曽祖當五代之亂棄官避世以俟真主之興我朝受命首赴闕庭一言遭遇受聖祖非常之知及太宗皇帝之在晉藩親自選擢俾之輔佑於時真宗皇帝親受經訓太宗纂緒顧遇益隆凡所獻替無不開納稱其忠厚待以腹心前後兩欲相之而姦臣盧多遜惡其方正皆因四方之事薦之使行暨於還朝復將大用而先祖自以衰老瀝懇辭避乃特為改置文明殿學士之職俾處庶僚之右制辭丁寜復示終用為相之㫖至於没身不許告老厯事兩朝受恩三聖終始一節存沒異遇考於諡法宜得美名而當時有司失於舉行門生故吏不能論請以至於今未有易其名者珦大懼年祀浸逺遂至湮晦近三請於朝廷而有司引條例以既葬為限夫聖人作諡之意本以彰善癉惡若以請之後時遂廢其禮則是為善者未必見褒而為惡者得以自隱也况國家推恩率循舊例竊見近日王嗣宗輩亦是已葬朝廷恩㫖特許追賜獨珦之曽祖以條例為限某竊惑焉若以官言之則三品以上皆應令文以徳言之則先祖清儉之節淳厚之徳寛大之量周通之才比於嗣宗誠亦無媿何嗣宗得請於無例之前而先祖見抑於有例之後若以先祖非兩府而異之耶則太宗皇帝眷遇如此累將柄用至於老疾聖意未已制詞具在遺㫖如存繼聖之朝得不念之哉古之聖賢生非其時身無其位不得主懲勸於天下尚猶論古之人觀其言考其世以分别其賢愚善惡何哉有至仁之心而自任之重也故人有一善晦而不顯其心媿恥若已揜之今閣下當明盛之時居宰執之任褒賢勸善是所職也若使本朝賢士名跡湮晦以為朝廷之闕閣下得不惜之乎矧主上以至孝御天下祖宗之朝一政一令靡所更易一器一玩弗忍遺棄而恩舊之臣豈不存念伏望閣下體聖祖選擢之意感神宗恩遇之厚念真皇受經之舊副主上繼志之心力賜主張許循近例如此則恩滿泉㡳光生後昆則珦闔門粉骨不足以報厚徳矣謝吕晦叔待制相見書竊以古之時公卿大夫求於士故士雖自守窮閻名必聞才必用今之時士求於公卿大夫故干進者顯榮守道者沉晦頥處乎今之世才微學寡不敢枉道妄動雖親戚鄉閭間鮮克知其所存者矧敢期知於公卿大夫乎伏承閣下屈近侍之尊下顧愚陋仰荷厚禮媿不足以當之噫公卿不下士久矣頥晦於賤貧世莫之顧而公獨降禮以就之非好賢樂善之深孰能如是乎幸甚幸甚願閣下持是好賢之心廣求之之方盡待之之道異日登廟堂翊明天子治以之自輔以福天下豈不厚與鄙朴之人不善文詞姑竭其區區少致謝懇為家君請宇文中允典漢州學書中允明公執事竊以生民之道以教為本故古者自家黨遂至於國皆有教之之地民生八年則入於小學是天下無不教之民也既天下之人莫不從教小人修身君子明道故賢能羣聚於朝良善成風於下禮義大行習俗粹美刑罰雖設而不犯此三代盛治由教而致也後世不知為教之本不善其心而驅之以力法令嚴於上而教不明於下民放僻而入於罪然後從而刑之噫是可以美風俗而成善治乎徃者朝廷深念其然究思治本詔京師至於郡縣皆立學雖未能如古之時比屋人人而教之可以教為士者矣誠能教之由士始使為士者明倫理而安徳義知治亂之道政化之本處足以為鄉里法出可以備朝廷用如是則雖未能詳備如古之教亦得其大端近古而有漸矣是朝廷為教之意非不正也顧州縣之吏奉承之何如爾珦庸瑣之質叨恩領郡雖才不足以有為然少承父師之訓久從士大夫之後涉聞學古為政之道不敢齗齗俗吏之為專以簿書期㑹為事勉思所以副朝廷明教化育賢才之意以學校為先務然念教道之職非得豪傑之士學術足以待問行義足以率人則何以為衆人之矜式竊聞執事懿文髙行為時所推仕不合則奉身而退不為榮利屈其志歸安田閭道義為鄉里重豈特今人之難能古人所難能也愚謂執事非甘於退處而樂於自善也盖道既不偶去就之義不得不然在執事之心諒無一日忘天下不以行道濟物為意也盖聞賢人君子未得其位無所發施其素藴則推其道以淑諸人講明聖人之學開導後進使其教益明其傳益廣故身雖隠而道光跡雖處而教行出處雖異推已及人之心則一也此鄉人所望於執事而執事所以自任也珦是以敢布其區區之意願執事從鄉人之望枉屈軒馭来憇郡庠俾後進子弟得所依歸不獨一郡學者漸被善教四方之士聞風慕義亦將奔走門下是執事之道雖未用於時而所及人者固已博矣孟子所謂天下之樂也執事豈無意乎或賜允從不勝幸甚再書近者書其鄙懇陳於左右輒欲邀致軒從内省不度方負媿惕辱教之答詞意甚厚且承燕居休適感慰深矣然而過持謙㢲未許臨屈區區之意有所未盡輒敢再凂聴覽珦至郡之初延見僚吏士民首道朝廷所以憂念逺方愛養元元之意既則詢州郡之賢人足以取則為治者於是聞執事之名於衆人之口珦退而三思三省之始曰彼鄉先生也吾將奉之以教郡人既而曰賢者以類至惟賢能致賢彼賢豈我屑耶既又曰賢者雖有為而退豈將自善其身耶必將化導鄉里教育後進自古賢者未有不然者也豈特守之為乎於是决之不疑以請於左右豈意執事未賜深亮拒而弗從珦竊觀在易觀之上九曰觀其生君子无咎象曰觀其生志未平也上九以陽剛之徳居無位之地是賢人君子抱道徳而不居其位為衆人仰觀法式者也雖不當位然為衆人所觀固不得安然放意謂已無與於天下也必觀其所生君子矣乃得无咎聖人又從而賛之謂志當在此固未得安然平定無所慮也觀聖人教示後賢如是之深賢者存心如是之仁與夫索隠行怪獨善其身者異矣今執事居是鄉為一鄉所宗仰適當觀上九之義豈得圖一身之安逸而不以化導為意乎見諭日一作曰近多微疾憚於應接此大不然古者庠序為養老之地所養皆眉夀之人其禮有扶有杖有鯁噎之祝則其羸廢可知盖資其道徳模範豈尚其筋力也哉幸執事觀觀爻之義詳聖人賛之之意思賢人君子所當用心勉從鄉人之願不勝幸甚答横渠先生書累書所論病倦不能詳説試以鄙見道其畧幸不責其妄易觀吾叔之見至正而謹嚴如虛無即氣則虛無之語深探逺賾豈後世學者所嘗慮及也然此語未能無過餘所論以大槩氣象言之則有苦心極力之象而無寛裕温厚一作和之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之明所照者如目所觀纎微盡識之矣考索至者如揣料於物約見髣髴爾能無差乎更願完養思慮涵泳義理他日自當條暢何日得拜見當以来書為據句句而論字字而議庶及精微牽勉病軀不能周悉謝生佛祖禮樂之説相知之淺者亦可料也何吾叔更見問大哥書中云聖人之悟前後矛盾不知謂何莫不至此否再答昨書中所示之意於愚意未安敢再請於左右今承盈幅之諭詳味三反鄙意益未安此非侍坐之間從容辨析不能究也豈尺書所可道哉况十八叔大哥皆在京師相見且請熟議異日當請聞之内一事云已與大哥議而未合者試以所見言之所云孟子曰必有事焉而勿正心勿忘勿助長也此信乎入神之奥若欲以思慮求之是既已自累其心於不神矣惡得而求之哉頤以為有所事乃有思也無思則無所事矣孟子之是言方言養氣之道如是何遽及神乎氣完則理正理正則不私不私之至則神自養氣至此猶逺不可驟同語也以孟子觀之自見其次第也當以必有事焉而勿正為句心字屬下句此説與大哥之言固無殊但恐言之未詳爾逺地未由拜見豈勝傾戀之切餘意未能具道所諭勿忘者但不舎其虚明善應之心爾此言恐未便既有存於心而不舎則何謂虚明安能善應耶虚明善應乃可存而不忘乎上富鄭公書伊川程頤齋心裁書再拜獻於致政司空相公閣下頤鄙野之人未嘗請謁有位故不獲從鄉里士子趨進門下今者来自山中聞太皇太后厭代心誠有所廹切無路上達敢以聞於左右盖非公無可告者非公無肯為者頤頃嵗見治昭陵制度規畫一出匠者之拙謀中人之私意宰執而下受成而已莫復置思以巨木架石為之屋計不百年必當損墜既又觀陵中之物見所謂鐡罩者鐡㡬萬斤以木為骨大不及三寸其相穿叩之處厚纔寸餘逺不過二三十年决須摧朽壓於梓宫於時私心惶駭不能自巳使人聞於魏公魏公不以為意以魏公之忠孝於仁皇非不盡心惟其蔽於衆論昧於逺慮以天下之力𦵏一人於至危之地可不痛哉陵土既復固知無可奈何然每一念之心悸魄喪或終夕不寐今鄉隣之間有如是事可謀為而不以告人必謂之不信况仁皇天下父母乎今也不幸太皇太后奄棄宫闈因此事會可為之謀夫合𦵏之禮周公已来未之有改近取諸唐帝后亦或同穴至於乾陵乃是再啓太祖皇帝神謀逺慮超越萬古昭憲太后亦合安陵稽典禮則得尊親之道徇俗法則皆享福之永此為可行無足疑者伏願公忠誠奮發為朝廷極論其事請奉太皇太后合祔昭陵因得撤去鐡罩用厚陵石槨之制仍更别加裁處使異日雖木壊石墜不能為害救仁皇必至之禍成主上莫大之孝任此事者非公孰能誠能為之天祐忠孝必俾公熾昌夀臧子孫保無疆之休竊惟公事仁宗皇帝三十餘年位極人臣恩遇無比料公之心苟能使仁皇聖體保其安全雖陷一作蹈禍患所不避也况一言之易肯顧慮而不發乎事理至明顧主上素未知耳以公言之重竭誠致懇再三陳之不憂朝廷之不悟獨繫公為不為爾哀誠憤激語辭鄙直内省狂易戰灼無地不宣答富公小簡昨日妄有布聞方懐煩凟之懼乃辱教誨加賜酒食仰荷台意之厚不勝媿悚尊者之賜禮不敢辭然頤方有言於左右公若見取雖執鞭門下盖所欣慕况受賜乎苟不見從是忘忠義公之賜也實為頤羞未敢拜貺謹復上納瀆冒台嚴第深戰慄上河南帥書頤荷徳既深思報宜異輒以狂言凂聞台聴公到鎮之初必多詢訪衆人對公之語頤能料之當曰敵既再㓂河外必復不來公可髙枕矣是常言也未知竒勝之道兵法曰攻必取者攻其所不守也謂其不來乃其所以來也又曰彼興大衆豈徒然哉河外空矣復來何利是大不然誠使彼得出不意破蕩數壘足以勞弊一道為利大矣何必負載而歸然後為利也竊恐謀士悦於寛憂計司幸於緩責衆論既一公雖未信而上下之心已懈矣是可慮也寧捐力於不用毋惜功而致悔莫若使彼聞嚴備而絶意則疆埸安矣豈獨使敵人知有備而不来當使内地之人信可恃而願徃則一二年間便可致完實長久之䇿也自古乘塞禦敵必用驍猛招徠撫養多在儒將今日之事則異矣願公念之答人示奏草書辱示奏藳足以見仁人君子愛民之心深切如此欽服欽服子弟當勉公以速且堅何可已也然於愚意有未安者敢布左右觀公之意專以畏亂為主頤欲公以愛民為先力言百姓飢且死丐朝廷哀憐因懼將為㓂亂可也不惟告君之體當如是事勢亦宜爾公方求財以活人祈之以仁愛則當輕財而重民懼之以利害則將恃財以自保古之時得丘民則得天下財散則人聚後世苟私利於目前以兵制民以財聚衆聚財者能守保民者為迂秦漢而下莫不然也竊慮廟堂諸賢未能免此惟當以誠意感動覬其有不忍之心而已淺見無取惟公裁之答朱長文書或云明道先生之文相去之逺未知何日復為㑹合人事固難前期也中前奉書以足下心虚氣損奉勸勿多作詩文而見答之辭乃曰為學上能探古先之陳迹綜羣言之是非欲其心通而黙識之固未能也又曰使後人見之猶庶㡬曰不忘乎善也苟不如是誠懼没而無聞焉此為學之末宜兄之見責也使吾日聞夫子之道而忘乎此豈不善哉恐不記書中之言故却錄去此疑未得為至當之言也某於朋友間其問不切者未嘗敢語也以足下處疾罕與人接渇聞議論之益故因此可論而為吾弟盡其説庶㡬有小補也向之云無多為文與詩者非止為傷心氣也直以不當輕作爾聖賢之言不得已也盖有是言則是理明無是言則天下之理有闕焉如彼耒耜陶冶之器一不制則生人之道有不足矣聖人之言雖欲已得乎然其包涵盡天下之理亦甚約也後之人始執卷則以文章為先平生所為動多於聖人然有之無所補無之靡所闕乃無用之贅言也不止贅而已既不得其要則離真失正反害於道必矣詩之盛莫如唐唐人善論文莫如韓愈愈之所稱獨髙李杜二子之詩存者千篇皆吾弟所見也可考而知矣苟足下所作皆合於道足以輔翼聖人為教於後乃聖賢事業何得為學之末乎某何敢以此奉責又言欲使後人見其不忘乎善人能為合道之文者知道者也在知道者所以為文之心乃非區區懼其無聞於後欲使後人見其不忘乎善而已此乃世人之私心也夫子疾没世而名不稱焉者疾没世無善可稱云爾非謂疾無名也名者可以厲中人君子所存非所汲汲又云上能探古先之陳迹綜羣言之是非欲其心通黙識固未能也夫心通乎道然後能辨是非如持權衡以較輕重孟子所謂知言是也揆之以道則是非了然不待精思而後見也學者當以道為本心不通乎道而較古人之是非猶不持權衡而酌輕重竭其目力勞其心智雖使時中亦古人所謂億則屢中君子不貴也臨紙遽書不復思繹故言無次序多註改勿訝辭過煩矣理或未安却請示下足以當面話上文潞公求龍門菴地小簡頤竊見勝善上方舊址從來荒廢為無用之地野人率易敢有干聞欲得葺幽居於其上為避暑著書之所唐王龜構書堂於西谷松齋之名傳之至今頤雖不才亦能為龍門山添勝迹於後代為門下之美事可否俟命上韓持國資政求撰兄墓誌頤輙恃顧遇之厚敢以哀誠上煩台聴家兄學術才行為世所重自朝廷至於草野相知何啻千數今將歸𦵏伊川當求誌述以傳不朽然念相知者雖多也能知其道者則鮮矣有文者亦衆也而其文足以發明其志意形容其徳美者則鮮矣能言者非少也而名尊徳重足以取信於人者則鮮矣如是誌之作豈易哉頤竊謂智足以知其道學文足以彰其才徳言足以取信後世莫如閣下家兄素出門下受知最深不幸早世當䝉哀惻顧其道不得施於時學不及傳之書遂將冺没無聞此尤深可哀也恭惟閣下至誠待物與人有終知其生必當念其死愛其人必欲成其名願丐雄文以光窀穸俾伯夷不冺於西山展季得顯於東國則死生受賜子孫敢忘捐軀殞命未足為報率妄之罪非所敢逃上孫叔曼侍郎求寫兄墓誌書頤輒恃垂顧敢以哀誠上煩台聴家兄學術才行為時所重出入門下受知最深不幸短命天下孰不哀之又其功業不得施於時道學不及傳之書遂將冺没無聞此尤深可哀也竊惟自昔有道之士名或未彰賢人君子為之發揚而後顯於後世者多矣今將歸𦵏伊川太一資政韓公為誌其墓思得大賢之筆共久其傳恭惟閣下名足以取重將來道足以流光後世致誠待物與人有終知其生必當念其死愛其人必欲成其名願求真蹟以賁窀穸倘䝉哀矜曲賜開允則死生受賜子孫敢忘内循率妄戰越無地答楊時慰書頤泣啓頤罪惡不弟感招禍變不自死滅兄長䘮亡哀苦怨痛肝心摧裂日月迅速忽將三月追思痛切不可堪處逺承慰問及寄示祭文哀辭足見嵗寒之意家兄道學行義足以澤世垂後不幸至此天乎奈何頤悲苦之餘僅存氣息筋骸支離尤倦執筆况哀誠非書所能盡所幸老而經此煩惱飲食起居如常不煩深慮伏紙摧咽言不倫次頤泣啓楊君法曹九月十二日十月二十四日葬韓持國為誌行状頤自作徐當寄去謝韓公啓竊以朝廷取士所以為致治之先公卿薦賢固必有知人之哲允諧公議始厭衆聞頤也不才少而從學致知格物粗窺聖道之端倪明善誠身未得古人之髣髴徒忘懐於白首竊有志於斯文時和嵗豐已足素望言揚徳進敢有覬心屬嗣皇訪落之初乃元老告猷之會豈虞過聴猥被明揚文陛進登被徳音之温厚西清入侍宻宸扆之光輝考於近世而來可謂非常之遇荷恩為愧惴分則逾若何行為可以報稱惟殫素學勉副厚知過此以還不知所措未縁望履徒切向風悃愊所懐敷宣罔既又謝簡頤惶恐再拜啓仲夏毒熱伏惟臺候動止萬福頤執耕畎畝於門下未嘗有一日之素猥䝉過聴薦之於朝沾被恩命何以稱報未由展覿伏冀上為宗社善䕶寢興下情區區之至答吕進伯簡三相别累年區區企渇之深言不盡意按部徃来想在勞止秦人瘡瘵未復而偶此旱暵頼賢使者措置受賜何涯儒者逢時生靈之幸勉成休功乃所願望頤備員於此夙夜自竭未見其補時望賜書開諭不逮與叔每過從至慰至幸引素門墻坐馳神爽所欲道者非面不盡惟千萬自愛别紙見諭持法為要其來已久矣既為今日官當於今日事中圖所設施舊法之拘不得有為者舉世皆是也以頤觀之苟遷就於法中所可為者尚多先兄明道之為邑及民之事多衆人所謂法所拘者然為之未嘗大戾於法衆亦不甚駭謂之得伸其志則不可求小補則過今之為政者逺矣人雖異之不至指為狂也至謂之狂則大駭矣盡誠為之不容而後去又何嫌乎鄙見如此進伯以為如何荷公知遇之厚輙有少見上補聰明亦久懐憤鬱無所控告遇公而伸爾王者父天母地昭事之道當極嚴恭漢武逺祀地祇於汾脽既為非禮後世復建祠宇其失已甚因唐妖人作韋安道傳遂為塑像以配食誣瀆天地天下之妄天下之惡有大於此者乎公為使者此而不正將正何事願以其像投之河流慎勿先露先露則傳駭觀聴矣勿請勿議必見沮矣毋虞後患典憲不能相及亦可料也願公勿疑與吕大臨論中書此書其全不可復見今只據吕氏所錄到者編之大臨云中者道之所由出先生曰中者道之所由出此語有病大臨云謂中者道之所由出此語有病已悉所諭但論其所同不容更有二名别而言之亦不可泥為一事如所謂天命之謂性率性之謂道又曰中者天下之大本和者天下之達道則性與道大本與達道豈有二乎先生曰中即道也若謂道出於中則道在中外别為一物矣所謂論其所同不容更有二名别而言之亦不可混為一事此語固無病若謂性與道大本與達道可混而為一即未安在天曰命在人曰性循性曰道性也命也道也各有所當大本言其體達道言其用體用自殊安得不為二乎大臨云既云率性之謂道則循性而行莫非道此非性中别有道也中即性也在天為命在人為性由中而出者莫非道所以言道之所由出也與率性之謂道之義同亦非道中别有中也先生曰中即性也此語極未安中也者所以狀性之體段若謂性有體叚亦不可姑假此以明彼如稱天圓地方遂謂方圓而天地可乎方圓旣不可謂之天地則萬物决非方圓之所出如中旣不可謂之性則道何從稱出於中蓋中之為義自過不及而立名若只以中為性則中與性不合與率性之謂道其義自異性道不可一作可以合一而言中止可言體而不可與性同德又曰觀此義一作語謂不可與性同徳字亦未安子居對以中者性之徳却為近之子居和叔之子一云義山之子又曰不偏之謂中道無不中故以中形道若謂道出於中則天圓地方謂方圓者天地所自出可乎大臨云不倚之謂中不雜之謂和先生曰不倚之謂中甚善語猶未瑩不雜之謂和未當大臨云喜怒哀樂之未發則赤子之心當其未發此心至虚無所偏倚故謂之中以此心應萬物之變無徃而非中矣孟子曰權然後知輕重度然後知長短物皆然心為甚此心度物所以甚於權衡之審者正以至虚無所偏倚故也有一物存乎其間則輕重長短皆失其中矣又安得如權如度乎故大人不失其赤子之心乃所謂允執其中也大臨始者有見於此便指此心名為中故前言中者道之所由出也今細思之乃命名未當爾此心之狀可以言中未可便指此心名之曰中所謂以中形道正此意也率性之謂道者循性而行無徃而非理義也以此心應萬事之變亦無徃而非理義也皆非指道體而言也若論道體又安可言由中而出乎先生以為此言未是先生曰喜怒哀樂未發謂之中赤子之心發而未遠於中若便謂之中是不識大本也大臨云聖人智周萬物赤子全未有知其心固有不同矣然推孟子所云豈非止取純一無偽可與聖人同乎非謂無毫髪之異也大臨前日所云亦取諸此而已此義大臨昔者旣聞先生君子之教反求諸已若有所自得參之前言徃行將無所不合由是而之焉似得其所安以是自信不疑拳拳服膺不敢失墜今承教乃云已失大本茫然不知所向竊恐辭命不明言不逮意致高明或未深喻輙露所見求益左右卒為賜教指其迷謬幸甚聖人之學以中為大本雖堯舜相授以天下亦云允執其中中者無過不及之謂也何所凖則而知過不及乎求之此心而已此心之動出入無時何從而守之乎求之於喜怒哀樂未發之際而已當是時也此心卽赤子之心純一無偽即天地之心神明不測即孔子之絶四四者有一物存乎其間則不得其中即孟子所謂物皆然心為甚心無偏倚則至明至平其察物甚於權度之審即易所謂寂然不動感而遂通天下之故此心所發純是義理與天下之所同然安得不和大臨前日敢指赤子之心為中者其説如此來教云赤子之心可謂之和不可謂之中大臨思之所謂和者指已發而言之今言赤子之心乃論其未發之際一有竊謂字純一無偽無所偏倚可以言中若謂已發恐不可言心來教云所謂循性而行無徃而非義理言雖無病而聖人氣味殊少大臨反而思之方覺辭氣廹窘無沉浸醲厚之風此則淺陋之罪敢不承敎大臨更不敢拜書先生左右恐煩徃答只令義山持此請敎䝉塞未逹不免再三凂瀆惟望乘間口諭義山傳誨一二幸甚幸甚先生曰所云非謂無毫髪之異是有異也有異者得為大本乎推此一言餘皆可見大臨云大臨以赤子之心為未發先生以赤子之心為已發所謂大本之實則先生與大臨之言未有異也但觧赤子之心一句不同爾大臨初謂赤子之心止取純一無偽與聖人同一有處字恐孟子之義亦然更不曲折一一較其同異故指以為言固未嘗以已發不同處為大本也先生謂凡言心者皆指已發而言然則未發之前謂之無心可乎竊謂未發之前心體昭昭具在已發乃心之用也此所深疑未喻又恐傳言者失指切望指敎先生曰所論意雖以已發者為未發反一作及求諸言却是認已發者為說詞之未瑩乃是擇之未精爾凡言心者指已發而言此固未當心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也惟觀其所見如何耳大抵論愈精微言愈易差所謂傳言者失指及反覆觀之雖曰有差亦不失大意又如前論中即性也已是分而為二不若謂之性中性中語未甚瑩以謂聖人氣味殊少亦不須言聖人第二書所以答去者極分明矣答楊時論西銘書前所寄史論十篇其意甚正纔一觀便為人借去俟更子細看西銘之論則未然横渠立言誠有過者乃在正䝉西銘之為書推理以存義擴前聖所未發與孟子性善養氣之論同功二者亦前聖所未發豈墨氏之比哉西銘明理一而分殊墨氏則二本而無殊老㓜及人理一也愛無差等本二也分殊之蔽私勝而失仁無分之罪兼愛而無義分立而推理一以止私勝之流仁之方也無别而迷兼愛至於無父之極義之賊也子比而同之過矣且謂言體而不及用彼欲使人推而行之本為用也反謂不及不亦異乎代人上宰相論鄭白渠書某聞天下之事有甚難而易者有甚易而難者獨繫在上之人為與不為而已昔韓欲罷秦兵使鄭國説以鑿涇水溉田注填閼之水溉瀉鹵之地四萬頃畆收常一鍾關中遂為沃壌無凶年秦以富強至漢白公復引涇水以溉田民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後衣食關中億萬之口此兩渠之功也秦漢而下皆獲其利熙寜中神宗皇帝講求治典興葺遺利時先祖殿丞建明鄭白之利神宗皇帝賜對便殿大稱聖心付以其事興役踰年功已有叙而害能者巧為沮止不終厥功陜右之人至今為恨某每思神宗皇帝知其利而欲興之意與先祖盡其力而被沮之恨某未嘗不憤歎至於流涕也閣下嘗尹長安矣必聞其事今則又非昔年之比也涇水低下渠口髙仰灌溉之功㡬盡廢矣民用困乏物斛湧貴職此之由今方外有不順之羌師旅之興儲偫為急誠使秦中嵗増榖數百千萬斛所濟豈不甚大某關西陋儒也自㓜小稔知其事人㣲處遠無由自伸其憤鬰幸遇僕射相公以經緯之才逢時得君以天下事為已任某是以敢不避狂妄之誅塵瀆鈞聼倘䝉采録或致成功不使先祖抱恨泉下則某平生志願足矣上謝帥師直書頤皇恐上書於知府安撫寶文閣下頤至愚學道㡬五十年惟是自信行其所知不敢為世俗所移知之罪之則繫乎人焉伏覩律節文諸醫為人合藥誤不如本方殺人者徒二年半故不如本方殺傷人者以故殺傷論雖不傷人杖六十古人造律之意非特矜死者之無辜亦以警懼庸醫使不敢輕妄致害人命則其為益豈不甚大近世以來律雖存而實不用俗吏拘文乃云律稱合藥誤不如本方若用藥不如方論雖日殺千人法所不禁官不當治也遂使庸醫輩肆其盲妄無所忌憚殺人如麻耳目所聞見士大夫為庸醫反陰陽背方論而殺之者不可勝數况天下之大民庶之衆可勝言哉獨嘉祐中族兄大中嗣宗知扶溝縣嘗以醫者用藥過劑殺人送府鞭其背過劑乃用藥之失非合藥誤也當時衆論稱之蓋他人未嘗用此律故也今死者之家莫肯與醫者辨者其故有三以當官者無愛人之心苟欲省事不肯為之窮辨一也與醫者習熟不忍訟之二也慮今而後難復用藥三也是皆以利害為心而不顧骨肉之義知其寃死而不為之辨骨肉之義絶矣既不能辨則為之詞曰彼無惡意又曰訟之無益矣又曰已之命也此皆至愚不知義理之言彼有惡意自當從故殺傷之法此律正為無故意者設也辨之所以申骨肉之義豈繫有益無益也謂已之命則為人毆而殺之亦可以不校矣世之人雖其父母本非死疾為醫所殺隱忍而不辨者多矣衆人觀之亦不以為非也習俗之迷人也如是今之士大夫使馬醫治馬誤殺馬而杖馬醫者目所常見耳所常聞衆人不以為非也至以父母骨肉為醫所殺而責醫者則未嘗見豈愛親不若愛馬乎愚惑不思之甚也凡人之疾病誤醫者多矣若風疾與氣藥肝病而攻脾之類雖不中病未能害人其死乃病死未得為醫殺之也若醫經明言下之則死是不下則不死也今下而殺之與操刅而㫁其喉何異古人立法原其意本不惡故罪止於徒恕之至也若聽其妄殺人而不加治豈為政之道乎姪子某為令醴泉病陰證傷寒而邑之醫者乃大下之又與洗心散遂至寃死今有狀披訴伏惟明公居大帥之任操勸懲之柄經術政事聞於天下髙識逺見卓然絶俗法之所無者尚可權其宜而行之况有法可依者乎民之於令其義最重致令之死而不加一毫之罪於義得為安乎竊聞邑中憤歎不平之聲聞於道路豈當任者獨不念之乎重思閣下天下吏師誠能行之郡縣必多效之者若使遠近傳之庸醫之輩皆知戒懼不敢輕視人命則公及人之功豈細也哉匪惟先兄父子懷結草之報當獲上天之祜後昆享繁衍盛大之福不勝哀懇頤皇恐上訴與金堂謝君書頤啓前月末呉齋郎送到書信即遞中奉報計半月方逹冬寒逺想雅履安和僑居旋為客次日以延望乃知止行甚悒悒也來春江水穩善候有所授能一訪甚佳只云忠涪間看親人必不疑也頥偕小子甚安來春本欲作春秋文字以此無書故未能却先了論孟或禮記也春秋大義數十皎如日星不容遺忘只恐㣲細義例老年精神有所漏落且請推官用意尋究後日見助如往年所説許止蔡般書𦵏類是也若欲治易先尋繹令熟只看王弼胡先生王介甫三家文字令通貫餘人易説無取枉費功年亦長矣宜汲汲也未相見間千百愼愛十一月初九日頥啓知縣推官答周孚先問并跋問先生舊語門人云天下至忙者無如禪客市井之人雖曰營利猶有休息時禪客行住坐卧無不在道存無不在道之心便是至忙孚先竊謂此語如孟子所謂必有事焉而勿正心勿忘勿助長也若正若助長即是忙也或者謂此語非為學者設謂以聖人方之禪客未嘗閒若學者須是行住坐卧在道存無不在道之心便是助長方其學也固當有事亦當知助長之非問書曰惟聖罔念作狂惟狂克念作聖孚先竊謂聖者謂有聖人資質一不念則流入於狂狂者進取曽晳之徒是也借如顔子不能拳拳服膺亦必至於此若是聖人則從心所欲不踰矩雖不念亦無害也六徳知仁聖義中和聖通眀之稱狂狂愚之稱問孔子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽孚先竊謂樂山樂水狀仁知之體動靜述仁知之用樂與壽眀仁知之効知則能知之能知之則務窮物理務窮物理則運用不息故樂水水謂其周流也故動動謂其理之無窮也故樂樂謂其無疑也仁則能體之能體之則有得於所性有得於所性則循理而行之故樂山山謂其安止也故靜靜謂其無待於外也故壽壽謂其逹生理也言意未能體仁知且宜潛思問孔子曰知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也孚先竊謂此語是告學者亦是入道之序故知及之者見得到也仁能守之者孳孳於此也莊以涖之者外設藩垣以逺暴慢也動之以禮觀時應用皆欲中節也或者謂此是人君事臨政處已莫不皆然所謂仁能守之者孳孳於此也此言未能盡仁且宜致思仁則安矣所以云守也孚先舊講習太學建中靖國庚辰冬過洛陽游伊川先生之門預羣弟子之列親炙模範時聞誨語越眀年暮春歸省庭闈期嵗復入學以所疑為書請質於先生皆得親筆開諭逮今㡬四十年矣以今日視前日固知學之不博問之不切日月逝矣功不加倍祗益自歉紹興丁巳冬周孚先謹書答周閎中書易傳未傳自量精力未衰尚覬有少進耳然亦不必直待身後覺耄則傳矣書雖未出學未嘗不傳也第患無受之者耳來書云易之義本起於數謂義起於數則非也有理而後有象有象而後有數易因象以眀理由象而知數得其義則象數在其中矣必欲窮象之隠㣲盡數之毫忽乃尋流逐末術家之所尚非儒者之所務也管輅郭璞之徒是也理無形也故因象以眀理理既見乎辭矣則可由辭以觀象故曰得其義則象數在其中矣答楊時書頥啓相别多年常深渴想前日自伊川歸得十一月十五日南康發來書知赴新任體况安佳甚慰逺懐頥如常自去冬來多在伊川見謀居伊力薄未能遽成耳朝廷設教官蓋欲教人修身齊家治國平天下之道苟能修職則不素餐兮孰大於是赴省試令子不知其名中第可喻及也名廸者好學質美當成逺器應未有北來期兩小子大者項城尉小者鄢陵尉承問故及之此獨與諸孫處嵗計稔則自餘無足道春暄惟進學自愛不宣頥啓楊君敎授三月六日答楊廸書相别累月思渴前承恵書恐已出京故不復奉答近又收書乃知未行喜聞夏暑安佳前書所問心迹之説固知未能無疑也若以心迹有判則象憂亦憂乃偽矣是宜精索未易曉也又云有道又有易何如此語全未是更將傳序詳思當自通矣變易而後合道易字與道字不相合也大率所論辭與意太多孔孟之門人豈能盡與孔孟同唯其不敢信已而信其師之説是以能思而卒同也若紛然致疑終亦必亡而已勉之勉之盛暑在途千百自愛答門人書前者奉答適病倦不能詳後来親知講論㡬盈箱矣設端雖多大率意不相逺於大㮣尚弗識况屈伸久速之際乎平日不謂至如是豈皆知不足以及之蓋為衆説漂喣不能自立耳此由見信不篤故也孔孟之門豈皆賢哲固多衆人以衆人觀聖賢弗識者多矣惟其不敢信已而信其師是故求而後得今諸君於頥言纔不合則置不復思所以終異也不可便放下更且思之致知之方也姑求自曉無庸他恤深尤不知者甚無謂也答鮑若雨書并答問頥咨諸君處常問知動止忽領恵書審已安康其慰可知頥如常不煩見念示及所疑百忙中謝君告行不暇周悉略奉答思之可也夏暑千百善愛五月十日頥咨鮑君秀才疑難六謹寫拜呈伏乞詳賜指諭若雨拜覆佛氏輪廻之説凡為善者死則復生為善人為惡者死則變而為禽獸之類雖無此實應竊恐有此理何則凡稟冲氣以生者未始不同聖人先得人之所同者而踐履之故能保全太和至死其氣冥㑹於中和之所造化之中自然有復生為人之理愚者平居作惡而冲氣已䘮至死其氣則㑹於繆戾之所造化之中自然有為禽獸之理故曰恐有此理也夫子曰未知生焉知死知生則知死矣能原始則能要終矣易曰陰陽不測之謂神又曰神妙萬物而為言觀此則佛氏所謂鬼神者妄矣然祖考來格敬鬼神而逺之之說則似乎有佛氏所謂意者氣類感應處便是來格但當至誠不當䙝近近得却有也不知此說如何潛心久當自眀孟子曰其為氣也至大至剛以直養而無害則塞於天地之間嘗謂凡人氣量窄狹只為私心隔㫁苟以直養而無害則無私心苟無私心則志氣自然廣大充塞於天地之間氣象自可以意㑹而莫能狀者此所謂難言也或謂塞于天地之間只是到處去得此言似無氣味如是涵養樂正子見孟子孟子曰子亦來見我乎云云觀此一篇都無聖人氣象或謂樂正子從子敖有激而云不得不然此無疑眞孟子之言今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣此言是子路說耶孔子說耶仲尼言孟子曰不孝有三無後為大所謂二不孝何如説者謂陷父於不義與家貧親老不求祿仕竊恐不然何以知不然所謂祿仕凡所以養皆同定親書頥啓伏以古重大婚蓋將傳萬世之嗣禮稱至敬所以合二姓之歡顧族類之非華愧聲猷之弗競不量非偶妄意髙門以頥第㡬男雖已勝冠未諧受室恭承賢閣第㡬小娘子性質一作資甚茂徳容有光輙縁事契之家敢有婚姻之願豈期謙厚遽賜允從穆卜良辰恭伸言定有少儀物具如别牋又書不量衰族久慕髙閎輙慿咫尺之書已諾婚姻之好有少儀物具如别牋答求婚書頥啓族望非髙聲猷弗競猥䝉謙眷屢致勤誠爰稽合姓之文將卜宜家之慶伏承某人性質挺立器藴夙成以頥第㡬女子年已及笄義當有適特枉緘題之及俾交秦晉之歡仰認深誠敢言非偶在姆師之訓雖愧未閑而箕箒之勤願俾恭事二程文集卷十

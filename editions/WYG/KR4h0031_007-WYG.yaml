body:
  text: 二程文集巻七伊川文集二宋程頤撰表疏辭免西京國子監教授表元豐八年十一月臣頤言今月日准汝州牒送到官誥一道伏䝉聖恩授臣汝州團練推官充西京國子監敎授者臣愚陋小儒晦處草野忽承明命不任震驚中謝伏念臣才識迂疎學術膚淺自治不足焉能敎人豈敢貪冒寵榮致朝廷於過舉所降誥命不敢當受謹奉表辭免以聞再辭免表臣頤言今月日准汝州牒備到尚書禮部符奉聖㫖不許辭免恩命者中謝伏以皇帝陛下嗣位之初方圗大治首拔一人於􅅵畝之中宜得英異之才寘之於位則天下聳動知朝廷急賢不特濟一時之用足以為後世之光今乃取庸常之人命之以官則天下何望後世何觀朝廷之舉也何為臣之受也何義臣雖至愚敢貪寵禄以速戾厥躬是以罔虞刑威而必盡其辭也臣願陛下擴知臣之明以照四方充取臣之心以求真賢求之以其方待之以其道雖聖賢亦將為陛下出况如臣者何足道哉冒犯天嚴臣無任戰恐激切屏營之至辭免館職狀元祐元年閏二月二十四日伏䝉聖恩授臣宣德郎秘書省校書郎聞命震驚不知所措臣昨䝉恩授西京國子監敎授方再具辭免奉聖㫖令乘遞馬赴闕祗命而來未獲進見遽然有此除授伏念臣草萊之人既䝉賜召禮合見君先受恩命義理未安况祖宗朝布衣被召者故事具存伏望聖慈令臣入見所降誥命不敢當受伏候勅㫖乞再上殿論經筵事劄子新授汝州團練推官西京國子監敎授臣程頤右臣昨日上殿辭免前降恩命面奉德音除臣崇政殿説書臣雖瀝懇辭避不䝉俞允臣輒有愚誠昧死上聞天聽竊以知人則哲帝堯所難雖陛下聖鑒之明然臣方獲進對於頃刻之間陛下見其何者遽加擢任今取臣於􅅵畝之中驟置經筵葢非常之舉朝廷責其報效天下之所觀矚茍或不當則失望於今而貽譏於後可不慎哉臣亦未敢必辭只乞再令臣上殿進劄子三道言經筵事所言而是則陛下用臣為不誤臣之受命為無愧所言而非是其才不足用也固可聽其辭避如此則朝廷無舉動之過愚臣得去就之宜伏望聖慈特賜俞允臣無任貼黄臣不候命下便有奏陳葢欲朝廷審處於未授之前免煩囘改成命貼黄如以臣昨日已上殿只乞指揮許臣實封劄子進呈逐一分明貼黄亦與口陳無異論經筵第一劄子臣伏觀自古人君守成而致盛治者莫如周成王成王之所以成德由周公之輔養昔者周公輔一作傅成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士大夫家善敎子弟者亦必延名德端方之士與之居處使之薰染成性故曰少成若天性習慣如自然伏以皇帝陛下春秋之富雖睿聖之資得於天亶而輔養之道不可不至所謂輔養之道非謂告詔以言過而後諫也在涵養薰陶而已大率一日之中親賢士大夫之時多親寺人宫女之時少則自然氣質變化德器成就欲乞朝廷慎選賢德之士以待勸講講讀既罷常畱二人直日夜則一人直宿以備訪問皇帝習讀之暇游息之間時於内殿召見從容宴語不獨漸磨道義至於人情物態稼穡艱難積久自然通達比之常在深宫之中為益豈不甚大竊聞間日一開經筵講讀數行羣官列侍儼然而退情意略不相接如此而責輔養之功不亦難乎今主上沖幼太皇太后慈愛亦未敢便乞頻出但時見講官久則自然接熟大抵與近習處久熟則生褻慢與賢士大夫處久熟則生愛敬此所以養成聖德為宗社生靈之福天下之事無急於此取進止貼黄臣竊料衆人之意必以為皇帝尚幼未煩如此此乃淺近之見夫幼而習之為功則易發然後禁禮經所非古人所以自能食能言而敎者葢為此也第二臣聞三代之時人君必有師傅保之官師道之敎訓傅傅其德義保保其身體後世作事無本知求治而不知正君知規過而不知養德傅德義之道固已疎矣保身體之法復無聞焉伏惟太皇太后陛下聰明睿哲超越千古皇帝陛下春秋之富輔養之道當法先王臣以為傅德義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜存畏慎之心臣欲乞皇帝左右扶侍祇應宫人内臣並選年四十五已上厚重小心之人服用器翫皆須質朴一應華巧奢麗之物不得至於上前要在侈靡之物不接於目淺俗之言不入於耳及乞擇内臣十人充經筵祇應以伺候皇帝起居凡動息必使經筵官知之有翦桐之戲則隨事箴規違持養之方則應時諫止調䕶聖躬莫過於此取進止貼黄今不設保傅之官傅德義保身體之責皆在經筵皇帝在宫中語言動作衣服飲食皆當使經筵官知之第三臣竊以人主居崇髙之位持威福之柄百官畏懼莫敢仰視萬方承奉所欲隨得茍非知道畏義所養如此其惑可知中常之君無不驕肆英明之主自然滿假此自古同患治亂所繫也故周公告成王稱前王之德以寅畏祗懼為首從古以來未有不尊賢畏相而能成其聖者也皇帝陛下未親庶政方專問學臣以為輔養聖德莫先寅恭動容周旋當主於此歳月積習自成聖性臣竊聞經筵臣寮侍者皆坐而講者獨立於禮為悖欲乞今後特令坐講不惟義理為順所以養主上尊儒重道之心取進止貼黄竊聞講官在御案旁以手指書所以不坐欲乞別一人指書講官稍逺御案坐講貼黄臣竊意朝廷循沿舊體只以經筵為一美事臣以為天下重任唯宰相與經筵天下治亂繫宰相君德成就責經筵由此言之安得不以為重辭免崇政殿說書表臣頤言准閤門告報伏䝉聖恩除臣通直郎充崇政殿說書者臣昨上殿面奉德音已嘗瀝懇辭避及繼有陳奏愚誠已竭天聽不回中謝竊以儒者得以經術進說於人主之前言信則志行自昔抱道之士孰不願之顧恨弗獲臣何人哉有此遭遇然臣竊觀前古君臣道合靡不由至誠感動信以發志今臣道未行於家室善未信於鄉黨何足以感動人主之心乎茍不度其誠之未至而欲善辭說於進對之間為一時之觀則可矣必欲通於神明光於四海久誠而無斁臣知其不可也臣是以欲進而思義喜時而愧已冒犯天威而盡其區區之説伏以皇帝陛下春秋之富方賴左右前後之人輔養聖性勸講之職任莫重焉竊惟海宇之廣賢俊至多臣願朝廷博謀羣臣旁加收擇期得出類之賢寘諸左右輔成聖德為廟社生靈之福如臣之愚實懼不足以當重任所有誥命不敢當受謹奉表辭免以聞再辭免狀臣䝉恩授通直郎崇政殿說書尋具表辭免准尚書省劄子奉聖㫖不許辭免者臣聞古之人見行可而後仕臣雖至愚讀書為儒敢不先民是憲臣近進劄子三道未聞進止伏望聖慈更賜省覽如小有可用則臣受命不敢復辭或狂妄無取則乞許臣辭避所貴朝廷無取人之失小臣盡進退之道臣山野之人不能文飾傾竭悃誠願賜開納伏候勅㫖乞六參日上殿劄子元祐元年四月臣竊以朝廷置勸講之官輔導人主豈止講明經義所以薰陶性質古所謂承弼厥辟出入起居者焉宜朝夕納誨以輔上德自來暑熱罷講直至中秋方御經筵數月之間講讀官無由進見夫以文武之齊聖而欲旦夕承弼今乃數月不接儒臣甚非先王輔導養德之意方主上春秋之富輔養之道豈可疎略如此臣欲乞未御講筵每遇六參日宰臣奏事退許講讀官上殿問聖體數日一對儒臣不惟有益人主在勸講之禮亦當然伏望聖慈特賜俞允上太皇太后書元祐元年六月日具位臣程頤昧死再拜上書太皇太后陛下臣愚鄙之人自少不喜進取以讀書求道為事於兹幾三十年矣當英祖朝暨神宗之初屢為當塗者稱薦臣於斯時自顧學之不足不願仕也及皇帝陛下嗣位太皇太后陛下臨朝求賢願治大臣上體聖意搜揚巖穴首及微賤䝉恩除西京學官臣於斯時未有意於仕也辭避方再而遽有召命臣門下學者促臣行者半勸臣勿行者半促臣行者則曰君命召禮不俟駕勸臣勿行者則曰古之儒者召之則不徃臣以為召而不往惟子思孟軻則可葢二人者處賓師之位不往所以規其君也已之微賤食土之毛而為王民召而不至邦有常憲是以奔走應命到闕䝉恩授館職方以義辭遂䝉召對臣於斯時尚未有意於仕也進至亷前咫尺天光未嘗敢以一言及朝政陛下視臣豈求進者哉既而親奉德音擢至經筵事出望外惘然驚惕臣竊内思儒者得以道學輔人主葢非常之遇使臣自擇所處亦無過於此矣臣以斯時雖以不才而辭然許國之心實已萌矣尚慮陛下貪賢樂善果於取人知之或未審也故又進其狂言以覬詳察曰如小有可用則敢不就職或狂妄無取則乞聽辭避章再上再命祇受是陛下不以為妄也臣於是受命供職而來夙夜畢精竭慮惟欲主上德如堯舜異日天下享堯舜之治廟社固無窮之基乃臣之心也臣本山野之人禀性朴直言辭鄙拙則有之矣至於愛君之心事君之禮告君之道敢有不盡上賴聖明可以昭鑒臣自惟至愚䝉陛下特達之知遭遇如此願効區區之誠庶幾毫髪之補惟陛下畱意省覽不勝幸甚伏以太皇太后陛下心存至公躬行大道開納忠言委用耆德不止維持大業且欲興致太平前代英主所不及也但能日慎一日天下之事不足慮也臣以為今日至大至急為宗社生靈長久之計惟是輔養上德而已歴觀前古輔養幼主之道莫備於周公周公之為萬世之法也臣願陛下擴髙世之見以聖人之言為可必信先王之道為可必行勿狃滯於近規勿遷惑於衆口古人所謂周公豈欺我哉周公作立政之書舉言常伯至於綴衣虎賁以為知恤兹者鮮一篇之中丁寧重複惟在此一事而已又曰僕臣正厥后克正又曰后徳惟臣不德惟臣又曰侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽是古人之意人主跬步不可離正人也葢所以涵養氣質薰陶德性故能習與智長化與心成後世不復知此以為人主就學所以涉書史覽古今也不知涉書史覽古今乃一端爾若止於如是則能文宫人可以備勸講知書内侍可以充輔導何用置官設職精求賢德哉大扺人主受天之命禀賦自殊歴考前史帝王才質鮮不過人然而完德有道之君至少其故何哉皆輔養不得其道而位勢使之然也伏惟皇帝陛下天資粹美德性仁厚必為有宋令主但恨輔養之道有未至爾臣供職以來六侍講筵但見諸臣拱手黙坐當講者立案傍解釋數行而退如此雖彌年積歳所益幾何與周公輔養成王之道殊不同矣或以為主上方幼且當如此此不知本之論也古人生子能食能言而敎之大學之法以豫為先人之幼也知思未有所主便當以格言至論日陳於前雖未曉知且當薫䀨使盈耳充腹久自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長私意一作思慮偏好生於内衆口辯言鑠於外欲其純完不可得也故所急在先入豈有太早者乎或又以為主上天資至美自無違道不須過慮此尤非至論夫聖莫聖於舜而禹臯陶未嘗忘規戒至曰無若丹朱好慢遊作傲虐且舜之不為慢遊傲虐雖至愚亦當知之豈禹而不知乎葢處崇髙之位儆戒之道不得不如是也且人心豈有常哉以唐太宗之英睿躬歴艱難力平禍亂年亦長矣始惡隋煬侈麗毁其層觀廣殿不六七年復欲治乾陽殿是人心果可常乎所以聖賢雖明盛之際不廢規戒為慮豈不深逺也哉况沖幼之君閑邪拂違之道可少懈乎伏自四月末間以暑熱罷講比至中秋葢踰三月古人欲旦夕承弼出入起居而今乃三月不一見儒臣何其與古人之意異也今士大夫家子弟亦不肯使經時累月不親儒士初秋漸涼臣欲乞於内殿或後苑清涼處召見當日講官俾陳説道義縱然未有深益亦使天下知太皇太后用意如此又一人獨對與衆見不同自然情意易通不三五次便當習熟若不如此漸致待其自然是輔導官都不為力將安用之將來伏假既開且乞依舊輪次直日所貴常得一員獨對開發之道葢自有方朋習之益最為至切故周公輔成王使伯禽與之處聖人所為必無不當真廟使蔡伯希侍仁宗乃師古也臣欲乞擇臣寮家子弟十歳已上十二已下端謹頴悟者三人侍上左右上所讀之書亦使讀之辨色則入昏而罷歸常令二人入侍一人更休每人擇有年宫人内臣二人隨逐看承不得暫離常情笑語亦勿禁止唯須言語必正舉動必莊仍使日至資善堂呈所習業講官常加敎勸使知嚴憚年纔十三便令罷去歳月之間自覺其益自來宰臣十日一至經筵亦止於黙坐而已又間日講讀則史官一人立侍史官之職言動必書施於視政之時則可經筵講疑一作肄之所乃燕處也主上方問學之初宜心泰體舒乃能悅懌今則前對大臣動虞有失旁立史官言出輒書使上欲游其志得乎欲發於言敢乎深妨問學不得不改欲乞特降指揮宰臣一月兩次與文彥博同赴經筵遇宰臣赴日即乞就崇政殿講說因令史官入侍崇政殿說書之職置來已久乃是講說之所漢唐命儒士講論亦多在殿上葢故事也邇英迫狹講讀官内臣近三十人在其中四月間尚未甚熱而講官已流汗况主上氣體嫩弱豈得為便春夏之際人氣烝薄深可慮也祖宗之時偶然在彼執為典故殊無義理欲乞今後只於延和殿講讀後楹垂簾簾前置御座太皇太后每遇政事稀簡聖體康和時至簾下觀講官進説不惟省察主上進業於陛下聖聰未必無補兼講官輔導之間事意不少有當奏禀便得上聞亦不可煩勞聖躬限以日數但旬月之間意適則往可也今講讀官共五人四人皆兼要職獨臣不領別官近復差修國子監太學條制是亦兼他職也乃無一人專職輔導者執政之意可見也葢惜人才不欲使之閒爾又以為雖兼他職不妨講讀此尤不思之甚也不敢言告君之道只以告衆人言之夫告於人者非積其誠意不能感而入也故聖人以蒲蘆喻敎謂以誠化之也今夫鍾怒而擊之則武悲而擊之則哀誠意之感而入也告於人亦如是古人所以齋戒而告君者何謂也臣前後兩得進講未嘗敢不宿齋豫戒潛思存誠覬感動於上心若使營營於職事紛紛其思慮待至上前然後善其辭説徒以頰舌感人不亦淺乎此理非知學者不能曉也道衰學廢世俗何嘗聞此雖聞之必以為迂誕陛下髙識逺見當䝉鑒知以朝廷之大人主之重置二三臣專職輔導極非過當今諸臣所兼皆要官若未能遽罷且乞免臣修國子監條制俾臣夙夜精思竭誠專在輔導不惟事理當然且使天下知朝廷以為重事不以為閑所也陛下擇臣於草野之中葢以其讀聖人書聞聖人道臣敢不以其所學上報聖明竊以聖人之學不傳久矣臣幸得之於遺經不自度量以身任道天下駭笑者雖多而近年信從者亦衆方將區區駕其說以示學者覬能傳於後世不虞天幸之至得備講説於人主之側使臣得以聖人之學上沃聖聰則聖人之道有可行之望豈特臣之幸哉如陛下未以臣言為信何不一賜訪問臣當陳聖學之端緒發至道之淵微陛下聖鑒髙明必䝉照納如其妄偽願從誅殛臣愚不任懇悃惶懼待罪之至辭免判登聞鼓院奏狀元祐元年八月臣今月二十二日准尚書省黄牒奉勑差臣兼權判登聞鼓院臣不敢避斧鉞之誅傾瀝悃誠上煩天聽竊以勸講之官體宜專任臣昨於六月中所進文字論之甚詳不敢重疊敘陳伏望聖慈將臣前來文字再賜省覽惟求義理之當不以臣微賤而廢其言前件勑命不敢當受伏乞特降睿㫖許令辭免冒凟宸嚴臣無任貼黄自來鼓院官出入以時若使兼領遇講説日或有急訴訟必須畱滯伏望聖慈特賜詳察再辭免狀臣准尚書省劄子以臣辭免兼權判登聞鼓院奉聖㫖不許辭免者微賤小官冒凟天威甘從顯戮既荷朝廷寛大之賜敢復盡其區區之誠如陛下擢臣草野之中置之勸講之列天下聳然知陛下崇儒重道畱意大本豈特一時之美事足一作將為後世之盛談今復命臣兼判鼓院使臣入則侍人主而談道德出則坐司局而領訴訟臣愚竊謂失朝廷用人之體况臣禀性朴愚唯知為學今時之務皆所未諳使臨事局必致廢闕若得專心致志窮研聖學以備顧問臣愚不勝至願伏望聖慈矜察特許辭免伏候勅㫖論冬至稱賀劄子元祐元年臣伏聞冬至日百官拜表稱賀臣以為節序變遷時思方切若受表賀大失居喪之禮萬方後世輕笑朝廷無以風化天下臣欲乞特降中㫖改賀作慰臣備員勸講職在以經術輔導人主見此違經失禮不敢不言取進止貼黄臣竊慮聖意以去年冬至及今歳旦已受賀表不欲改更此甚不然後是可以葢前非改過不吝成湯所以稱聖也又上太皇太后疏元祐二年春臣頤傾竭愚誠冒聞天聽狂妄之誅非所敢避伏念臣草萊賤士䝉陛下拔擢置之勸講之列夙夜畢精竭慮思所以補報萬一昨於去年六月中嘗有奏陳言輔導人主之事已踰半年不䝉施行一事臣愚竊思所言甚多如皆不可用其狂妄亦甚矣雖朝廷寛大不欲以言罪人然主上春秋方富宜親道德之士豈可以狂妄之人置之左右臣彷徨疑慮不能自已况臣所言非出已意皆先王之法祖宗之舊不應無一事合聖心者臣竊疑文字煩多陛下不能詳覽或雖䝉覽而未察愚意臣不敢一一再言止取一事最切者復為陛下陳之臣前上言乞於延和殿講讀太皇太后每遇政事稀簡聖體康和時至簾下觀講官進說不惟省察主上進業於陛下聖聰未必無補兼講官輔導之間事意不少有當奏禀便得上聞臣今思之太皇太后雙日垂簾聽政隻日若更親臨講讀亦恐煩勞聖躬欲乞只就垂簾日聽政罷聖體不倦時召當日講官至簾前問當主上進業次第講説所至如何開益使天下知陛下於輔養人主之道用意如此延對儒臣自古以為美事陛下試從臣言後當知其不謬此一時之事且非定制如其無益罷之何晩自來經筵賜坐啜茶葢人主崇儒重道之體今太皇太后省察主上進業雖或使之講説亦無此禮臣所以再言此一事者葢輔導之間有當奏知之事無由上達若得時至簾前可以陳説所繫甚大陛下必謂主上幼沖間日講讀足矣更無他事此甚不然葢從前不曽有為陛下極陳輔養少主之道者故陛下未深思爾願陛下聖明不以臣之微賤而忽其言察臣區區之心豈有他哉惟欲有補於人主爾臣披瀝肝膽言盡於此伏望聖慈采納天下幸甚乞就寛涼處講讀奏狀元祐二年三月二十六日臣伏見邇英閣講讀入夏漸熱去年四月後侵晨講讀亦甚有暑氣恐於聖體非宜欲乞特降聖㫖移就一寛涼處貴得穏便謹録奏聞伏候勅㫖貼黄雖祖宗以來只在邇英緣主上聖體少嫩尤須過意慎護祖宗法度固有不可改者至於講讀處所即無不可從便之理貼黄如别無穏便只乞就崇政或延和殿隻日講讀與雙日垂簾自不相妨又上太皇太后書元祐二年四月月日具位臣程頤昧死再拜上書太皇太后陛下臣近言邇英講讀漸熱乞移就寛涼處貼黄稱如别無穏便處所只乞就崇政或延和殿竊聞給事中顧臨有言以延和講讀為不可臣本謂邇英熱恐於聖體非宜今聞修展邇英苟得寛涼則臣志願遂矣於臨之言在臣自可不恤然有所甚害不得不為陛下辨之若臨之言止於移惑太皇太后聖意臣官非諫諍不辨尚可也今以臨言為是則誤主上知見臣職當輔導安得不辨臣竊謂自古國家所患無大於在位者不知學在位者不知學則人主不得聞大道朝廷不能致善治不聞道則淺俗之論易入道義之言難進人君功德髙下一繫於此臣非敢以諛言悅陛下竊聞陛下博覽前史請陛下歴觀簡策前世母后臨朝有不壞紀綱者乎有以至公為心孜孜求治為英主之事如陛下者乎此陛下所自知也陛下有簡策所無乏盛德則天下亦望陛下為簡䇿所無之功業不止維持歳月俟人主長大而已葢望陛下致海内於治安詒孫謀於久大詒謀致治之道當使聖德日躋善治日新進德在於求道圗治莫如稽古道必詢於有道之士古必訪諸稽古之人若夫世俗淺士以守道為迂以稽古為泥適足惑亂人主之聽近年以來士風益衰志趣汙下議論鄙淺髙識逺見之士益少習以成風矣此風不革臣以為非興隆之象乃陵替之勢也大率淺俗之人以順從為愛君以卑折為尊主以隨俗為知變以習非為守常此今日之大患也苟如是者衆則人君雖有髙世之見豈能獨任哉臣不知進道德之言足以增益聖德者有幾而損陛下之逺圖移陛下之善意則有矣如顧臨之言是也臣料臨之意不過謂講官不可坐於殿上以尊君為説爾夫殿上講説義理之至當古者所常行也臣不暇逺引只以本朝故事言之太祖皇帝召王昭素講易真宗令崔頤正講書邢昺講春秋皆在殿上當時仍是坐講立講之儀只始於明肅太后之意此乃祖宗尊儒重道之盛美豈獨子孫當以為法萬世帝王所當法也而臨以為非臨謂講官不可坐殿上則昭素布衣之士其不可更甚矣邇英講讀只自仁宗時亦從便爾非是避殿上也若避殿上則不應置崇政説書之職雖以殿名設職不必須在本殿説書然亦必不肯於不可講説之處置説書官也臣每進講未嘗不規勸主上以祖宗美事為法如臨之意則是禁止主上不得復為優禮昭素之事及有崇政設職之意祖宗美事而使主上獨不得為若主上信以為然所損豈不甚大殿上説書亦是常事人主崇儒之道甚有重於此者臣今口未敢言然中心惟欲輔養主上重道之心如前代明王光耀史冊不止此一事而已臨之見與臣之心何其異也且講經與飲宴孰重真宗仁宗時皆宴講讀官於崇政殿從來侍宴皆在殿上而講經獨不得在殿上臣未諭其義也臨之意必曰彼一時之事爾日常則不可夫於義苟當日常何害義或不可一時亦不可也臣始言之執政大臣未以為非也及臨一言則是而從之以臣度之以臨之言為是者亦或有之若謂四五大臣皆以為是則必不然葢非難知之事不應四五人所見皆如是也特以陛下信臨之言而又迫於尊君之意故不敢言爾恐非以道事君之義今世俗之人能為尊君之言而不知尊君之道人君唯道德益髙則益尊若位勢則崇髙極矣尊嚴至矣不可復加也過禮則非禮強尊則不尊漢明帝於桓榮親自執業可謂謙屈矣周宣帝稱天自比上帝羣臣齋戒清身數日方得朝見可謂自尊矣然以理觀之漢明帝賢明之君百世所尊也周宣帝昏亂之主百世所賤也如臨之見則必以桓榮為不能尊君以周宣之臣為能尊君矣不知道之人益進不合理之言日聞雖人主聖明習熟見聞亦恐不能無損爾後世功業益卑先王粹美之道不復見於世者正由淺俗之論易信而得行爾夫先王之道雖未能盡行然稽古之心不可無也猶學者於聖賢之事雖未能盡行然希慕之心不可無也此乃進學求益之道今臨之意則以古先之事為不足法今日之事足矣不可更有進也此乃塞進善之門絶稽古之路方主上春秋之富進德之際而其所獻納如是使勸講官稍思職業敢不辨乎若陛下以臣言為非則狂妄之誅不可避也萬一以臣言為是則願陛下明示好古求道之意使朝廷在位皆知之雖鄙陋之人見陛下聖慮髙明不喜淺近亦將勉思義理不敢任其卑俗之見懼獲鄙於聖鑒矣誠如是則將見道學日明至言日進弊風日革為益孰大於此臣職當辨明義不敢黙臣無任懇切惶懼待罪之至論開樂御宴奏狀元祐二年夏臣伏覩有司排備開樂御宴臣備員勸講職在以經義輔導人主事有害義不敢不言夫居喪用喪禮除喪用吉禮因事而行乃常道也今若為開樂張宴則是特為一喜慶之事失禮意害人情無大於此雖曰故事祖宗亦不盡行或以故而罷或因事而行臣愚竊恐祖宗之意亦疑未安故也自古太平日久則禮樂純備葢講求損益而漸至爾雖祖宗故事固有不可改者有當隨事損益者若以為皆不可改則是昔所未遑今不得復作前所未安後不得復正朝廷之事更無損益之理得為是乎况先朝美事亦何嘗必行臣前日所言殿上講説是也故事未安則守而不改臣前日所言冬至受表賀是也臣前後累進狂言未嘗得䝉采用而言之不已者葢職之所當不敢曠廢伏望聖慈特賜聽納自中降㫖罷開樂宴直候因事而用於義為安冒瀆天威臣無任乞歸田里第一狀元祐二年十一月初六日臣昨任崇政殿說書忽奉勅差權同管勾西京國子監傳聞有言事官言臣罪狀臣既知是責命禮當奔走就職今已到任訖方敢傾瀝懇誠仰干天聽竊念臣本草萊之人因二三大臣論薦遂䝉朝廷擢任置之經筵授以朝階今既有罪不使勸講則所受之官理當還奪雖朝廷務存寛厚在臣義所難處伏望聖慈許臣納官歸田里以安愚分冒凟宸嚴臣無任貼黄若臣元是朝官朝廷用為說書雖罷說書却以朝官去乃其分也臣本無官只因說書授以朝官既罷說書獨取朝官而去極無義理第二狀十二月十八日臣今月十四日准河南府送到尚書省劄子一道以臣乞歸田里奉聖㫖不允所乞者聞命惶懼不知所安須至再竭悃誠上煩天聽臣昨自崇政殿說書受勑權同管勾西京國子監傳聞因諫官有言臣雖不知所言何事必是罪惡有實竊念臣畎畝之人因司馬光吕公著韓絳等以行義稱薦䝉朝廷受官今既有罪惡是無行義自當追奪以正誤朝廷之罪尚叨禄位有何義理臣愚竊意朝廷顧惜事體以嘗旌用不欲放棄臣竊以為不然始聞其善而用之陛下急賢之心也後見其惡而去之至公之道也伏望聖慈俯鑒丹誠許歸田里第三狀元祐三年春臣竊以見善而用見不善而退人主黜陟之至公道合則從不合則去儒者進退之大節黜陟失當則亂所由生進退忘義則道所由廢愚臣無狀䝉陛下擢自衡茅寘之勸講旋以人言至於黜逐朝廷信其惡矣愚臣道不用矣信其惡而使之在官恐非黜陟之當道不用而徒兹苟禄殊乖進退之義臣是以不敢遑寧繼上封章願歸田里待命三月未奉一作聞俞音在臣義既當去敢不固請與其至於凟而加罪曷若因其請而使去臣非不知享禄勝於躬耕貧匱不如温足顧以讀書為儒粗知廉恥不敢枉道以求苟安伏望聖慈矜察至誠俾完素守苟遂丘園之請敢忘天地之恩罔避誅夷必期俞允乞致仕第一狀臣伏自到任三具奏陳乞歸田里待命又已三月未得指揮在臣所以求去之義前後陳述盡矣不敢重疊煩凟聖聽竊以朝廷特起臣於畎畝之中寘之經筵使輔導人主非常之舉也既以罪去若包羞苟得不顧去就之義實懼萬世之下非笑聖朝之舉臣是以屢冒天威必期得請自古為臣陳力不能則致其仕禮也切恐朝廷顧惜事體既已招來不欲放棄臣更不敢乞歸田里只乞令臣致仕伏望聖慈察其懇誠特賜俞允第二狀臣自到任三請歸田一乞致仕至今未得指揮須至再竭懇誠仰冀省察方皇帝陛下嗣位之初太皇太后臨朝之始一新政事首及人才擢臣草野之中處以勸講之職觀陛下好賢之心可謂至矣惟陛下用人之意不其深乎歴觀簡策自古母后臨朝未有能為如此之事者豈止聳動一時足以輝光千古臣既遭遇如此宜有令德重望為朝廷光而乃德義不修誠意不至上不能取信人主下不能鎮服浮議遂致詆毁潛加罪釁陰積招延未幾斥逐隨至使陛下髙古之盛美翻為天下所譏議古之君子用之則其君尊榮今臣之進乃為聖明之累則臣之罪大矣尚以何義復齒仕列臣是以累上封章願歸田里臣若得去則天下後世當謂陛下前日招延雖不得獲上有道明哲保身之士猶不失行已有恥進退顧義之人則朝廷之舉未為大過二三大臣之薦未為甚欺故臣之累請不止自為亦所以為朝廷也不知臣者不以臣為忿躁必以為沽激臣豈然哉臣身傳至學心存事道不得行於時尚當行於已不見信於今尚期信於後安肯失禮害義以自毁於後世乎葢質之聖賢考之經義為當然爾况去就之義豈獨臣知之學道者所共知也願陛下遍詢輔臣臣之請為義乎為非義乎如以為非義是臣所學偏謬不敢避愚妄煩凟之罪如以為義則乞從臣之請或朝廷顧惜事體不欲使歸田里只乞令臣致仕辭免服除直秘閣判西京國子監狀元祐七年四月臣今月一日准河南府差人送到官誥一道伏䝉聖恩授臣左通直郎直秘閣權判西京國子監者臣昨被責命出為外官夙夜靡遑惟是内省始䝉招致之禮旋為為黜逐之人將胡顔以立朝當自劾而引去至於五請而未聽豈可力辯以求伸遂且從容以須替罷未及任滿遽丁家艱思無忝於所生惟堅持於素節未終喪制已降除書上體眷恩内深愧懼伏念臣志存守道識昧隨時俗所忌憎動招謗毁昨䝉擢任既以人言被黜為朝廷羞矣今復授以職任適足重為朝廷羞無所益於明時徒取笑於後世伏望聖慈矜察愚誠追寢恩命臣昨因丁憂既已去官今來所降誥命不敢祇受已於河南府寄納伏乞朝廷撿㑹臣前來五次奏陳特賜指揮許歸田里再辭免表臣頤言昨䝉聖恩授臣左通直郎直秘閣權判西京國子監尋具狀辭免今月十九日河南府送到尚書省劄子奉聖㫖不許辭免者斥逐之人分當逺引甄收之命義實難安中謝伏念臣力學有年以身任道唯知耕養以求志不希聞達以干時皇帝陛下詔起臣於草野之中面授臣以講說之職臣竊思之得以講學侍人主苟能致人主得堯舜禹湯文武之道則天下享唐虞夏商周之治儒者逢時孰過於此臣是以躍然有許國之心在職歳餘夙夜畢精竭慮葢非徒為辯辭解釋文義唯欲積其誠意感通聖心徯交發志之孚方進沃心之論實覬不傳之學復明於今日作聖之效逺繼於先王自二年春後來臣每進説陛下常首肯應臣臣知陛下聖資樂學誠自以謂千載之遇也而不思道大則難容跡孤者易躓入朝見嫉世俗之常態名髙毁甚史冊之明言如臣至愚豈免衆口不能取信於上而欲為繼古之事成希世之功人皆知其難也臣何狂簡敢爾覬幸宜其獲罪明時見嗟公論志既乖於事道義當致於為臣屢懇請而未從俄遭憂而罷去銜恤既終於喪制退身當遂於初心豈捨王哉忠戀之誠雖至不得已也去就之義當然自惟衰邁之軀得就安閒之地聞今傳後更有望於殘年行道致君甘息心於聖世豈期矜貸尚俾甄升恩雖甚隆義則難處前日朝廷不知其不肖使之勸學人主不用則亦已矣若復無恥以苟禄位孟子所謂是為壟斷也儒者進退當如是乎臣非苟自重實懼上累聖明使天下後世謂朝廷特起之士乃貪利苟得之人甚可羞也臣猶羞之况朝廷乎在臣無可受之理敢冒萬死上還恩命伏乞撿㑹臣前後累奏特賜指揮貼黄臣家傳忠孝世受國恩擢自草萊久侍經閣豈無愛君報國之心義迫當去無路自効惟今日冒死為陛下陳儒者進退之道為臣去就之義覬望有補乃區區上報之心也貼黄臣求去與辭官前後七章陳説進退之義既已詳明言亦盡於此矣皆據經義非出私意伏望聖明特賜省察謝管勾崇福宫狀元祐七年五月臣昨䝉聖恩除臣左通直郎直秘閣權判西京國子監兩具表狀免辭乞歸田里今月十日准勅特授左通直郎管勾西京嵩山崇福宫者誤䝉甄録再露封章不敢遜言惟盡敬主之意深陳古義葢存報國之心天聽至髙言已盡而誠孚未格君威難犯慮其凟而憂懼交深非特畏於刑章實願存於國體幸䝉寛貸豈敢頻煩臣更不敢固違朝命所降勅牒臣已領訖伏為見患腰跨拜受未得候痊損日謝恩就職次申河南府乞尋醫狀元祐七年八月頤昨准勅授左通直郎管勾嵩山崇福宫尋具奏聞為患腰跨拜受未得候痊損日謝恩就職次今來已滿百日未得痊安竊懼久稽朝命欲乞尋醫謹具申西京畱府伏乞依條施行辭免再除直秘閣判監狀元祐九年春臣今月十四日准河南府送到官誥一道尚書省劄子一道伏䝉聖恩授臣依前左通直郎直秘閣權判西京國子監專主教導者祇荷睿恩不任惶懼恭以皇帝陛下親政之初萬邦黎獻至于海隅蒼生夷狄蠻貊之人莫不仰首以觀傾耳而聽今聽政未及兩月而念及勸學舊臣收録於退藏之中兹見陛下聖明崇儒重道事無不察足以聳動天下然而處得其道用當其人乃允公論為盛美之事不然則四方傳議反累聖政伏念臣去年丁憂服闋之初已䝉朝廷授此職任臣以於義未安兩具奏辭免陳儒者進退之義已極詳明但恐微賤之言繫常程文字即以付外不曾得經聖覽既而改命祠宫遂以尋醫得去方安愚分忽被誤恩雖仰荷於甄收敢自渝其節守伏望聖慈曲憐舊物深鑒丹誠將臣前來辭免表狀特賜省覽則知臣所以辭者葢守古義非出私意所降誥命不敢祇受已於河南府寄納冒凟宸嚴臣無任再辭免狀臣昨䝉聖恩授臣依前左通直郎直秘閣權判西京國子監尋具狀辭免今月十七日河南府送到尚書省劄子一道奉聖㫖不許辭免者聞命惶懼不知所措臣聞邦有道危言危行邦無道危行言孫今主上親政之初臣未極其言而遽為孫言則不敬莫大乎是臣是以不避斧鉞之誅而必盡其辭也臣昨被恩命即具奏陳乞將臣丁憂服闋之初辭免表狀特賜省覽則知臣所以辭者葢守古義非出私意今奉聖㫖不許辭免臣誠至愚不喻朝廷之意不知以臣前日所陳進退之義為是乎為非乎若以為是則受為非義臣四十年學聖人之道敢以非義而受致朝廷於過舉乎若以臣前日所陳為非是臣狂妄不知義理狂妄不知義理之人使去宜也豈可處敎導之職不知使臣以何義受之臣竊思之豈非朝廷以臣微賤去就不足為輕重故忽棄其言陛下不經省覽而輔臣莫以告也臣誠微賤然臣之言本諸聖賢之言臣之進退守儒者進退之道雖朝廷不見省察臣恐天下後世有誦其言思其義而以進退儒者之道議朝廷也故臣區區愛君之意不能自已尚冀微誠感悟聖心謹昧死以聞不敢受命再凟宸嚴臣無任謝復官表元符三年十月臣頤言今月二十日准河南府送到官誥一道伏䝉聖恩授臣通直郎權判西京國子監者始竄遐荒分甘終廢豈期洪造復畀舊官仰荷恩私伏増愧懼中謝竊念臣天資愚暗自致放投既仰荷於寛恩如安居於樂土忽遇非常之宥繼䝉牽復之恩兹葢伏遇皇帝陛下道大兼容明無不照念先帝經筵之舊推至仁愛物之心臣敢不益善其身勵精所學期有傳於後世以上報於深恩二程文集巻七

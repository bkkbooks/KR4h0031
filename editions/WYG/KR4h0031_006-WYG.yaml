body:
  text: 二程文集巻六伊川文集一宋程頤撰奏疏為太中上皇帝應詔書臣珦言伏覩八月八日詔勑以比年以來水潦為沴八月庚寅大雨應中外臣僚並許上實封言時政闕失及當世利病此葢皇帝陛下承祖宗大業嚴恭天命祇畏警懼之深也天下士民欽聞德音茍有知見孰不願披忠瀝懇上達天聽臣雖至愚官為省郎職分郡寄敢不竭其區區之誠以應明詔惟陛下寛其狂易之誅賜之省覽則天下幸甚臣聞水旱之沴由陰陽之不和陰陽不和繫政事之所致是以自昔明王或遇災變則必警懼以省躬之過思政之闕廣延衆論求所以當天心致和氣故能消弭變異長保隆平昔在商王中宗之時有桑穀之祥髙宗之時有雊雉之異二王以為懼而修政行德遂致王道復興皆為商宗百世之下頌其聖明今陛下嗣位之初比年陰沴聖心警畏下明詔以求政之闕誠聖明之為也然臣觀近古以來引咎之詔自新之言亦世有之其如人君不由於至誠天下徒以為虚語豈復有如商之二宗興王道於既衰者乎臣願陛下因此天戒奮興善治思商宗之休實鑒後代之虚飾不獨消復災沴於今日將永保丕基於無窮伏觀詔㫖時政闕失當世利病可以佐元元者悉心以陳毋有所諱臣竊惟天下之勢所甚急者在安危治亂之機若夫指一政之闕失陳一事之利病徒為小補不足以救當世之弊而副陛下勤求之意也所謂安危治亂之機臣請條其大端所謂安且治者朝廷有綱紀權持總攝百職庶務天下之治如網之有綱裘之有領舉之而有條委之而不紊也郡縣之官得人而職修惠養有道朝廷政化宣達於下也百姓安業衣食足而有恒心知孝悌忠信之教率之易從勞之不怨心附於上固而不可摇也化行政肅無姦宄盜賊之患設有之不足為慮葢有殲滅之備而無響應之虞也民心和而陰陽順無水旱蟲螟之災雖有之不能為害葢倉廩實而府庫充官用給於上民食足於下也武備修而威靈振四方之民無敢不服雖有之不足為憂葢甲兵利而儲備豐將善謀而士素練也此六者所謂安且治者今之事一皆反是朝廷紀綱汗漫離散莫可總攝本原如此治將安出郡縣之官選不以道更易之數雖時謂才者尚莫能稱其職况庸常者乎循常茍安狃以成俗舉世以為當然政治廢亂生民困苦朝廷雖有惠澤孰能宣布以達於下所與共理者如此天下斯可知矣百姓窮蹙日以加甚而重斂繁賦消削之不息天下户口雖衆而自足者益寡司牧者治其事爾非有師保左右之也其善惡勤惰趨利避害或昧而反之一從其自然而困之陷之之道又非一塗人用無聊茍度歳月驅之於治則難格率之於惡則易摇民惟邦本本根如是邦國奈何民無生業極困則慮生不漸善敎思利而志動乘間隙則萌姦宄逼凍殍則為盜賊今兹幸無大故尚爾茍安設或遇大饑饉有大勞役奸雄一呼所在必應以今無事之時尚恐力不能制况勞擾多事之際乎天下安危實繫於此保民之道以食為本今自京師至於天下計平時之用率無三年之蓄民間空匱則又甚焉以萬室之邑觀之有厚蓄者百無二三困衣食者十居六七統而較之天下虚竭可知矣豐年樂歳飢寒見於道路一穀不稔便致流轉卒有方數千里連數年之水旱不知何以待之姦盗蜂起於内四裔乘隙於外雖欲為之末如何矣四裔強盛古未有比歳輸金帛以修好而好不可恃窮天下之力以養兵而兵不足用尚幸二㓂無謀厭小欲而忘大利故我得以紓朝夕之急若其連衡而來則必興數十萬之衆宿於邊境饋餉不繼財用不充將何以濟乎驕惰之兵縱無奔潰之患曠日持久終有窮極之虞又况征斂興發而人民轉亡饑饉愁怨而姦雄競起事至於此興衰可知以此觀之天下之勢安乎危乎凡此數端皆有危亡之虞而未至於是者不識朝廷制置能使之然耶抑亦天幸而偶然耶幸然之事其可常乎先皇帝至仁格天地保持之以至於今歴時既已久言者既已多朝廷遂以為果不足憂也可以常然姑維持之而已雖聞至深至切之言不為動也嗚呼貽天下之患必由於是乎今天下尚無事朝廷宜急思所以救時之道不然臣恐因循歳月前之所陳者一事至則為之晩矣中人之家有百金之産子孫保守不敢不念陛下承祖宗大業可不懼乎今言當世之務者必曰所先者寛賦役也勸農桑也實倉廩也備災害也修武備也明敎化也此誠要務然猶未知其本也臣以為所尤先者有三焉請為陛下陳之一曰立志二曰責任三曰求賢今雖納嘉謀陳善算非君志先立其能聽而用之乎君欲用之非責任宰輔其孰承而行之乎君相協心非賢者任職其能施於天下乎三者本也制於事者用也有其本不患無其用三者之中復以立志為本君志立而天下治矣所謂立志者至誠一心以道自任以聖人之訓為可必信先王之治為可必行不狃滯於近規不遷惑於衆口必期致天下如三代之世此之謂也夫以一夫之身立志不篤則不能自修况天下之大非體乾剛健其能治乎自昔人君孰不欲天下之治然而或欲為而不知所措或始銳而不克其終或安於積久之弊而不能改為或惑於衆多之論而莫知適用此皆上志不立故也臣觀朝廷每有善政鮮克堅守或行之而天下不從請舉近年一二事以明之朝廷以今之任人未嘗選擇一用薦舉之定式患所舉不得其人也故詔以飭之非不丁寧然而當其任者如弗聞也陛下以為自後所舉果得其人乎曾少異於舊乎又以守令數易之害治也詔廉察之官舉其有善政者俾之再任於今未聞有應詔者豈天下守令無一人有善政耶茍誠無之朝廷負生民不已甚乎且以為善而行之何不使天下奉承以見其效若曰非不欲必行也奈天下不從何如此則是政令不行矣將如天下何此亦在陛下而已茍陛下之志先立奮其英斷以必行之雖強大諸侯跋扈藩鎮亦將震慴莫敢違也况郡縣之吏乎故臣願陛下以立志為先如臣前所陳法先王之治稽經典之訓篤信而力行之救天下深沉固結之弊為生民長久治安之計勿以變舊為難勿以衆口為惑則三代之治可望於今日也若曰人君所為不可以易易而或失其害則大臣以為不然稽古而行非為易也歴觀前史自古以來豈有法先王稽訓典將大有為而致敗亂者乎惟動不師古茍安襲弊卒至危亡者則多矣事據昭然無可疑也願陛下不以臣之疎賤而易其言則天下幸甚所謂責任者夫以海宇之廣億兆之衆一人不可以獨治必賴輔弼之賢然後能成天下之務自古聖王未有不以求任輔相為先者也在商王髙宗之初未得其人則恭黙不言葢事無當先者也及其得説而命之則曰濟川作舟楫歳旱作霖雨和羮惟鹽梅其相須倚賴之如是此聖人任輔相之道也夫圗任之道以慎擇為本擇之慎故知之明知之明故信之篤信之篤故任之專任之專故禮之厚而責之重擇之慎則必得其賢知之明則仰成而不疑信之篤則人致其誠任之專則得盡其才禮之厚則體貌尊而其勢重責之重則其自任切而功有成是故推誠任之待以師傅之禮坐而論道責之以天下治陰陽和故當之者自知禮尊而任專責深而勢重則挺然以天下為已任故能稱其職也雖有姦諛巧佞知其交深而不可間勢重而不可摇亦將息其邪謀歸附於正矣後之任相者異於是其始也不慎擇擇之不慎故知之不明知之不明故信之不篤信之不篤故任之不專任之不專故禮之不厚而責之亦不重矣擇不慎則不得其人知不明則用之猶豫信不篤則人懷疑慮任不專則不得盡其能禮不厚則其勢輕而易摇責不重則不稱其職是故任之不盡其誠待之不以其禮僕僕趨走若吏史然文案紛冗下行有司之事當之者自知交不深而其勢輕動懷顧慮不肯自盡上懼君心之疑下虞羣議之奪故蓄縮不敢有為茍循常以圗自安爾君子弗願處也姦邪之人亦知其易摇日伺間隙如是其能自任以天下之重乎若曰非任之艱知之惟艱且何以知其賢而任之或失其人治亂所繫此人君所以難之也臣以為知人誠難亦繫取之之道如何爾臯陶為帝舜謨曰在知人禹吁而難之及其陳九德載采采則曰底可績葢詢行考實人焉廋哉歴觀前史自古以來豈有履道之士孝聞於家行著於鄉德推於朝廷節見於事為其言合聖人之道其施蹈經典之訓及用之於朝反致敗亂者乎用是而求其有差乎若乃人君以為賢而用之卒敗厥事者古亦多矣稽迹其由葢取之不以其道也大率以言事合於已心則謂之才而用之曽不循核本末稽考名實如前之云傷明害政不亦宜乎四海之大未始乏賢誠能廣聰明揚側陋至誠降禮求之以道雖臯夔伊周之比亦可必有賢德志道之士皆可得而用也願陛下如臣前所陳既堅求治之志則以責任宰輔為先待之盡其禮任之盡其誠責之盡其職不患其不為患其不能為不患其不能為患其不得為葢不為者可責之必為不能者可勉求而能惟不得為則已矣所謂不得為者君臣之志不通懷顧慮而不肯自盡此由失待任之道也今執政大臣皆先朝之選天下重望在陛下責任之而已臣願陛下召延宰執從容訪問今天下之事為安為危為治為亂當維持以度歳月乎當有為以救其弊乎如曰當為則願示之以必為之意詢之以所為之政審慮之力行之時不可後事不可緩也如曰非不為也患不能也則天下之廣豈無賢德可以禮問朝廷之上豈無英髦可以討論有先王之政可以考觀有經典之訓可以取則道豈逺哉病不求爾在君相協心勤求力為之而巳如曰無妄為也姑守常而已則在陛下深思而明辨之唐文宗之時大權漸奪天下將亂而牛僧孺欺以為治矣史冊書之可為明鑒今陛下聖明執政忠良無是事也願陛下不以臣之疎賤而易其言則天下幸甚所謂求賢者夫古之聖王所以能致天下之治無他術也朝廷至於天下公卿大夫百職羣僚皆稱其任而已何以得稱其任賢者在位能者在職而已何以得賢能而任之求之有道而已雖天下常用易得之物未有不求而得者也金生於山木生於林非匠者採伐不登於用况賢能之士傑出羣類非若山林之物廣生而無極也非人君搜擇之有道其可得而用乎自昔邦家張官置吏未嘗不取士也顧取之之道如何爾今取士之弊議者亦多矣臣不暇條析而言大槩投名自薦記誦聲律非求賢之道爾求不以道則得非其賢間或得才適由偶幸非知其才而取之也朝廷選任盡自其中曾不虞賢俊之棄遺於下也果天下無遺賢邪抑雖有之吾姑守法於上不足以為意邪將科舉所得之賢已足治而不乏邪臣以為治天下今日之弊葢由此也以今選舉之科用今進任之法而欲得天下之賢興天下之治其猶北轅適越不亦逺乎臣願陛下如臣前所陳既立求治之志又思責任之道則以求賢為先茍不先得賢雖陛下焦心勞思將安所施誠得天下之賢置之朝廷則端拱無為而天下治矣此所謂勞於求賢逸於得人也歴觀前史自古以來稱治之君有不以求賢為事者乎有規規守常以資任人而能致大治者乎有國家之興不由得人者乎由此言之用賢之驗不其甚明若曰非不欲賢也病求之之難也臣以為不然夫以人主之勢心之所嚮天下風靡景從設若珍禽異獸瓌寶竒玩之物雖遐方殊域之所有深山大海之所生志所欲者無不可致葢上心所好奉之以天下之力也若使存好賢之心如是則何巖穴之幽不可求何山林之深不可致所患好之不篤爾夫人君用賢亦賴公卿大臣推援薦達之力今朝廷未嘗求賢公卿大臣亦不以求賢取士為意相先引彚世所罕聞訪道求師貴達所恥大率以為任已可也士將安補今世無賢求之何益夫以周公之聖其自任足矣尚汲汲求賢以自輔也以其聖且好賢知人之明宜天下之賢皆為之用莫有遺也尚乃日不暇給恐失天下之士後之人其才不及周公而自謂足矣不求賢以自輔也以其不求且知之不明宜賢者在下之多也乃曰天下無賢矣噫何其用意與周公異也欲其助皇明燭幽隠不可得也然亦繫上之所為而已陛下誠能專心致志孜孜不倦以求賢為事常恐天下有遺棄之才朝廷之上推賢援能者登進之蔽賢自任者疎逺之自然天下嚮風自下及上孰不以相先為善行薦達為急務搜拔既廣雖小才片善無所隠晦如此則士益貴而守益堅廉恥格而風敎厚矣天下之賢其有遺乎既得天下之賢則天下之治不足道也今世人情淺近積慣成俗朝廷進人茍循常法則雖千百而取羣伍而用庸惡混雜曾不以為非設或拔一賢進一善出於不次則求摭小差衆議囂沸如真廟擢种放先朝用范仲淹是也設非君心篤信寧免疑惑反自以為過此所以非常之舉曠久不行也伏見近日陛下不由言薦擢范純仁置之言路在今世為非常之舉純仁名臣之子有才名在位多言其能陛下擢之當也然臣願陛下自信勿疑純仁果賢則陛下知人之明也如用之而無顯效則亦曰吾勞心任人雖未得其效亦無愧於天下矣設或大敗厥職則亦曰吾知之失也當益務選擇期於得人爾葢拔十得五才不可勝用求賢而失尚愈於不求誠持是心何患不得賢也方陛下用純仁識者皆喜臣獨憂之何者陛下始奮英斷拔一人誠恐或有差失遂抑聖心以為專守常規可以無過不復以簡擢為意則天下將何望焉此在陛下自信勿疑而已願陛下不以臣之疎賤而易其言則天下幸甚臣前所陳三者治天下之本也臣非不知有興利除害之方安國養民之術邊境備禦之策敎化根本之論可以為陛下陳之顧三者不先徒虚言爾三者既行不患為之無術也願陛下以社稷為心以生民為念鑒茍安之弊思永世之策賜之省覽察其深誠萬一有毫髮之補於聖朝臣雖被妄言之誅無所悔恨昔賈誼為漢文言治亂漢文不能用百世之下為譏願陛下勿使後之視今猶今之視昔則天下不勝幸甚狂瞽之言惟聖明裁恕干冒宸嚴臣無任兢皇戰汗激切屏營之至代太中上皇帝書具位臣程珦皇恐昧死再拜上書皇帝陛下臣聞孝莫大於安親忠莫先於愛主人倫之本無越於斯人無知愚靡不知忠孝之為美也然而不得其道則反害之故自古為君者莫不欲孝其親而多獲不孝之譏為臣者莫不欲忠其君而常負不忠之罪何則有其心行之不得其道也伏惟陛下以至德承洪業以大孝奉先帝聖心切至天下共知然臣以疎賤復敢區區冒萬死以進其説者願陛下以至孝之心盡至孝之道鑑歴古之失為先帝深慮則天下臣子之心無不慰安所謂歴古之失臣觀秦漢而下為帝王者居天下之尊有四海之富其生也奉養之如之何其亡也安厝之如之何然而鮮克保完其陵墓者其故何哉獨魏文帝唐太宗所傳嗣君能盡孝道為之逺慮至今安全事迹昭然存諸簡策嗚呼二嗣君不茍為崇侈以狥巳意乃以安親為心可謂至孝矣漢武之葬霍光秉政暗於大體奢侈過度至使陵中不復容物赤睂之亂遂見發掘識者謂赤睂之暴無異光自為之為其不能深慮以致後害也二君從儉後世不謂其不孝霍光厚葬千古不免為罪人自古以來觀此明鑑而不能行之者無他衆議難違人情所迫爾茍若務合常情遂亡逺慮是乃厚於人情而薄於先君也不亦惑乎魏文帝所作終制及唐虞世南所上封事皆足取法其指陳深切非所忍言願陛下取而觀之可以見明君賢臣所慮深逺古人有言曰死者無終極國家有廢興自昔人臣當大事之際乃以興廢之言為忌諱莫敢議及如此茍循人情辜負徃者不忠之大者也臣竊慮陛下追念先帝聖情罔極必欲崇厚陵寢以盡孝心臣愚以為違先帝之儉德損陛下之孝道無益於實有累於後非所宜也伏願陛下損抑至情深為永慮承奉遺詔嚴飭有司凡百規模盡依魏文之制明器所須皆以瓦木為之金銀銅鐵珍寶竒異之物無得入壙然後昭示遐邇刋之金石如是則陛下之孝顯於無窮陛下之明高於曠古至於紈帛易朽之物亦能為患於數百年之後漢薄后陵是也或曰山陵崇大雖使無藏安能信於後世臣以為不然天下既知之後世必知之臣嘗遊秦中歴觀漢唐諸陵無有完者惟昭陵不犯陵旁居人尚能道當日儉素之事此所以歴數百年屢經㓂亂而獨全也夫臣之於君猶子之於父豈有陛下欲厚其親而臣反欲薄於其君乎誠以厚於先帝無厚於此者也遺簪墜履尚當保而藏之不敢不恭况於園陵得不窮深極逺以慮之乎陛下嗣位方初羣臣畏威臣茍不言必慮無敢言者陛下以臣言為妄而罪之則臣死且不悔以臣言為是而從之則可以為先帝之福大陛下之孝安天下之心示萬世之法所補豈不厚哉臣哀誠内激言意狂率願陛下詳覽而深察之天下不勝大願臣無任踰越狂狷恐懼之極臣昧死頓首謹言代彭中丞論濮王稱親疏臣思永言伏見近日以濮王稱親事言事之臣奏章交上中外論議沸騰此葢執政大臣違亂典禮左右之臣不能開陳理道而致陛下聖心疑惑大義未明臣待罪憲府不得不為陛下明辨其事竊以濮王之生陛下而仁宗皇帝以陛下為嗣承祖宗大統則仁廟陛下之皇考陛下仁廟之適子濮王陛下所生之父於屬為伯陛下濮王出繼之子於屬為姪此天地大義生人大倫如乾坤定位不可得而變易者也固非人意所能推移茍亂大倫人理滅矣陛下仁廟之子則曰父曰考曰親乃仁廟也若更稱濮王為親是有二親則是非之理昭然自明不待辨論而後見也然而聖意必欲稱之者豈非陛下大孝之心義雖出繼情厚本宗以濮王寔生聖躬曰伯則無以異於諸父稱王則不殊於臣列思有以尊大使絶其等倫如此而已此豈陛下之私心哉葢大義所當典禮之正天下之公論而執政大臣不能將順陛下大孝之心不知尊崇之道乃以非禮不正之號上累濮王致陛下於有過之地失天下之心貽亂倫之咎言事之臣又不能詳據典禮開明大義雖知稱親之非而不知為陛下推所生之至恩明尊崇之正禮使濮王與諸父夷等無有殊別此陛下之心所以難安而重違也臣以為所生之義至尊至大雖當專意於正統豈得盡絶於私恩故所繼主於大義所生存乎至情至誠一心盡父子之道大義也不忘本宗盡其恩義至情也先王制禮本縁人情既明大義以正統緒復存至情以盡人心是故在喪服恩義别其所生葢明至重與伯叔不同也此乃人情之順義理之正行於父母之前亦無嫌間至於名稱統緒所繫若其無別斯亂大倫今濮王陛下之所生義極尊重無以復加以親為稱有損無益何哉親與父同而所以不稱父者陛下以身繼大統仁廟父也在於人倫不可有貳故避父而稱親則是陛下明知稱父為决不可也既避父而稱親則是親與父異此乃姦人以邪説惑陛下言親義非一不止謂父臣以謂取父義則與稱父正同决然不可不取父義則其稱甚輕今宗室疎逺卑幼悉稱皇親加於所生深恐非當孝者以誠為本乃以疑似無正定之名黷於所尊體屬不恭義有大害稱之於仁廟乃有嚮背之嫌去之於濮王不損所生之重絶無小益徒亂大倫臣料陛下之意不必須要稱親止謂不加殊名無以別於臣列臣以為不然推所生之義則不臣自明盡致恭之禮則其尊可見况當揆量事體別立殊稱要在得盡尊崇不愆禮典言者皆欲以髙官大國加於濮王此甚非知禮之言也先朝之封豈陛下之敢易爵秩之命豈陛下之敢加臣以為當以濮王之子襲爵奉祀尊稱濮王為濮國太王如此則夐然殊號絶異等倫凡百禮數必皆稱情請舉一以為率借如既置嗣襲必伸祭告當曰姪嗣皇帝名敢昭告於皇伯父濮國太王自然在濮國極尊崇之道於仁皇無嫌貳之失天理人心誠為允合不獨正今日之事可以為萬世之法復恐議者以太字為疑此則不然葢繫於濮國下自於大統無嫌今親之稱大義未安言事者論列不已前者既去後者復然雖使臺臣不言百官在位亦必繼進理不可奪勢不可遏事體如此終難固持仁宗皇帝在位日久海宇億兆涵被仁恩陛下嗣位之初功德未及天下而天下傾心愛戴者以陛下仁廟之子也今復聞以濮王為親含生之類發憤痛心葢天下不知陛下孝事仁皇之心格於天地尊愛濮王之意非肯以不義加之但見誤致名稱所以深懷疑慮謂濮王既復稱親則仁廟不言自絶羣情洶懼異論喧囂夫王者之孝在乎得四海之歡心胡為以不正無益之稱使億兆之口指斥謗讟致濮王之靈不安於上臣料陛下仁孝豈忍如斯皆由左右之臣不能為陛下開明此理在於神道不逺人情故先聖謂事死如事生事亡如事存設如仁皇在位濮王居藩陛下既為冢嗣復以親稱濮王則仁皇豈不震怒濮王豈不側懼是則君臣兄弟立致釁隙其視陛下當如何也神靈如在亦豈不然以此觀之陛下雖加名稱濮王安肯當受伏願陛下深思此理去稱親之文以明示天下則祖宗濮王之靈交歡於上皆當垂祐陛下享福無窮率土之心翕然慰悅天下化德人倫自正大孝之名光於萬世矣夫姦邪之人希恩固寵自為身謀害義傷孝以陷陛下今既公論如此不無徊徨百計搜求務為巧飾欺罔聖聽枝梧言者徼冀得已尚圗自安正言未省而巧辯已至陛下之心無由而悟伏乞將臣此章省覽數遍裁自宸衷無使姦人與議其措心用意排拒人言隠迹藏形陰贊陛下者皆姦人也幸陛下察而辨之勿用其説則自然聖心開悟至理明白天下不勝大願代吕晦叔應詔疏伏覩今月十三日詔勑以彗出東方許中外臣僚直言朝廷闕失臣自言事得罪久去朝廷無所補報退就間冗尚敢區區以言自進者誠見陛下寅畏天命有恐懼修省之意草萊之人尚思效其忠懇况臣世荷國恩久忝近侍雖罪釁之餘敢不竭其愚誠以應明詔臣伏觀前史所載彗之為變多矣鮮有無其應者葢上天之意非徒然也今陛下既有警畏之心當思消弭之道且以今日之變孰從而來書曰天視自我民視天聽自我民聽豈非政之所致歟如曰非政之由則經為誣矣臣復何言詔之所求亦為虚設若以為政之所致則改以一作而順天在陛下而已晏子所謂可祝而來亦可禳而去也傳曰天之有彗以除穢也又曰所以除舊布新臣願陛下祇若天戒思當除者何事而當新者何道如曰舊政既善無所可除則天為誣矣臣復何言若以為當求自新則在陛下思之而已自非大無道之世何嘗不遇災而懼然而能自新者葢寡大率蔽於所欲惑於所任明不足以自辨也視是而為非以邪而為正敗亡至而不寤天亦不能戒也豈其惡存而好亡憎治而喜亂哉亦惑而不能辨爾臣以為辨之非艱顧不得其道也誠能省已之存心考已之任人察已之為政思已之自處然後質之人言何惑之不可辨哉能辨其惑則知所以應天自新之道矣臣請為陛下辨之所謂省已之存心者人君因億兆以為尊其撫之治之之道當盡其至誠惻怛之心視之如傷動敢不慎兢兢然惟懼一政之不順於天一事之不合於理如此王者之公心也若乃恃所據之勢肆求欲之心以嚴法令舉條綱為可喜以富國家強兵甲為自得銳於作為快於自任貪惑至於如此迷錯豈能自知若是者以天下狥其私欲者也勤身勞力適足以致負一作貪敗夙興夜寐適足以招後悔以是而致善治者未之聞也願陛下内省於心有近於是者乎茍有之則天之所戒也當改而自新者也所謂考已之任人者夫王者之取人以天下之公而不以已求其見正而不求其從欲逆心者求諸道㢲志者察其非尚孜孜焉懼或失也此王者任人之公也若乃喜同而惡異偏信而害明謂彼所言者吾之所大欲也悦而望之信而惑之至於甚惡而不察恣欺而不悟推是而往鹿可以為馬矣願陛下考已之任人有近於是者乎茍有之則天之所戒也當改而自新者也方陛下思治之初未有所偏主好惡取舍一以公議天下謂之賢陛下從而賢之者衆矣進之於朝亦多矣及乎既有為也皆以不合而去之更用後來之人皆昔未嘗以為賢者也然後議論無違始之所賢者皆愚始之未嘗賢者皆賢此為天下之公乎已意之私乎自論議無違之後逆耳怫心之言亦罕聞矣夫以居至尊之位負出世之資而不聞怫逆之言可懼之大者也知人之難雖至明不能無失然至於朝合則為不世之賢暮隙則有一作為無窮之罪顛錯亦已甚矣在任人之道當改亦明矣所謂察已之為政者為政之道以順民心為本以厚民生為本以安而不擾為本陛下以今日之事方於即位之初民心為歡悦乎為愁怨乎民生為阜足乎為窮蹙乎政事為安之乎為擾之乎億兆之口非不能言也顧恐察之不審爾茍有不察則天之所戒也當改而自新者也所謂思已之自處者聖人謂亡者保其存者也亂者有其治者也陛下必不以斯言為妄自古以來何嘗有以危亡為憂而至危亡者乎惟其自謂治安而危亡卒至者則多矣不識陛下平日自處以天下為如何聖心所自知也茍有憂危恐懼之心常慮所任者非其人所由者非其道唯恐不聞天下之言如此則聖王保天下之心也上帝其鑒之矣或以為已安且治所任者當矣所為者至矣天下之言不足恤矣如此則天之所戒也當改而自新者也所謂質之人言者當有其方欲詢之於衆人乎衆人之言可使同也欲訪之下民乎下民之言亦可為也察之以一人之心而蔽之以衆人之智其可勝乎是不足以辨惑而足以固其蔽爾臣以為在外一二老臣事先朝數十年久當大任天下共知其非欺妄人也知其非覆敗邦家者也臣願陛下禮而問之宜可信也及天下所謂賢人君子陛下聞之於有為之前而不在今日利害之間者亦可訪也以是數者參考之則所當改者何事所當新者何道固可見矣天下之人一聞詔音莫不鼓舞相慶謂陛下必能上應天心召迎和氣臣以為唯至誠可以動天在陛下誠意而已昔在商王中宗之時有桑穀之祥髙宗之時有雊雉之異二王以為懼而修政遂致王道復興皆為商宗百世之下頌其聖明近世以來引咎之詔自新之言亦常有之倘人君不由於至誠則天下徒以為虚語其能感天心弭災變乎臣願陛下因此天戒奮然改為思商宗之休實鑑後代之虚飾不獨消復災沴於今日將永保丕基於無窮天下幸甚代富弼上神宗皇帝疏稿臣弼伏覩太皇太后山陵有期老臣之心有所甚切不忍不言昧死以聞惟陛下深思而力行之不勝大願往者營奉昭陵時英宗皇帝方不豫未能聽事朝廷罔然不知其制失於迫卒不復深慮博訪凡百規畫一出匠者之拙謀中人之私意以巨木架石為之屋計不百年必當損墜壙中又為鐵罩重且萬斤以木為骨大止數寸不過二三十年决須摧毁梓宫之厚度不盈尺異日以億萬鈞之石自髙而墜其將奈何思之及此骨寒膽喪臣始則不知其詳後則無以為計士民之間有知之者無不痛心飲恨况老臣之心乎况陛下之心乎其後厚陵始為石藏議者竊意主事大臣已悟昭陵之事獨陛下未知之爾今也不幸太皇太后奄棄天下之養因此事㑹當為之謀竊以周公制合葬之禮仲尼善魯人之祔歴代諸陵雖不盡用亦多行之太祖皇帝神謀聖慮超越萬古昭憲太后亦合安陵夫以周公之制仲尼之訓歴代之舊藝祖之法循而行之可無疑也老臣願陛下思安親之道為後日之慮决於聖心勿循浮議奉太皇太后合祔昭陵因得徹去鐵罩用厚陵石藏之制仍更別加裁處使異日雖木壞石墜不能為害救仁皇必至之禍成陛下莫大之孝復何難哉在陛下斷之而已既合禮典又順人情雖無知之人必不敢以為非是但恐有以陰陽拘忌之說上惑聰明者在陛下睿斷不難辨也不遵聖訓不度事宜而規規於拘忌者為賢乎為愚乎且陰陽之説設為可信吉凶之應貴賤當同今天下臣庶之家夫婦莫不同穴未聞以為忌也獨國家忌之有何義理唐中宗庸昏之主尚能守禮法盡孝心責嚴善思愚惑之論卒祔乾陵其後髙宗子孫歴世延永是合葬非不利也老臣位至三公年將八十復何求哉所保者名節而已肯以不是事勸陛下取譏於後世乎復恐陛下謂臣心雖忠切而識慮愚暗不能曉達事理臣誠至愚然臣所言者欲陛下守經典之訓遵藝祖之規使仁宗皇帝得安全之道於太皇太后極崇奉之意豈獨老臣之心哉天下之心莫不然也陛下不信試以臣之所陳訪於羣臣必無以為非者若以臣言為非則是使仁宗遺骨聖體碎於巨石之下而不恤乃為是也凡有血氣之類孰肯為此意乎臣事仁宗皇帝三十餘年位至宰相聾瞽之蔽不能早知而救之於始已為大罪今遇可為之時若更惜情顧已不能極言天地神靈必加誅殛死何面目見仁宗於地下且陛下不知則已今既聞之在常人之情無可忍而不為之理况陛下至仁大孝乎惟陛下深思而力行之則天下不勝大願富公見託為此奏頤以拙於文辭辭之再三其意甚切義不可拒數日之間遂生顧慮不克上惜乎其不果於義也遂為忠孝罪人上仁宗皇帝書皇祐二年草莽賤臣程頤謹昧死再拜上書皇帝闕下臣伏觀前古聖明之主無不好聞直諫博采芻蕘故視益明而聽益聰紀綱正而天下治昏亂之主無不惡聞過失忽棄正言故視益蔽而聽益塞紀綱廢而天下亂治亂之因未有不由是也伏惟陛下德侔天地明並日月寛慈仁聖自古無比曷嘗害一忠臣戮一正士羣臣雖有以言事得罪者旋復拔擢過其分際此千載一遇言事之秋也桀紂暴亂殘賊忠良然而義士不顧死以盡其節明聖在上其仁如天布衣之士雖非當言責也茍有可以禆聖治何忍黙黙而不言哉今臣竭其愚忠非有斧鉞之虞也所慮進言者至衆豈盡有取狂愚必多而陛下因謂賤士之言無適用者臣雖披心腹瀝肝膽不見省覽秖成徒為此臣之所懼也儻或陛下少留聖慮則非臣之幸實天下之幸臣請自陳所學然後以臣之學議天下之事臣所學者天下大中之道也聖人性之為聖人賢者由之為賢者堯舜用之為堯舜仲尼述之為仲尼其為道也至大其行之也至易三代以上莫不由之自秦而下衰而不振魏晉之屬去之逺甚漢唐小康行之不醇自古學之者衆矣而考其得者葢寡焉道必充於已而後施以及人是故道非大成不茍於用然亦有不私其身應時而作者也出處無常惟義所在所謂道非大成不茍於用顔囘曾參之徒是也天之大命在夫子矣故彼得自善其身非至聖人則不出也在於平世無所用者亦然所謂不私其身應時而作者諸葛亮及臣是也亮感先主三顧之義閔生民塗炭之苦思致天下於三代義不得自安而作也如臣者生逢明聖之主而天下有危亂之虞義豈可茍善其身而不以一言悟陛下哉故曰出處無常惟義所在臣請議天下之事不識陛下以今天下為安乎危乎治乎亂乎烏可知危亂而不思救之之道如曰安且治矣則臣請明其未然方今之勢誠何異於抱火厝之積薪之下而寢其上火未及然因謂之安者乎書曰民惟邦本本固邦寧竊惟固本之道在於安民安民之道在於足衣食今天下民力匱竭衣食不足春耕而播延息以待一歳失望便須流亡以此而言本未得為固也臣料陛下仁慈愛民如子必不忍使之困苦一至於是臣竊疑左右前後壅蔽陛下聰明使陛下不得而知今國家財用常多不足不足則責於三司三司責諸路轉運轉運何所出誅剥於民爾或四方有事則多非時配卒毒害尤深急令誅求竭民膏血往往破産亡業骨肉離散衆人觀之猶可傷痛陛下為民父母豈不憫哉民無儲備官廩復空臣觀京師縁邊以至天下率無二年之備卒有連歳凶灾如明道中不知國家何以待之坐食之卒計踰百萬既無以供費將重斂於民而民已散矣強敵乘隙於外姦雄生心於内則土崩瓦解之勢深可虞也太寧之世聖人猶不忘為備必有九年之蓄以待凶歳况今百姓困苦愁怨之氣上衝於天災沴凶荒是所召也陛下能保其必無乎中民之家有十金之産子孫不能守則人皆謂之不孝陛下承祖宗基業而前有土崩瓦解之勢可不懼哉四裔強盛自古無比幸而目前尚守盟誓果能以金帛厭其欲乎能必料其常為今日之計乎則夫㳂邊豈宜無備益以兵則用不足省其戍則力弗支皆非長久之策也前者昊賊叛逆西垂用兵數年之間天下太困葢内外經制多失其宜陜西之民苦毒尤甚及多逃散重以軍法禁之以至人心大怨皆有思㓂之言悖逆之深不敢以聞聖聽顧恐陛下亦頗知之故曰無恒産而有恒心者惟士為能彼庶民者飢寒既切於内父子不相保尚能顧忠義哉非民無良政使然也當時秦中㓂盜屢起儻稽撲滅必多響應幸而尋時盡能誅剪尚賴社稷之福西虜亦疲彼知未可逺圗遂且詭辭稱順向若更相牽制未得休兵内釁將生言之可駭今天下勞弊不比景祐以前復有加曩時之役臣愚切恐不能堪矣况為患者豈止西戎臣每思之神魂飛越不知朝廷議者以為如何亦嘗置之慮乎其謂制之無術乎臣竊謂今天下猶無事人命未甚危陛下宜早警惕於衷思行王道不然臣恐歳月易失因循不思事勢觀之理無常爾雖我太祖之有天下救五代之亂不戮一人自古無之非漢唐可比固知趙氏之祀安於泰山然而損陛下之聖明陷斯民於荼毒深可痛也臣料羣臣必未嘗有為陛下陳王道者以陛下聖明豈有言而不行者乎竊惟王道之本仁也臣觀陛下之仁堯舜之仁也然而天下未治者誠由有仁心而無仁政爾故孟子曰今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也陛下精心庶政常懼一夫不獲其所未嘗以一喜怒殺一無辜官吏有犯入人罪者則終身棄之是陛下愛人之深也然而凶年饑歳老弱轉死於溝壑壯者散而之四方為盜賊犯刑戮者幾千萬人矣豈陛下愛人之心哉必謂歳使之然非政之罪歟則何異於刺人而殺之曰非我也兵也三代之民無是病也豈三代之政不可行於今邪州縣之吏有陷人於辟者陛下必深惡之然而民不知義復迫困窮放辟邪侈而入於罪者非陛下陷之乎必謂其自然則敎化聖人之妄言邪天下之治由得賢也天下不治由失賢也世不乏賢顧求之之道如何爾今夫求賢本為治也治天下之道莫非五帝三王周公孔子治天下之道也求乎明於五帝三王周公孔子治天下之道者各以其所得大小而用之有宰相事業者使為宰相有卿大夫事業者使為卿大夫有為郡之術者使為刺史有治縣之政者使為縣令各得其任則無職不舉然而天下弗治者未之有也國家取士雖以數科然而賢良方正歳止一二人而已又所得不過博聞強記之士爾明經之屬唯專念誦不曉義理尤無用者也最貴盛者唯進士科以詞賦聲律為工詞賦之中非有治天下之道也人學之以取科第積日累久至於卿相帝王之道敎化之本豈嘗知之居其位責其事業則未嘗學之譬如胡人操舟越客為御求其善也不亦難乎往者丁度建言祖宗以來得人不少愚瞽之甚議者至今切齒使墨論墨固以墨為善矣今天下未治誠由有君而無臣也豈世無人求之失其道爾茍欲取士必得豈無術哉王道之不行二千年矣後之愚者皆云時異事變不可復行此則無知之深也然而人主往往惑於其言今有人得物於道示玉工曰玉也示衆人曰石也則當以玉工為是乎以衆人為然乎必以玉工為是矣何則識與不識也聖人垂教思以治後世而愚者謂不可行於今則將守聖人之道乎從衆人之言乎謂衆人以王道可行其猶詰瞽者以五色之鮮詢聾者以八音之美其曰不然宜也彼非憎五色而惡八音聞見限也臣觀陛下之心非不憂慮天下也以陛下憂慮天下之心行王道豈難乎哉孟子曰以齊王猶反手也又曰師文王大國五年小國七年必為政於天下矣以諸侯之位一國之地五年可以王天下况陛下居天子之尊令行四海如風之動茍行王政奚啻反手之易哉昔者大禹治水八年於外三過其門而不入思以利天下雖勞苦不避也今陛下行王政非有苦身體勞思慮之難也何憚而不為哉孝經曰立身行道揚名於後世以顯父母孝之終也匹夫猶當行道以顯父母况陛下貴為天子豈不發憤求治思齊堯舜納民仁壽上光祖考垂休無窮凡所謂孝無大於此者也臣以謂治今天下猶理亂絲非持其端條而舉之不可得而治也故臣前所陳不及歴指政治之闕但明有危亂之虞救之當以王道也然而行王之道非可一二而言願得一面天顔罄陳所學如或有取陛下其置之左右使盡其誠茍實可用陛下其大用之若行而不效當服罔上之誅亦不虚受陛下爵禄也陛下問羣臣羣臣必謂寒賤之士未可使近上側自臣思之以為不然臣髙祖羽太祖朝年六十餘為縣令一言遭遇聖祖特加拔擢攀附太宗終於兵部侍郎顧遇之厚羣臣無比備存家牒不敢繁述臣曾祖希振既以父任後祖遹復被推恩國家録先世之勲臣父珦又䝉延賞今為國子博士非有横草之功食君禄四世一百年矣臣料天下受國恩之厚無如臣家者臣自職事以來思為國家盡死未得其路爾則臣進見宜無疑也或者更為強詞言其不可此乃自負陰私懼防詆訐者也伏望陛下出於聖斷勿狥衆言以王道為心以生民為念黜世俗之論期非常之功昔漢武笑齊宣不行孟子之說自致不王而不用仲舒之策隋文笑漢武不用仲舒之策不至於道而不聽王通之言二主之昏料陛下亦嘗笑之矣臣雖不敢望三子之賢然臣之所學三子之道也陛下勿使後之視今猶今之視昔則天下不勝幸甚望陛下特留意焉臣愚無任踰越狂狷恐懼之極臣頤昧死頓首謹言二程文集巻六

body:
  text: 二程文集巻四明道文集四宋程顥撰墓誌銘邵堯夫先生墓誌銘熙寧丁已孟秋癸丑堯夫先生疾終於家洛之人弔哭者相屬於塗其尤親且舊者又聚謀其所以塟先生之子泣以告曰昔先人有言誌於墓者必以屬吾伯淳噫先生知我者以是命我我何可辭謹按邵本姬姓系出召公故世為燕人大王父令進以軍職逮事藝祖始家衡漳祖徳新父古皆隠徳不仕母李氏其繼楊氏先生之㓜從父徙共城晩遷河南塟其親於伊川遂為河南人先生生於符祥辛亥至是葢六十七年矣雍先生之名而堯夫其字也娶王氏伯溫仲良其二子也先生之官初舉遺逸試將作監主簿後又以為潁州團練推官辭疾不赴先生始學於伯原勤苦刻厲冬不爐夜不扇夜不就席者數年衛人賢之先生歎曰昔人尚友於古而吾未嘗及四方遽可已乎於是走吴適楚過一作寓齊魯客梁晋久之而歸曰道其在是矣葢始有定居之意先生少時自雄其材慷慨有大志既學力慕髙逺謂先王之事為可必致及其學益老徳益劭玩心髙明觀於天地之運化隂陽之消長以達乎萬物之變然後頽然其順浩然其歸在洛㡬三十年始至蓬蓽環堵不蔽風雨躬爨以養其父母居之裕如講學於家未嘗强以語人而就問者日衆鄉里化之逺近尊之士人之道洛者有不之公府而必之先生之廬先生徳氣粹然望之可知其賢然不事表襮不設防畛正而不諒通而不汙清朙坦夷洞徹中外接人無貴賤親疏之間羣居燕飲笑語終日不取甚異於人顧吾所樂何如耳病畏寒暑常以春秋時行遊城中士大夫家聽其車音倒屣迎致雖兒童奴𨽻皆知懽喜尊奉其與人言必依於孝弟忠信樂道人之善而未嘗及其惡故賢者悦其徳不賢者服其化所以厚風俗成人材者先生之功一有為字多矣昔七十子學於仲尼其傳可見者惟曽子所以告子思而子思所以授孟子者耳其餘門人各以其材之所宜一有者字為學雖同尊聖人所因而入者門户則衆矣况後此千餘歳師道不立學者莫知其從來獨先生之學為有傳也先生得之於李挺之挺之得之於穆伯長推其源流逺有端緒今穆李之言及其行事概可見矣而先生淳一不雜汪洋浩大乃其所自得者多矣然而名其學者豈所謂門户之衆各有所因而入者歟語成徳者昔難其居若先生之道就所至而論之可謂安且成矣先生有書六十二巻命曰皇極經世古律詩二千篇題曰擊壤集先生之塟附於先塋實其終之年孟冬丁酉也銘曰嗚呼先生志豪力雄濶歩長趨凌髙厲空探幽索隠曲暢旁通在古或難先生從容有問有觀以飫以豐天不憗遺哲人之凶鳴臯在南伊流在東有寧一宫先生所終李寺丞墓誌銘予友李君仲通諱敏之世居北燕髙祖避亂南徙今為濮人丞相文定公迪乃其世父也曽祖令珣祖䕶皆以丞相故贈太師尚書令考遜用子貴贈吏部尚書仲通生而有賢資端厚仁恕見於孩提之時舉動齊整不妄言笑燕居終日汨然而無情容望之者皆知其君子人矣與人言無隠情惟聞人之過則未嘗復出於口安靖寡欲居貧守約裕如也好古力學博觀羣書尤精於春秋詩易其後所得殊為髙深方勇勵自進不幸短命惜夫未見其止也死之年纔三十矣仲通之徳葢完於天成孝友之性尤為絶異侍太夫人疾衣不解帶者累月及居䘮哀毁過甚中外數百口上愛下信人無間言羣從聚居臧獲使令者衆雖馭之過嚴不能使之無犯惟偶為仲通所責則其人必慚悵累日痛自飭勵及仲通之亡濮之人無賢不肖皆失聲痛惜或為隕涕非至誠及物其能有是乎仲通外甚和易遇物如恐傷之雖家人未始見其喜怒及其出辭氣當事為則莊厲果斷不可以非義囬屈始用䕃補郊社齋郎調䖍州瑞金縣主簿㑹劇賊戴小八攻害數邑朝廷患之命御史督視仲通時承尉乏與其令謀曰劉右鶻石門羅姓者皆徤賊招捕之累年矣小八不能連二盗以自張吾知其無能為也當説使自効則賊為不足破矣乃遣人諭二盗皆曰我服李君仁信久矣願為之死然召我亦有以為信乎仲通即以其符誥與之且約曰某日當以甲二百來見我於邑中衆皆恐懼仲通曰彼欲為惡雖不召將至且吾信於邑人彼亦吾人也何憚乎乃將二盗與之周旋卒得其死力遂斬小八盡平其黨朝廷嘉之遷衛尉寺丞仍升一任御史用間者言將誅劉羅二黨仲通以為失信不義抗論甚力久始見從仲通又自言於朝請因其立功縻以冗職可絶後患書奏不報其羅姓者果復為害仲通宰江寧之上元有古循吏之風邑之舊田稅不均貧弱受其弊仲通為法以平之豪猾惡其害己共為謗語借勢於上官以摇其事人皆為仲通危仲通堅處不變未滿歳而所均者萬七一作二千室事業雖百未一施槩是二節則髙朙之見剛勇之氣發於事者亦可知已嗚呼人非有古今之殊特患夫忽近而慕逺耳如吾仲通之材之羙古獨可以多乎哉向若天假之年成就其所學自當無媿於古人況使得與古之人並而親炙於聖人之時乎則吾知其果不後曽閔之列矣仲通以治平三年五月終於家熙寧七年二月庚寅塟於濮州鄄城縣遺直鄉之先塋夫人王氏附焉夫人太子中舎杲之女賢慧靖淑雅有法度及寡居益自晦重素衣一食以終身焉葢後仲通六年而亡仲通嘗生二女皆天卒無子以兄之子孝和為嗣仲通平生相知之深者莫如予故將塟其家以誌文來屬其可辭乎銘曰二氣交運兮五行順施剛柔雜揉兮羙惡不齊禀生之類兮偏駮其宜有鍾粹羙一作純粹兮㑹元之期聖雖可學一作學作兮所貴者資便儇皎厲兮去道逺而展矣仲通兮賦材特竒進復甚勇兮其造可知徳何完兮命何虧秀而不實聖所悲孰能使我無愧辭後欲有考觀銘詩華隂侯先生墓誌銘先生姓侯氏名可字無可其先太原人宦學四方因徙家華隂少時倜儻不羈以氣節自喜既壯盡易前好篤志為學祁寒酷暑未嘗廢業博極羣書聲聞四馳就學者日衆雖邊隅逺人皆願受業諸侯交以書幣迎致有善其禮命者亦時往應之故自陜而西多宗先生之學元昊盗邊時名卿賢儒結轍西使服先生之名莫不願見親老而家益貧思得禄養勉就科舉再試春官卒無所遇因喟然太息曰丈夫之事止於是乎㑹蠻酋儂智髙攻䧟二廣孫威敏公奉命出征習先生之賢請干其軍事先生奮然從之振旅奏功初命武爵言事者以為非冝遂改文資調知巴州化成縣巴俗尚鬼而廢醫惟巫言是用雖父母之疾皆棄去弗視先生誨以義理嚴其禁戒或親至病家為視醫藥所活既衆人亦知化巴人娶婦必責財於女氏貧人至有老不得嫁者先生為立制度稱其家之有無與之約曰踰是者有誅未閲歳邑無過時之女遂變其俗巴山土薄民貧絲帛之賦反倍他所日益凋敝先生抗議計司争之數十卒得均之旁郡境多虎暴農者不敢朝暮耕商旅俟衆而後行先生日夜治器械發徒衆親執弓矢與之從事迹而追之逺或數百里所殺不可勝數後皆避人逺去不復為害再調耀州華原主簿有富人不占地籍惟以利誘貧民而質其田劵多至萬畝歳責其入先生晨馳至其家發櫝出劵召其主而歸之失業者復安其生郡胥趙至誠貪狡凶暴持郡吏短長而為奸吏前後為守者莫能去一郡患之先生暴其罪荷校置於獄自守而下畏恐生禍交為之請先生不顧卒言於帥府而誅之聞者快服用薦者監慶州折博務歳滿授儀州軍事判官計省第折博之最就改大理評事部使者丐留遂復簽書本官事韓忠獻公鎮長安薦知涇陽縣至則鑿小鄭一作泉以廣灌溉議復鄭白舊利未㡬召至闕下得對便殿始命計工興役旋復専總其事邀功害能之人疾其不自已出渠功有緒而讒毁交至以㣲文細故為先生罪遂罷其役羙利不究論者惜之元豐己未季夏先生以疾終於家享年七十有三先生純誠孝友剛正朙决非其義一毫不以屈於人視貪邪奸佞若㓂賊仇怨顯攻面數意其人改而後已雖甚貴勢視之藐然遇人之善友之助之欲其成達不啻如在已也博物强記貫渉萬類若禮之制度樂之形聲詩之比興易之象數天文地理隂陽氣運醫藥算數之學無不究其淵源先生發强壯厲勇於有為而平易仁恕中懷洞然至於輕財樂義安貧守約急人之急憂人之憂謀其道不謀其利忠於君不顧其身古人所難能者先生安而行之葢出於自然非勉强所及少與申顔為友易衣互出而謀食以養二家如一顔病先生徒歩千里為之求醫歸而顔死矣其目不瞑人曰其待侯君乎未歛而先生至撫之而瞑顔謀塟其先世而未能顔死無子又不克塟先生辛勤百圖不足則賣衣以益之卒襄其事時方天寒先生與其子單服以居適有饋白金者先生顧顔之孤妹為憂未遑䘏已遂以嫁之近世朋友道薄臨患難鮮不愛其力聞先生之風可以激頽波而起廢疾先生家無甔石之儲而人有不得其所者必以先生為歸非力能也誠使然也一日自逺歸家人方以窶告友人郭行者詣門曰吾父病亟醫須百千乃為治賣吾廬而不售先生憫然計囊中裝適當其數盡以與之嘗隨計詣京師里中出金贐行比還悉散其所餘曰此金鄉里所以資應詔也不可以為他利當與同舉者共之且行聞鄉人有病於逆旅者先生曰吾歸則彼死矣遂留不去病者瘉貧無以為車乗先生曰子行則未能留則將困因推其馬與之躧歩而歸其克己濟物若是者多矣少喜穰苴孫武之學兵家事無所不通尤詳於西北形勢談其山川道路郡縣部族纎細備具聽之者宛如在目前一無此字熙河未開之時一作前韓忠獻公請先生謀渭源之地先生馳至境上召其酋豪六百人諭以朝廷恩徳為朙利害皆感悟喜躍翌曰詣軍門輸土納一作聽命願為藩籬一塵不驚而開地八千里因城熟羊以撫之忠獻公上其功朝廷賞以減考績之年治平中敵嘗㓂邊主將出兵禦戰轉運使以為妄舉互言於朝時敵去未逺遣先生按視其迹受命即行人皆為之寒心先生以數十騎馳渉敵境日暮猝與敵遇乃分其騎為三四令之曰髙爾旗幟旋山徐行敵循環間見疑以為大兵誘已終不敢擊秦州舊苦蕃酋反覆縶其親愛而質之多至七百人久者已數十歳公家之費不貲雜羌離怨益甚其後釋其縻而歸之戍人感一作恱服乃先生發其謀也平生以勸學新民為己任主華學之教育者㡬二十年官之所至必為之治學舎興絃誦其所以成就材徳可勝道哉先生之文尤長於詩晩益翫心於天人性命之學其自樂者深矣病革命其子曰吾死慎勿為浮屠事焚楮貨徼福覬利非吾志也嗚呼死而不忘於正可謂至矣大王父諱元王父諱暠當五代之亂皆隠徳弗耀父諱道濟潤州丹徒令贈尚書比部員外郎母刁氏追封福昌縣太君妻一作其嫓劉氏早卒封延長縣君繼以其姝封永壽縣君二子曰孚曰淳三孫尚㓜先生之官自評事四遷為殿中丞階宣奉郎勲騎都尉服錫五品既終之朙年仲春八日塟於華隂縣保徳鄉先塋之次舉前夫人祔焉顥先生女兄之子也知先生之道為詳故得論載行治之羙以詔後人銘曰南山崇崇其下也先生之宫惟其清風與山無窮程殿丞墓誌銘程氏居永寧之博野土風渾厚世以忠亷孝謹聞少師貴重於朝始賜第京師為開封人世風不衰子孫多好善而吾叔父可謂能守其家法者矣叔諱瑜字叔寳少師諱羽清河太君張氏襄陵太君賈氏之曽孫尚書虞部員外郎諱希振髙宻縣君崔氏之孫贈大理寺丞諱道天水趙氏長壽縣大君任氏之子少以族兄廣平文簡公廕試將作監主簿未冠為荆南監利尉即以幹敏稱再調永州零陵簿益以才著時谿蠻嘯動焚刼縣邑道州寧逺最當賊衝部使者命公攝令事至止之日邑無城壁府無兵械公經營創治夜以繼日完集未㡬蠻㓂大至設長圍以逼城公激勵士卒躬冐矢石捍守累日以竒兵由水中旁出賊後合戰甚苦賊乃敗去既而同守者皆論功丐賞公曰城守吾事也城獲完足矣尚當以為利乎卒不自言代還得為汝州龍興令計省言其材遂監解州鹽池歳課羡溢改大理寺丞簽書礠州判官公事太守武人不知為政公從容開賛一郡大治事雖出公而人莫窺其跡謙晦不伐率皆此類以年勞升太子賛善大夫賜五品服就移知卭州依政縣時長壽太君春秋髙公懼有逺行之勞即上書願就監臨以便奉養改舒州皖口監轄乃以考課遷殿中丞還朝知濮州雷澤縣未行暴疾終於京師實嘉祐七年三月十八日也公姿儀偉秀風度平雅端莊謹厚不妄言笑進退動止皆有法度衣冠整理望之肅然三歳而孤長壽太君教養嚴至恂恂奉事恪恭朝夕未嘗少懈善與人交乆而益篤嗚呼行足以勵俗才足以有為不幸短命未究所施殁之年方四十三矣公娶張氏封福昌縣君和慈孝睦族人推其賢三子曰預以疾廢曰顗曰顓皆為儒學三女長適前常州軍事推官王師古仲適襄陵賈芮季適汝南周純朙熙寧二年八月丙申公之從兄司農塟公於河南府伊陽縣神隂鄉先塋之次顥以父命得預役事又掇公之官世行業而為之誌既又繫之以銘曰謹於奉親勤於事君端於立身無愧乎古人山可夷谷可堙斯言不泯程郎中墓誌公諱璠字仲韞姓程氏世居中山之博野宋興先少師以勲徳顯重賜第京師始為開封人少師諱羽其嫓曰清河太君張氏襄陵太君賈氏是生虞部府君諱希振娶博陵崔氏封髙宻縣君是生尚書府君諱遹公即尚書之仲子母曰孝感太君長安太君皆張氏公生數歳而孤教養於伯兄十六以族兄廣平文簡公廕試將作監主簿始冠為常州户曹掾時朝廷遣使安撫二浙表言公才就除朙州司法力抗暴守數活疑獄當途者交薦之遂改京官知壽州安豐邑富多彊猾小民困於侵漁為令者常苦其難制公至未㡬皆歛手莫敢犯盗賊亦越逸他境増治芍陂以廣灌溉人賴其賜道路謡頌聞於京師大豪陳順謀去其母紿之醉宿旁舎因誣以為嫁使其黨證之公察其情即命捕置果已亡去權至能使監司移其獄公拒弗與根索益急順乃持金謂審官吏謀去公以緩其事吏即為謾奏移公興元府西縣公具得行賂狀人或勸公辨之朝公曰吾豈與吏辨者乎曹吏以謬誤自陳得改洪州之豐城江水嘗環城人大饑邑豪吳氏以貲得官藏粟閉糴公召諭之不從謂曰民餓且死令亦不敢自保禄位當杖爾以取之吳氏大懼哀祈請命於是富人争出粟民用以濟以謀塟其先世求知河南伊闕縣秩滿簽書河東節度判官公事丁長安太君憂服除知永安縣兼陵䑓令奉陵寢皆中貴人前令多務姑息往往侵暴邑人公待之有方皆歛戢就法度内韓贄守洛醜公正直誣以非罪洛人不直其事讙聞道路而公卒不自辨還朝通判和州先是蔡州妖尼恵普以左道惑衆數年之間四方響動奔走奉事惟恐不至其後奸跡暴露有司猶暴其罪但坐杖皆羈置厯陽時朝廷當有赦恵普即詐疾以俟卒得免杖人皆神之謂果不可得而刑也居和未久崇奉者稍稍自逺而至郡守禮之甚謹公始戾止㑹守以謫去權領郡事一日捽至庭下布獄械於前使具道所以罔人之狀故其奸謀詭説皆掀掲呈露乃正其罪而刑之有識之士以謂微公之斷不能解天下之惑有李洞元者為神怪之説妄言受知昭陵嘗以金字書賜之江淮之間從者如市公亦按置於法由是逺近悚服復通判隰州歳大饑力為賑助所存活者甚衆熙寧乙夘夏四月代還甲申以疾終於河南享年五十七公資質瑰壯明辨剛決接人誠厚動有恩意輕材好義中懐豁如材長於治民嚴而有愛敏而不苛區繁剸劇常有餘裕其所斷獄人自以為不寃故前所涖去久而人思之識用髙爽有大過人者凡是山川土田人物名氏目所一見耳所暫聞閲年雖多不復忘廢豐城大邑公為之三年識其民且半其餘政事條理從可知矣官自衛尉丞九遷為比部郎中以年勞賜五品服始娶倪氏事姑不謹公以義罷遣繼以曹氏魏襄悼公利用之孫封仁壽縣君二子曰顧曰頢皆太廟齋郎四女長適國子博士張昭立次早亡其二未嫁公平生不惑流俗邪妄之說常曰吾死慎勿為浮屠事及用隂陽拘忌之術公殁家人奉以從事熙寜十年仲秋丙申公兄司農塟公河南府伊陽縣神隂鄉祔於先塋且命顥論公之官世材行以誌其墓程邵公墓誌邵公廣平程顥之次子也生於治平始元仲秋之四日死於熙寧首禩仲夏之十四日越三日藏一作塟之於伊陽縣神隂鄉祖塋之東邵公其㓜名也端慤其名也生而有竒質未滿歳而温粹端重之態完然可愛聰朙日發而方厚淳羙之氣益備其始言也或授之以詩率未三四過即已成誦矣久亦不復忘去雖警悟俊頴若照徹内外而出之從容故敏於見知而安於言動坐立必莊謹不妄瞻視未嘗有戲慢之色孝友信讓之性葢出於自然與人言則温然及其有所不為則確乎其守也大凡其心有所許後雖以百事誘廹終不復移矣日視羣兒相與狎弄歡笑跳梁於前泊乎如不聞知雖有喜相侵暴者亦莫之敢侮葢厥生五年而人不見其有喜怒好欲是豈特異於常兒哉皆老於學者之所難能也而吾兒之資乃成於生之初嗚呼使其降年之永則吾不知其所至也吾弟頤亦以斯文為己任嘗意是兒當世吾兄弟之學今則已矣則吾之慟亦不特以父子之親也夫動靜者隂陽之本况五氣交運則益參差不齊矣賦生之類宜其雜揉者衆而精一者間或值焉以其間值之難則其數或不能長亦宜矣吾兒其得氣之精一而數之局者歟天理然矣吾何言哉以其塟日之廹刋刻之不暇也惟砂書於磚以誌其壙澶娘墓誌銘澶娘廣平程顥之㓜女也其父佐澶淵軍而生故命之曰澶其第四十七生於熙寧四年季秋之丁未死於十年季夏之壬午其質端而厚其氣温而良其舉動知思安靜沉逺殆如老成衆皆意其福且壽事固有莫可計者命矣夫始病痘瘡工藥之過劑一作劇善醫者論之曰痘瘡之初誠欲利者也然當視其氣之强弱為藥之可否疾之重輕為劑之大小今槩以大藥下之宜其死也噫是亦命歟人理之未至吾容當責命於天言之以為世戒云耳悲夫澶娘既死七十五日而塟於河南伊陽縣神隂鄉先塋之東與其姊嬌兒同兆一作宂銘曰合而生非來盡而死非往然而精氣本於天形魄歸於地謂之往亦可矣二程文集巻四

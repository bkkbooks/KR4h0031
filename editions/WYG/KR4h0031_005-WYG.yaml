body:
  text: 二程文集巻五明道文集五宋程顥撰雜文南廟試佚道使民賦民得終佚勞固無怨人情莫不樂利聖政為能使民以佚道而敦敕俾當時之服循教本於農雖極勤勞之事功收於後自無怨讟之因厥惟生民各有常職勞而獲養則樂服其事勤而無利則重煩其力惟王謹以政令驅之稼穯且為生之本宜教使以良勤則從上也輕葢豐餘之自得蠢爾農俗陶乎教風知所勞者為乎已圖所利者存乎終莫不勉勉以從令于于而勸功志在便人役以農疇之務時雖畢役樂於歲事之豐雖復教令時頒科條日出嚴刑以董其或惰加賦以戒其不一然而俗樂趨勸時無怨疾擇可勞而勞也敢憚初勤因所利而利焉自全終佚大抵善治俗者率俗以敦本善使民者順民而不勞道皆出於優佚令無勤於繹騷不奪其時導以厚生之利將求其欲豈聞力穯之逃勿謂民之㝠而無知勿謂農之勞而不務趨其利則雖勞而樂害其事則雖㝠而懼志取豐益業其安固使爾農於墾殖縱極勤劬異有國之力征自膺饒俗得非納於豐富之道教以便安之途在服勞而雖至顧有憾以曾無體兌彖之悦民下安其教同周詩之戒事衆樂而趨异夫雖上之行抑民所願或躬籍以為率或名官而申勸是皆俾民有樂佚之道焉雖勞何怨南廟試九叙惟歌論論曰民受天地之中而生者也水火金木土榖民所賴而生者也樹之君使修舉其所賴而養之者也修之有道行之有節上焉天順之下焉民樂之正德焉利用焉厚生焉此其所以秉統持正而制天下之命者也在書禹之謨曰九功惟叙九叙惟歌其指言乎是也舜禹明其道聖也後世不及焉功也萬世所利焉宜其事有次序而民歌樂之也噫舜之君禹之臣其歌之之民日聞其道日被其澤其見而知之或言或歌可矣今去聖久逺踰數千祀然可覆而舉之者何也得非一於道乎道之大原在於經經為道其發朙天地之秘形容聖人之心一也然當推本夫朙其次著其跡者言之在洪範之九章一曰五行次二曰五事統之以大中終之以福極聖人之道其見於是乎葢五行者天之道也五事者人之道也修人事而致天道此王者所以治也五事修五行叙則其生材也羙焉阜焉民居其中享其利而安焉豈非皇極之道用而致乎五材之生天也非人也五事之修人也非天也雖然五事正則五材自然得其性矣是則天之道亦王者之所為也王者既修五事而致五材則又舉正徳之教而率之朙利用之源而阜之開厚生之道而養之五行恊於上六府利於下三事舉於中修焉其功之叙也和焉其徳之行也如是則民浩浩然于于然驩虞於下而歌頌其政矣或曰子之言五行然矣然六府之兼乎榖何也答曰五行氣也五材形也君之所致者氣也民之所用者形也五氣既叙五材既豐民並用焉然榖者民之所生也不可一日無之此六府所以兼榖也要其本則五氣之生而已夫何惑焉竊原春秋之文求聖人之志灾之書者十一大水之書者七不雨之書者九大旱之書者二無麥苖大無麥禾之書者各一葢言五行失其序則六府失其宜物失其宜則尚何次叙之有乎民失其所則尚何歌詠之有乎可以見聖人之心重時政而謹民事勤勤乎如是也由是言之則舜之徳其至也地平天成矣萬世永賴矣其民陶其教遂其生九功之徳皆歌之矣戒之用休董之用威勸之以九歌俾勿壊其終之之道也道是而已矣或問行於後者當如何曰五事本也謹而朙之六府外也時而治之教之以徳節之以政古之五正各司其方可復也周之六官各主其事可用也此其略也其道則具於經矣推而朙之勤而修之是亦舜之政也夫何逺哉顧力行何如爾謹論此篇經為道道是而已矣兩處疑有脱誤南廟試䇿五道第一道問禮曰凡養老五帝憲三王有乞言厚人倫之義也是以鰥寡孤獨皆有養後世則不然教化之不朙衣食之不足黎民老而不得其養饑寒轉死於溝壑者往往而是今將考古養老之禮而行之惟帝堯而上不可聞已虞夏商周之時其所養何老所處何學所衣何服所食何禮一歳凡㡬行之宜誦所聞悉著於篇對王者髙拱於穆清之上而化行於禆海之外何修何飾而致哉以純王之心行純王之政爾純王之心純王之政此疑缺字老吾老以及人之老㓜吾㓜以及人之㓜此純王之心也使老者得其養㓜者得其所此純王之心也尚慮其未也則又尊國老而躬事之優庶老而時養之風得海流民陶其化孰有怠於親而慢於長者哉虞夏商周之盛王由是道也人倫以正風俗以厚鰥寡孤獨無不得其養焉後世禮廢法壊教化不朙播棄其老饑寒轉死者往往而是嗚呼率是而行而欲王道之成猶却行而求及前抑有甚焉爾今朝廷清朙政教修舉方欲稽講墜典以風天下朙執事欲將朙上意故訪諸生以古之道俾講求其説敢不道其所聞以禆一二哉葢古者擇三公之有年徳者天子以父事之謂之三老孤卿之有年徳者天子以兄事之謂之五更皆一人爾大夫士之以年致仕者亦皆養之於其鄉里之庠序焉所處則有虞氏國老養於上庠庶老養於下庠夏后氏國老養於東序庶老養於西序商人國老養於右學庶老養於左學周人國老養於東膠庶老養於虞庠是也所服則深燕縞𤣥之衣四代所服也所食則饗燕食之禮三代之制也周人修而兼用之一歳所行之數則禮所謂春饗孤子秋饗耆老與夫釋菜釋奠之禮亦其時乎此古之略也若夫潤飾之則在乎時矣謹對第二道問昔者孔子傷時王之無政而作春秋所以褒善貶惡為後王法也自去聖既逺諸儒異論聖人之法得之者寡至唐陸質學於啖趙號為達者其存書有纂例㣲㫖義統今之學者莫不觀焉若夫諸儒之所失與陸氏之所得學者必有所取舎也試為條其大要庶以質其是非對春秋何為而作哉其王道之不行乎孟子有言曰春秋天子之事是也去聖踰逺諸儒紛紜家執異論人為殊説互相彈射甚於仇讐開元秘書言春秋者葢七百餘家矣然聖人之法得者至寡至於棄經任傳雜以符緯膠固不通使聖人之心鬱而不顯吁可痛也獨唐陸淳得啖先生趙夫子而師之講求其學積三十年始大光瑩絶出於諸家外雖未能盡聖作之藴然其攘異端開正途功亦大矣惜夫其書之粹者在乎集傳而世微其傳矣今所存者請槩言其一二亦可以觀其道之所至焉春秋之法大者在乎侵伐戰取圍入執殺盟㑹如聘禘郊蒸嘗歸復入納灾異賦役焉然諸家之論前矛後盾未見其能一也其間書侵者五十七伐者二百一十三書圍者四十四入者二十七聖人之意其詳其偹也如是豈茍然哉葢誅其禍亂之道耳彼豈有是哉先儒徒隨事而傳之三傳往往從而羙之者有矣未有一言發明聖人誅之之心者也獨陸君用啖氏之説曰春秋紀師何無曲直之辭曰一之也不一則禍亂之門闢矣若夫其差者甚者則在乎其文矣此則見聖人絶惡之源原情之法此表裏之論也其餘若盟若㑹其法皆用是也禘郊之義詭譎殊狀左氏之文畧而不解公榖之論泥而失真何杜之流汎汎其間耳陸氏之學獨能斥先鄭之失朙諸侯之僭謂禘為王者之祭朙郊非周公之志皆足以見其所存之博大得聖師救亂朙上下之心也餘若書鄭伯之克謂克下之辭朙君臣之義異乎所謂如二君與能殺者屑屑之論矣書次於郎則言非有俟而次則意將為賊爾防兵亂之源殊乎所謂過信次止者區區之談矣發言侵言伐之例則曰無名行師與稱罪致討之異逺乎濶畧之言賊害之語矣且取邑之條則云力得之不是其専奪異乎不用師徒不冝取之淺矣其餘稱將稱師紀名紀氏之類亦皆度越於諸家逺甚旨義之衆莫可厯數要其歸以聖人之道公不以已得他見而立異故其所造也逺而所得也深噫聖門之學吾不得而見焉幸得見其㡬者矣則子厚之願掃其門宜乎對問之下不能詳悉故獻其畧謹對第三道問官之有屬猶身之有臂臂之有指也自建官以來未有無屬焉者也舉今之官則治其小者有屬治其大者無屬外郡縣内羣有司此治其小者内公府外刺部此治其大者治其小且有屬治其大乃無屬何其輕重勞佚之不侔哉豈因其故常而恬莫之舉歟抑舉之未見其益歟刺部之屬向嘗増之直與其長等爾非所謂屬也公府之屬今或存之直他官而已非所謂屬也請悉陳前古治大有屬之法可施于今者皆何名何選何職古何以有而今何以無古何以可而今何以不可詳之於説以究當今之便對竊觀治天下之道如構室焉其大者棟也梁也棟梁豈能獨立哉其所與相助而承上者榱桷也置官亦如是矣古之三公之府諸侯郡國各有其屬以成其政後世改易不常今則外之一郡一邑内之一官一局各有屬焉至於公府機務之煩外臺刺舉之重則反無之此誠小大重輕之貿焉非必謂無益而莫之為也直因循故常未之更爾嚮者漕計之司嘗為之置副矣副則誠亞其長者也其下亦嘗創賔從之名者矣是亦其屬也第旋去之耳近世宰相之官兼門下之目則府以其省名矣今其屬者乃省官爾非丞相之屬策謂前古治大有屬之法可施於今者則周冡宰之職有小宰焉小宰之下皆其屬也其餘五官亦各有屬焉然其爵位有尊卑之差矣外則牧伯之國今刺舉之任也其屬則其臣爾漢之三公府則有長史司直焉東曹西曹之掾焉内則御史外則刺部亦各自用其吏為掾屬其選之之道則周六官以下其屬皆命於天子牧伯之臣則其卿而下其君選於其國爾漢之三公開府辟召唐之藩鎮亦自薦延其位其職則繫其長之所任而分治之耳今公府任其小事者非無也直無若三公之孤六卿之丞共其事者爾其治文書掌勞役者備矣其職亦㡬矣茍欲慎其選清其流而易其官之名則可矣若欲夫預聞政事則賢朙之佐謨謀於廟堂之上又何細吏之間焉若夫刺舉之屬則在選任之爾謹對第四道問今天下費益廣財益匱食加冗農加困貨愈籠文愈宻而旱乾水溢無歳無之又未嘗得清源端本之術少紓其弊雖有智者或任非其責噤不出一語嗚呼忍而視斯民之殘也今欲使財無匱農無困文無密以拯斯民之殘敢問何䇿之為先何修而後可勿踈勿泛以直所論對天下大器羣生重畜惟君上所制養焉今土地之廣人民之衆較之近代未為甚盛也然近歳費益廣財益匱食加冗農加困貨愈籠文愈密者何也殆基本似有所未立法度似有所未舉爾三代之制今不能收功於旦夕也試取其切近於體務者言之今財之匱食之冗農之困貨愈籠文愈宻者弊雖煩而其原一而已其始在費益廣也費益廣則取於民者衆實於府者鮮財不得不匱農不得不困矣彼食冗者亦費之一端爾費既廣財既匱農既困則貨不得不籠貨之籠則文不得不密矣所謂費益廣者不曰待哺之兵衆乎戍守之費重乎游食之徒煩乎無用之供厚乎為今之計兵之衆豈能遽去之哉在汰其冗而擇其精兵戈之遺豈能遽絶之哉在備於我而圖其後游食之徒煩則在禁其末而驅之農無用之供厚則在絶其源而損其數然其所以制之者有其道也夫水利之興屯田之制府兵之復義倉之設皆濟時之大利顧縉紳議之熟矣惟不以為舊説之迂而忽之則財以豐食以足貨利可寛文法可損矣雖旱乾水溢之變繫乎歳數之常亦吾有備焉爾謹對第五道問子曰茍有用我者三年有成何其效之疾歟又曰善人為邦百年亦可以勝殘去殺矣何其效之遲歟又曰如有王者必世而後仁必世云者較諸善人則己疾合諸聖人則已遲三者之效不能齊一然則聖何道而疾善何術而遲王何務而必世願以前代已然之迹質於此三者對聖人之道無所茍而已矣以聖人之才施於天下其易矣猶必曰三年而有成也然方之善人之效則聖人之治其疾也逺矣仲尼曰善人為邦百年亦可以勝殘去殺矣夫善人者所謂不踐迹亦不入於室者也既不循前人之弊而守之又不得聖人之道而行之宜其逺且久也有人焉相繼而往則百年而後可至治矣所謂王者必世而後仁則䝉謂作禮樂之時爾夫民之情不可暴而使也不可猝而化也三年而成大法定矣漸之仁摩之義浹於肌膚淪於骨髓然後禮樂可得而興也葢禮樂者雖上所以教民也然其原則本於民而成於上爾則聖人之效所以疾善人之效所以遲與夫王者之仁其道可見矣復請以前代已然之迹而朙之孟子曰小國七年大國五年可為政於天下此聖人之效也若仲由謂三年使知方伯禽之三年報政雖不能若聖人之道醇且具也然亦承聖師之教奉周公之政其庶乎其次也若漢之業創乎髙祖因循乎吕恵文帝守之以淳儉孝景紹之以恭黙當時漢之興㡬百年矣其風俗寛厚㡬致措刑亦勝殘去殺之效乎周承文王之業厯武王之治至成王之世而周公作禮樂焉此必世後仁之效乎謹對二程文集巻五

body:
  text: 二程文集卷十一伊川文集宋程頤撰婚禮納采納采謂壻氏為女氏所采故致禮以成其意使辭曰吾子有惠貺某室也某壻父有先人之禮使某也敢納采問名問名謂問所娶女子之名若今之小名也使者請辭曰某既受命將加諸卜敢請女為誰氏納吉納吉謂壻氏既得女名以告神而卜之得吉兆又往告女氏猶今之言定使辭曰吾子有貺命某加諸卜占曰吉使某也敢告納徴徴證也成也用皮帛以證成娶婦之禮使辭曰吾子有命貺某室也某有先人之禮某物使某也請納徴請期請期實告婚期也必先禮請以示謙使辭曰吾子有貺命某既申受命矣惟是三族之不虞使某也請吉日女氏對曰某既前受命矣惟命之從一作是聼使又曰某使某聽命於吾子女氏固辭使曰某使某受命吾子不許某敢不告期曰某日日猶言甲乙之類成婚期日壻氏告迎於廟初昏禮雖云初昏然當量居之逺近壻受命於所尊謂醮而受告戒之命出乘前引婦車受命而出乘馬前引婦車迎婦之車也今或用擔子執燭前馬使徒役持火炬居前照道今用燭四或二賓將至賓壻也女氏之擯俟於大門之外主人俟於門內賓降下車也擯進揖請事賓對今以介對曰某稱壻父命某壻名以兹初昏將請承命擯對曰主人固以恭俟擯揖入門主人揖賓及階主人揖升介以賓升介南面贊賓就位東面再拜贊即席內告具主人肅賓而先賓從之見於廟見女氏之先祖至於中堂見女之尊者遍見女之黨於東序贊者延賓出就位贊者以女氏之子姪為之卒食興辭介以賓辭主人請入戒女氏奉女辭於廟至於中堂母南面於房外女出於母左父西面醮女而戒之母施襟結帨今謂之整冠飾戒諸西階之上擯者出壻降立於庭中北面婦降自西階壻揖前導立於車前既升而先俟於門外先之者導之也門外壻家大門外也婦至主人壻也揖婦以入及寢門揖入壻退就次及期期謂早暮之節贊者引壻入贊者壻氏之女相立東席西面姆侍奉婦立西席東面贊揖壻再拜男下女也姆侍扶婦答拜遂即席女之從者沃壻盥於南壻之從者沃婦盥於北沃盥以水濯手也於坐席之南北壻搢笏舉婦䝉首蓋頭也復位贊者進酌用常爵三爵用巹姆助婦舉卒食相者以壻婦興說服女之從者受壻服壻之從者受婦服燭出康成云禮畢女侍待呼於外夙興婦纚笄衣服以俟見質明贊見婦於舅姑進拜奠贄還又拜見屬之尊者長者於東偏南面東上屬自為别是為見已不復特見若異宫則見諸父各就其寢幼者賤者皆見於堂下西面北上舅姑入於室婦盥饋舅姑饗婦於堂之西偏卒食婦降自阼階饗禮謂嫡婦翌壻拜於婦氏之門奠菜三月預祭祀事舅姑復三月然後奠菜祝稱婦之姓曰某氏來婦敢奠菜於舅某子姑某氏此段義有未詳葬說并圖卜其宅兆卜其地之美惡也非陰陽家所謂禍福者也地之美者則其神靈安其子孫盛若培壅其根而枝葉茂理固然矣地之惡者則反是然則曷謂地之美者土色之光潤一作澤草木一作生物之茂盛乃其驗也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者惑以擇地之方位决日之吉凶不亦泥乎甚者不以奉先為計而以利後為慮尤非孝子安厝之用心也惟五患者不得不愼須使異日不為道路不為城郭不為溝池不為貴勢所奪不為耕犂所及一本所謂五患者溝渠道路避村落逺井窰五患既愼則又鑿地必至四五丈遇石必更穿之防水潤也既葬則以松脂塗棺槨石灰封墓門此其大略也若夫精畫則又在審思慮矣其火葬一作焚者出不得已後不可遷就同葬一作焚矣至於年祀寖逺曾髙不辨亦在盡誠各具棺槨葬之不須假夢寐蓍龜而决也葬之穴尊者居中左昭右穆而次後則或東或西亦左右相對而啓穴也出母不合葬亦不合祭棄女還家以殤穴葬之葬法决疑古者聖人制卜葬之禮蓋以市朝遷變莫得預測水泉交浸一作侵不可先知所以定吉凶决善惡也後代陰陽家流競為詭誕之說葬書一術遂至百二十家為害之大妄謬之甚在分五姓五姓之說驗諸經典本無證據古陰陽家亦無此說直是野俗相傳竟無所出之處惟堪輿經黃帝對天老乃有五姓之言且黃帝之時只有姬姜二三姓其餘姓氏盡出後代何得當時已有此語固妄謬無稽之言其所謂五姓者宫商角徴羽是也天下萬物悉配屬之行事吉凶依此為法至如以張王等為商武庾等為羽是則同韻相求及其以栁姓為宫以趙姓為角又非四聲相管其間亦有同是一姓分屬宫商復姓數字徵角不辨都無慿據只信其臆說爾夫姓之於人也其始也亦如萬物之同形者呼某白黑小大以為别耳後世聖人乃為之制因生賜姓胙土命氏其後子孫因邑因官分枝布葉而庶姓益廣如管蔡郕霍魯衛毛𥅆郜雍曹滕畢原豐郇本皆姬姓華向蕭亳皇甫本皆子姓其餘皆爾不可勝舉今者用其祖姓則往往數經更易難盡尋究况復葬書不載古姓若用今姓則皆後代所受乃是吉凶隨時變改也人之分宗譬如木之異枝木之性有所宜之地也取其枝而散植之其性所宜寧有異乎若一祖之裔姓音不同同葬一地遂言彼凶而此吉决無是理設有人父本宫姓子以功勳更賜商姓則將如何用之今二人同言則必擇其賢者信之葬禮聖人所制五姓俗人所說何乃舍聖制而從俗說不亦愚乎昔三代之時天下諸侯之國卿大夫之家久者千餘歲其下至數百歲不絶此時葬者未有五姓也古之時庶人之年不可得而見矣君卿大夫史籍所可見者往往八九十歲有百歲者自唐而來五姓葬法行於世已數世百歲之家鮮矣人壽七八十歲者希矣苟吉凶長短不由於葬邪則安用違聖人之制而從愚俗所尚吉凶長短果由於葬耶是乃今之法徒使人家不久長壽命短促大凶之道也進退無取何足言哉夫葬者藏也一藏之後不可復改必求其永安故孝子慈孫尤所愼重欲地之安者在乎水之利水既利則終無虞矣不止水一事此大槩也而今之葬者謂風水隨姓而異此無大害也愚者執信將求其吉反獲其凶矣至於卜選時日亦多乖謬按葬者逢日食則舍於道左待明而行行是必須晴明不可用昏黑也而葬書用乾艮二時為吉此二時皆是夜半如何用之又曰己亥日葬大凶今按春秋之中此日葬者二十餘人皆無其應宜忌者不忌而不宜忌者反忌之顚倒虛妄之甚也下穴之位不分昭穆易亂尊卑死者如有知居之其安乎如此背謬者多矣不欲盡斥但當棄而勿用自從正法耳記葬用柏棺事古人之葬欲比化不使土親膚今奇玩之物尚寶藏固密以防損汚况親之遺骨當何如哉世俗淺識惟欲不見而已又有求速化之說是豈知必誠必信之義且非欲其不化也未化之間保藏當如是耳吾自少時謀葬曾祖虞部已下積年纍歲精意思索欲知何物能後骨而朽後咸陽原上有人發東漢時墓柏棺尚在又韓修王城圮得古柏木皆堅潤如新諺有松千柏萬之說於是知柏最可以久然意猶未已因觀雜書有松脂入地千年為茯芩萬年為琥珀之說疑物莫久於此遂以柏為棺而塗以松脂特出臆說非有稽也不數月嵩山法王寺下鄉民穿地得古棺裹以松脂乃知古人已用之矣自是三四十年七經葬事求安之道思之至矣地中之事察之詳矣地中之患有二惟蟲與水而已所謂毋使土親膚不惟以土為汚有土則有蟲蟲之侵骨甚可畏也世人墓中多置鐡以辟土獸土獸希有之物尚知備之蟲為必有而不知備何也惟木堅縫完則不能入求堅莫如柏求完莫如漆然二物亦不可保柏有入土數百年而不朽者有數十年而朽者人多以為柏心不朽而心之朽者見亦多矣闕作主式用古尺作主用栗取法於時月日辰趺方四寸象嵗之四時髙尺有二寸象十二月身博三十分象月之日厚十二分象日之辰身趺皆厚一寸二分剡上五分為圓首寸之下勒前為額而判之一居前二居後前四分後八分陷中以書爵姓名行曰故某官某公諱某字某第幾神主陷中長六寸濶一寸一本云長一尺合之植於趺身出趺上一尺八分并趺髙一尺二寸竅其旁以通中如身厚三之一謂圓徑四分居二分之上謂在七寸二分之上粉塗其前以書屬稱屬謂髙曾祖考稱謂官或號行如處士秀才幾郎幾翁旁題主祀之名曰孝子某奉祀加贈易世則筆滌而更之水以灑廟墻外改中不改祭禮羅氏本有此諸本皆無之恐未必先生所著姑附於此凡祭灑掃㕔事設几案於階下設盥盆帨手巾祭前一日視滌濯五更起安排如法具時果井菜三飣或五飣盞盤匙筯訖次設香卓次設盥盆茅縮更祭服焚香請曰孝孫某今以仲春之祭共請太祖某官髙祖某官曾祖某官祖某官考某官降赴神位奠酒焚香跪執事者過酒左手把盤右手以酒澆酹於灌盆茅縮處俯伏興再拜左避位遂行獻執事者注酒下食二味或一味隨人家貧富頃之再拜亞獻如前三獻如前事畢焚香曰祭事已畢揖執事者徹饌祭祖妣亦如前式四時祭始祖冬至祭祭始祖灑掃㕔事如時祭只設一位以妣配祝執辭出主人之左東向讀之曰維年月日孝逺孫某敢昭告於某氏之祖妣今以陽至之始追惟報本禮不敢忘謹備清酌庶羞之奠尚享三獻如前式先祖立春祭祭先祖者自始祖而下髙祖而上非一人也故設二位曰惟年月日孝逺孫某今以生物之始恭請先祖祖妣以下降居神位餘如前式禰季秋祭祭禰曰孝子某今以成物之始恭請考君某官妣某官某封某氏降居神位餘如前式二程文集卷十一

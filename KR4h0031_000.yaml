body:
  text: 二程文集總集類提要臣等謹案二程文集十三巻附錄二巻宋明道程子伊川程子合集也陳振孫書錄解題載明道集四巻遺文一巻伊川集一本二十巻一本九巻又河南程氏文集十二巻二程共為一集為建寧所刻本是宋世所傳已㕘錯不同此本出自胡安國家劉珙張栻嘗刻之長沙安國於原文頗有改削如定性書明道行述上富公謝帥書中刪落至數十字又辭官表顛倒次第易傳序改沿為泝祭文改姪為猶子珙等所刻一以安國為主朱子深以為不可嘗以書抵珙及栻盛氣詬争辨之甚力具載晦菴集中然二人迄不盡用其説葢南宋之初學者猶各尊其所聞不似淳祐以後門户已成羽翼已衆於朱子之言一字不敢異同也元至治間臨川譚善心重為校刋始與蜀人虞槃商確考訂悉從朱子所改其定性書富謝二書所刪字亦求得别本補足又搜輯程子遺文十六篇遺事十一條並朱子論胡本錯誤諸書别為二巻附之於後惟伊川詩僅有三章河南府志載其陸渾樂遊詩云東郊漸㣲緑驅馬欣獨往舟縈野渡時水樂春山響身閒愛物外趣逸諧心賞歸路逐樵歌落日寒山上集中無之善心等亦未及収地志率多假借名人以誇勝蹟其殆好事者所依託又出於善心之後歟乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:81919d6bd5b6412c76d795b887556ff8a3539d7395b1af3d60586fa22958e59e

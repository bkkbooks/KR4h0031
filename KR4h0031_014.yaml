body:
  text: 二程文集卷上附録放蝎頌見遊氏本拾遺殺之則傷仁放之則害義酌貪泉詩見劉立之敘述中心如自固外物豈能遷書縣廳壁見龜山語録視民如傷右明道先生文易上下篇義已載易傳易序見性理羣書已載易傳禮序見性理羣書經禮三百威儀三千皆出於性非偽貌飾情也鄙夫野人卒然加敬逡巡遜却而不敢受三尺童子拱而趨市暴夫悍卒莫敢狎焉彼非素有於教與邀譽於人而然也蓋其所有於性物感而出者如此故天尊地卑禮固立矣類聚羣分禮固行矣人者位乎天地之間立乎萬物之上天地與吾同體萬物與吾同氣尊卑分類不設而彰聖人循此制為冠婚喪祭朝聘燕享之禮以行君臣父子兄弟夫婦朋友之義其形而下者具於飲食器服之用其形而上者極於無聲無臭之微衆人勉之賢人行之聖人由之故所以行其身與其家與其國與其天下禮治則治禮亂則亂禮存則存禮亡則亡上自古始下逮五季質文不同罔不由是然而世有損益惟周為傋是以夫子嘗曰郁郁乎文哉吾從周逮其弊也忠義之薄情文之繁林放有禮本之問而孔子欲先進之從蓋所以矯正反弊也然豈禮之過哉為禮者之過也秦氏焚滅典籍三代禮文大懷漢興購書禮記四十九篇雜出諸家傳記不能悉得聖人之旨考其文義時有抵牾然而其文繁其義博學者觀之如適大通之衢珠珍器帛隨其所取如遊阿房之宫千門萬戶隨其所入博而約之亦可以弗畔蓋其説也粗在應對進退之間而精在道德性命之要始於童稚之習而終於聖人之歸惟逹於道者然後能知其言能知其言然後能得於禮然則禮之所以為禮其則不逺矣昔者顔子之所從事不出乎視聽言動之間而鄉黨之記孔子多在於動容周旋之際此學者所當致疑以思致思以逹也禘説見朱子文集禘其祖之所自出始受姓者也其祖配之以始祖配也文武必以稷配後世必以文王配所出之祖無廟於太祖之廟禘之而已萬物本乎天人本乎祖故以所出之祖配天也周之后稷生於薑嫄薑嫄以上更推不去也文武之功起於后稷故配天者須以后稷嚴父莫大於配天宗祀文王於明堂以配上帝帝即天也聚天之神而言之則謂之上帝此武王祀文王推父以配上帝須以父也曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝不曰武王者以周之禮樂出於周公制作故以其作禮樂者言之猶言魯之郊禘非禮周公其衰是周公之法壞也若是成王祭上帝則須配以武王配天之祖則不易雖百世惟以后稷配上帝則必以父若宣王祭上帝則亦以厲王雖聖如堯舜不可以為父雖惡如幽厲不害其為所生也故祭法言有虞氏宗堯非也如此則須舜是堯之子苟非其子雖授以天下之重不可謂舜之父也如此則是堯養舜以為養男也禪讓之事蔑然矣以始祖配天須在冬至一陽始生萬物之始祭用圓丘器用陶匏藁秸服用大裘而祭宗祀九月萬物之成父者我之所自生帝者生物之祖故推以為配而祭於明堂也本朝以太祖祀於圓丘以禰配於明堂自介甫此議方正先此祭五帝又帝昊天上帝并配者六位自介甫議惟祭昊天上帝以禰配之太祖而上有僖順翼宣先嘗以僖祧之矣介甫議以為不當祧順以下祧可也何者本朝推僖祖為始已上不可得而推也或難以僖祖無功業亦當祧以是言之則英雄以得天下自已力為之并不得與祖德或謂靈芝無根醴泉無源物豈有無本而生者今日天下基本蓋出於此後人安得為無功業故朝廷復立僖祖廟為得禮介甫所見終是髙於世俗之儒書銘見微言含其英茹其實精於思貰於一與方元宷手帖見近思録聖人之道坦如大路學者病不得其門耳得其門無逺之不可到也求入其門不由於經乎今之治經者亦衆矣然而買櫝還珠之弊人人皆是經所以載道也誦其言辭解其訓詁而不及道乃無用之糟粕耳覬足下由經以求道勉之又勉異日見卓爾有立於前然後不知手之舞足之蹈不加勉而不能自已矣按朱子跋此帖有二其一有應舉耕田之語又嘗得先生年二十五時與方氏帖惜皆不可見姑記朱説云謝執政書見張繹師説公知射乎有人執弓於此發而多中人皆以為善射矣一日使羿立於其傍道之以彀率之法不從羿且怒而去矣從之則戻其故習而失多中之功一作巧故不若處羿於無事之地則羿得盡其言而用舍羿不恤也頤才非羿也然聞羿之道矣慮其害公之多中也謝傳耆伯壽手謁見朱子文集頤謹詣行館拜謝長官祕書十月日河南程頤狀答朝以道書見吕氏雜志頤與堯夫同里巷居三十年餘世間事無所不論惟未嘗一字及數耳與橫渠簡見朱子語録堯夫説易好今夜試來聽他説看一作説先天之圖甚有理可試往之聽他説看答謝良佐書見微言答又楊遵道録但是簡不云有書族子至愚無足責故人素厚不敢疑孟子既知天安用尤臧氏寄范淳夫書同上丞相久留左右所助一意正道者實在原明耳右伊川先生文傳聞續記此記係取朱子名臣言行録及邵氏易學辨惑所載以補遺書外書之未傋若夫他書豈無附見然未敢必信故不復取云日二程先生侍大中公訪康節於天津之廬康節擕酒飲月陂上歡甚語其平生學術出處之大致明日明道悵然謂門生周純明一作甫曰昨從堯夫先生遊聽其論議振古之豪傑也惜其無所用於世純明曰所言何如明道曰內聖外王之道也是日康節有詩明道和之今各見集中聞見録右二先生語李文定公為舉子時從种放明逸先生學將試京師攜明逸書見栁開仲塗以文卷為贄與謁俱入久之仲塗出曰讀君之文須沭浴乃敢見因留之門下一日仲塗自出題令文定與其諸子及門下客同賦賦成驚曰君必魁天下為宰相令門下客與諸子拜之曰異日無忘也及文定為宰相仲塗門下客有栁某者文定命長子東之娶其女不忘仲塗之言也文定所擬賦題不傳如王沂公曽初作有物混成賦識者知其決為宰相蓋所養所學發為言詞者可以觀矣程明道先生為伯溫云聞見録神宗欲用溫公召知許州令過闕上殿方下詔謂監察御史裏行程皓曰朕召司馬光卿度光來否皓對曰陛下能用其言光必來不能用其言光必不來帝曰未論用其言如光者常在左右人主自可無過公果辭詔命同上熙寧十年春吕申公起知河陽河南尹賈公昌衡率溫公程伯淳餞於福先寺上東院康節以疾不赴明日伯淳語康節曰君實與晦叔席上各辨論出處不已皓以詩解之云云同上陳左司瓘曰范公淳夫嘗論顏子不遷怒不二過惟伯淳能之豫問公曰伯淳誰也公默然久之曰不知有程伯淳邪豫謝曰生長東南實未知也豫常以寡陋自愧了翁之子正由云了翁自是每得明道先生之文必冠帶然後讀之范太史遺事右明道先生語曹彬攻金陵垂克忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所愈惟須諸公共發誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香為誓明日稍愈及克金陵城中皆安堵如故曹翰克江州忿其久不下屠戮無遺彬之子孫貴盛至今不絶翰卒不三十年子孫有乞丐於海上者矣程頤云涑水記聞程伊川曰凡從安定先生學者其醇厚和易之氣望之可知也聞見録或問伊川量可學否曰可學進則識進識進則量進曰如魏公可學否曰魏公是間氣胡氏傳家録異時伊川同朱公掞訪先君先君留之飲酒因以論道伊川指面前食卓曰此卓安在地上不知天地是安在甚處先君為之極論天地萬物之理以及六合之外伊川歎曰平生惟見周茂叔論至此然不及先生之有條理也易學辨惑伊川又同張子堅來方春時先君率同遊天門街看花伊川辭曰平生未嘗看花先君曰庸何傷乎物物皆有至理吾儕看花異於常人自可以觀造化之妙伊川曰如是則願從先生遊同上先君病且革伊川曰先生至此他人無以致力願先生自主張先君曰平生學道固知此矣然亦無可主張伊川猶相問難不已先君戲之曰正叔可謂生薑樹頭生必是生薑樹頭死也伊川曰從此與先生永訣矣更有可以見告者乎先君聲氣已微舉張兩手以示之伊川曰何謂也先君曰面前路徑須常令寬路徑窄則自無著身處况能使人行也同上右伊川先生語二程文集附録卷上

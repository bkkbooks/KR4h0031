body:
  text: 二程文集卷十二伊川文集宋程頤撰行狀墓志祭文明道先生行狀曾祖希振任尚書虞部員外郎妣髙密縣君崔氏祖遹贈開府儀同三司吏部尚書妣孝感縣太君張氏長安縣太君張氏父珦見任大中大夫致任母壽安縣君侯氏先生名皓字伯淳姓程氏其先曰喬伯為周大司馬封於程後遂以為氏先生五世而上居中山之博野髙祖贈太子少師諱羽太宗朝以輔翊功顯賜第於京師居再世曾祖而下葬河南今為河南人先生生而神氣秀爽異於常兒未能言叔祖母任氏太君抱之行不覺叉墜後數日方求之先生以手指示隨其所指而往果得叉人皆驚異數嵗誦詩書强記過人十嵗能為詩賦十二三時羣居庠序中如老成人見者無不愛重故戶部侍郎彭公思永謝客到學舍一見異之許妻以女踰冠中進士第調京兆府鄠縣主簿令以其年少未知之民有借其兄宅以居者發地中藏錢兄之子訴曰父所藏也令曰此無證佐何以决之先生曰此易辨耳問兄之子曰爾父藏錢幾何時矣曰四十年矣彼借宅居幾何時矣曰二十年矣即遣吏取錢十千視之謂借宅者曰今官所鑄錢不五六年即遍天下此錢皆爾未居前數十年所鑄何也其人遂服令大奇之南山僧舍有石佛嵗傳其首放光逺近男女聚觀晝夜雜處為政者畏其神莫敢禁止先生始至詰其僧曰吾聞石佛嵗現光有諸曰然戒曰俟復見必先白吾職事不能往當取其首就觀之自是不復有光矣府境水害倉卒興役諸邑率皆狼狽惟先生所部飲食苃舍無不安便時盛暑泄痢大行死亡甚衆獨鄠人無死者所至治役人不勞而事集常謂人曰吾之董役乃治軍法也當路者欲薦之多問所欲先生曰薦士當以才之所堪不當問所欲再期以避親罷再調江寧府上元縣主簿田稅不均比他邑尤甚蓋近府美田為貴家富室以厚價薄其稅而買之小民苟一時之利久則不勝其弊先生為令畫法民不知擾而一邑大均其始富者不便多為浮論欲搖止其事既而無一人敢不服者後諸路行均稅法邑官不足益以他官經嵗厯時文案山積而尚有訴不均者計其力比上元不啻千百矣㑹令罷去先生攝邑事上元劇邑訴訟日不下二百為政者疲於省覽奚暇及治道先生處之有方不閲月民訟遂簡江南稻田賴陂塘以溉盛夏塘堤大决計非千夫不可塞法當言之府府禀於漕司然後計功調役非月餘不能興作先生曰比如是苖稿久矣民將何食救民獲罪所不辭也遂發民塞之嵗則大熟江寧當水運之衝舟卒病者則留之為營以處曰小營子歲不下數百人至者輒死先生察其由蓋既留然後請於府給劵乃得食比有司文具則困於饑已數日矣先生白漕司給米貯營中至者與之食自是生全者大半措置於纖微之間而人已受賜如此之比所至多矣先生常云一命之士苟存心於愛物於人必有所濟仁宗登遐遺制官吏成服三日而除三日之朝府尹率羣官將釋服先生進曰三日除服遺詔所命莫敢違也請盡今日若朝而除之所服止二日爾尹怒先生曰公自除之某非至夜不敢釋也一府相視無敢除者茅山有龍池其龍如蜴蜥而五色祥符中中使取二龍至中途中使奏一龍飛空而去自昔嚴奉以為神物先生嘗捕而脯之使人不惑其始至邑見人持竿道旁以黏飛鳥取其竿折之教之使勿為及罷官艤舟郊外有數人共語自主簿折黏竿鄉民子弟不敢畜禽鳥不嚴而令行大率如此再朞就移澤州晉城令澤人淳厚尤服先生教命民以事至邑者必告之以孝弟忠信入所以事父兄出所以事長上度鄉村逺近為伍保使之力役相助患難相恤而姦僞無所容凡孤㷀殘廢者責之親戚鄉黨使無失所行旅出於其途者疾病皆有所養諸鄉皆有校暇時親至召父老而與之語兒童所讀書親為正句讀教者不善則為易置俗始甚野不知為學先生擇子弟之秀者聚而教之去邑才十餘年而服儒服者蓋數百人矣鄉民為社㑹為立科條旌别善惡使有勸有恥邑幾萬室三年之間無强盜及鬬死者秩滿代者且至吏夜叩門稱有殺人者先生曰吾邑安有此誠有之必某村某人也問之果然家人驚異問何以知之曰吾常疑此人惡少之弗革者也河東財賦窘迫官所科買歲為民患雖至賤之物至官取之則其價翔湧多者至數十倍先生常度所需使富家預儲定其價而出之富家不失倍息而鄉民所費比常嵗十不過二三民稅常移近邊載往則道逺就糴則價髙先生擇富民之可任者預使購粟邊郡所費大省民力用紓縣庫有雜納錢數百千常借以補助民力部使者至則告之曰此錢令自用而不敢私請一切不問使者屢更無不從者先時民憚差役役及則互相糾訴鄉鄰遂為仇讐先生盡知民産厚薄第其先後按籍而命之無有辭者河東義勇農隙則教以武事然應文備數而已先生至晉城之民遂為精兵晉俗尚焚尸雖孝子慈孫習以為安先生教諭禁止民始信之而先生去後郡官有母死者憚於逺致以投烈火愚俗視效先生之教遂廢識者恨之先生為令視民如子欲辨事者或不持牒徑至庭下陳其所以先生從容告語諄諄不倦在邑三年百姓愛之如父母去之日哭聲振野用薦者改著作佐郎尋以御史中丞吕公公著薦授太子中允權監察御史裏行神宗素知先生名召對之日從容咨訪比二三見遂期以大用每將退必曰頻求對來欲常相見爾一日論議甚久日官報午正先生遽求退庭中中人相謂曰御史不知上未食耶前後進說甚多大要以正心窒欲求賢育材為先先生不飾辭辨獨以誠意感動人主神宗嘗使推擇人才先生所薦者數十人而以父表弟張載暨弟頥為首所上章疏子姪不得窺其藁嘗言人主當防未萌之欲神宗俯身拱手曰當為卿戒之及因論人才曰陛下奈何輕天下士神宗曰朕何敢如是言之至於再三時王荆公安石日益信用先生每進見必為神宗陳君道以至誠仁愛為本未嘗及功利神宗始疑其迂而禮貌不衰嘗極陳治道神宗曰此堯舜之事朕何敢當先生愀然曰陛下此言非天下之福也荆公寖行其說先生意多不合事出必論列數月之間章數十上尤極論者輔臣不同心小臣與大計公論不行青苖取息賣祠部牒差提舉官多非其人及不經封駁京東轉運司剝民希寵不加黜責興利之臣日進尚德之風浸衰等十餘事荆公與先生雖道不同而嘗謂先生忠信先生每與論事心平氣和荆公多為之動而言路好直者必欲力攻取勝由是與言者為敵矣先生言既不行懇求外補神宗猶重其去上章及面請至十數不許遂闔門待罪神宗將黜諸言者命執政除先生監司差權發遣京西路提㸃刑獄復上章曰臣言是願行之如其妄言當賜顯責請罪而獲遷刑賞混矣纍請得罷既而神宗手批暴白同列之罪獨於先生無責改差簽書鎮寧軍節度判官事為守者嚴刻多忌通判而下莫敢與辨事始意先生嘗任臺憲必不盡力職事而又慮其慢已既而先生事之甚恭雖管庫細務無不盡心事小未安必與之辨遂無不從者相與甚歡屢平反重獄得不死者前後蓋十數河清卒於法不他役時中人程昉為外都水丞怙勢蔑視州郡欲盡取諸掃兵治二股河先生以法拒之昉請於朝命以八百人與之天方大寒昉肆其虐衆逃而歸州官晨集城門吏報河清兵潰歸將入城衆官相視畏昉欲弗納先生曰此逃死自歸弗納必為亂昉有言某自當之即親往開門撫諭約歸休三日復役衆歡呼而入具以事上聞得不復遣後昉奏事過州見先生言甘而氣懾既而揚言於衆曰澶卒之潰乃程中允誘之吾必訴於上同列以告先生曰彼方憚我何能爾也果不敢言㑹曹村掃决時先生方救護小吳相去百里州帥劉公渙以事急告先生一夜馳至帥俟於河橋先生謂帥曰曹村决京城可虞臣子之分身可塞亦為之請盡以廂兵見付事或不集公當親率禁兵以繼之帥義烈士遂以本鎮印授先生曰君自用之先生得印不暇入城省親徑走决堤諭士卒曰朝廷養爾輩正為緩急爾爾知曹村决則注京城乎吾與爾曹以身捍之衆皆感激自效論者皆以為勢不可塞徒勞人爾先生命善泅者運細繩以渡决口水方奔注逹者百一卒能引大索以濟衆兩岸並進晝夜不息數日而合其將合也有大木自中流而下先生顧謂衆曰得彼巨木橫流入口則吾事濟矣語才已木遂橫衆以為至誠所致其後曹村之下復决遂久不塞數路困擾大為朝廷憂人以為使先生在職安有是也郊祀霈恩先生曰吾罪滌矣可以去矣遂求監局以便親養得罷歸自是醜正者競揚避新法之說歲餘得監西京洛河竹木務薦者言其未嘗叙年勞丐遷秩特改太常丞神宗猶念先生㑹修三經義嘗語執政曰程某可用執政不對又嘗有登對者自洛至問曰程某在彼否連言佳士其後彗見翼軫間詔求直言先生應詔論朝政極切還朝執政屢進擬神宗皆不許既而手批與府界知縣差知扶溝縣事先生詣執政復求監當執政諭以上意不可改也數月右府同薦除判武學新進者言其新法之初首為異論罷復舊任先生為治専尚寬厚以教化為先雖若甚迂而民實風動扶溝素多盜雖樂歲强盜不減十餘發先生在官無强盜者幾一年廣濟蔡河出縣境瀕河不逞之民不復治生業專以脅取舟人物為事嵗必焚舟十數以立威先生始至捕得一人使引其類得數十人不復根治舊惡分地而處之使以挽舟為業且察為惡者自是邑境無焚舟之患畿邑田稅重朝廷歲常蠲除以為惠澤然而良善之民憚督責而先輸逋負獲除者皆頑民也先生為約前科獲免者今必如期而足於是惠澤始均司農建言天下輸役錢逹戶四等而畿內獨止第三請亦及第四先生力陳不可司農奏其議謂必獲罪而神宗是之畿邑皆得免先生為政常權榖價不使至甚貴甚賤㑹大旱麥苖且枯先生教人掘井以溉一井不過數工而所灌數畝闔境賴焉水災民饑先生請發粟貸之鄰邑亦請司農怒遣使閲實使至鄰邑而令遽自陳榖且登無貸可也使至謂先生盍亦自陳先生不肯使者遂言不當貸先生力言民饑請貸不已遂得榖六千石饑者用濟而司農益怒視貸籍戶同等而所貸不等檄縣杖主吏先生言濟饑當以口之衆寡不當以戶之髙下且令實為之非吏罪乃得已內侍都知王中正巡閲保甲權寵至盛所至凌慢縣官諸邑供帳競務華鮮以悅奉之主吏以請先生曰吾邑貧安能效他邑且取於民法所禁也令有故青帳可用之先生在邑歲餘中正往來境上卒不入鄰邑有寃訴府願得先生决之者前後五六有犯小盜者先生謂曰汝能改行吾薄汝罪盜叩首願自新後數月復穿窬捕吏及門盜告其妻曰吾與太丞約不復為盜今何面目見之邪遂自經官制改除奉議郎朝廷遣官括牧地民田當沒者千頃往往持纍世契劵以自明皆弗用諸邑已定而扶溝民獨不服遂有朝㫖改稅作租不復加益及聽賣易如私田民既倦於追呼又得不加賦乃皆服先生以為不可括地官至謂先生曰民願服而君不許何也先生曰民徒知今日不加賦而不知後日增租奪田則失業無以生矣因為言仁厚之道其人感動謝曰寧受責不敢違公遂去之他邑不踰月先生罷去其人復至謂攝令者曰程奉議去矣爾復何恃而敢稽違朝㫖督責甚急數日而事集鄰邑民犯盜繫縣獄而逸既又遇赦先生坐是以特㫖罷邑人知先生且罷詣府及司農丐留者千數去之日不使人知老稚數百追及境上攀挽號泣遣之不去以親老求近鄉監局得監汝州酒稅今上嗣位覃恩改承議郎先生雖小官賢士大夫視其進退以卜興衰聖政方新賢德登進先生特為時望所屬召為宗正寺丞未行以􅍚終元豐八年六月十五日也享年五十有四士大夫識與不識莫不哀傷為朝廷生民恨惜先生資稟既異而充養有道純粹如精金溫潤如良玉寬而有制和而不流忠誠貫於金石孝悌通於神明視其色其接物也如春陽之溫聽其言其入人也如時雨之潤胸懷洞然徹視無間測其藴則浩乎若滄溟之無際極其德美言蓋不足以形容先生行已內主於敬而行之以恕見善若出於已不欲勿施於人居廣居而行大道言有物而動有常先生為學自十五六時聞汝南周茂叔論道遂厭科舉之業慨然有求道之志未知其要泛濫於諸家出入於老釋者幾十年返求諸六經而後得之明於庶物察於人倫知盡性至命必本於孝弟窮神知化由通於禮樂辨異端似是之非開百代未明之惑秦漢而下未有臻斯理也謂孟子沒而聖學不傳以興起斯文為已任其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乘其迷暗今之入人也因其髙明自謂之窮神知化而不足以開物成務言為無不周遍實則外於倫理窮神極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此自道之不明也邪誕妖異之說競起塗生民之耳目溺天下於汙濁雖髙才明智膠於見聞醉生夢死不自覺也是皆正路之蓁無聖門之蔽塞闢之而後可以入道先生進將覺斯人退將明之書不幸早世皆未及也其辨析精微稍見於世者學者之所傳爾先生之門學者多矣先生之言平易易知賢愚皆獲其益如羣飲於河各充其量先生教人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性循循有序病世之學者舍近而趨逺處下而窺髙所以輕自大而卒無得也先生接物辨而不間感而能通教人而人易從怒人而人不怨賢愚善惡咸得其心狡僞者獻其誠暴慢者致其恭聞風者誠服覿德者心醉雖小人以趨向之異顧於利害時見排斥退而省其私未有不以先生為君子也先生為政治惡以寬處煩而裕當法令繁密之際未嘗從衆為應文逃責之事人皆病於拘礙而先生處之綽然衆憂以為甚難而先生為之沛然雖當倉卒不動聲色方監司競為嚴急之時其待先生率皆寬厚設施之際有所賴焉先生所為綱條法度人可效而為也至其道之而從動之而和不求物而物應未施信而民信則人不可及也彭夫人封仁和縣君嚴正有禮事舅以孝稱善睦其族先一年卒一有五字子一有三早卒字曰端懿蔡州汝陽縣主簿曰端本治進士業一有四字女一有三夭二字適假承務郎朱純之卜以今年十月乙酉葬於伊川先塋謹書家世行業及厯官行事之大槩以求志於作者謹狀元豐八年八月日弟頥狀明道先生門人朋友叙述序叙述四篇見附録明道先生之葬頥狀其實以求志銘且傋異日史氏採録既而門人朋友為文以敘其事迹述其道學者甚衆其所以推尊稱美之意人各用其所知蓋不同也而以孟子之後傳聖人之道者一人而已是則同文多不能盡取取其有補於行狀之不及者數篇附於行狀之後明道先生墓表宋明道先生程君伯淳之墓太師致仕潞國公文彥博題先生名皓字伯淳葬於伊川潞國太師題其墓曰明道先生弟頥序其所以而刻之石曰周公沒聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳干載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒天下貿貿焉莫知所之人欲肆而天理滅矣先生生千四百年之後得不傳之學於遺經志將以斯道覺斯民天不憖遺哲人早世鄉人士大夫相與議曰道之不明也久矣先生出揭聖學以示人辨異端闢邪說開厯古之沉迷聖人之道得先生而復明為功大矣於是帝師採衆議而為之稱以表其墓學者之於道知所嚮然後知斯人之為功知所至然後見斯名之稱情山可夷谷可堙明道之名亘萬世而常存勒石墓傍以詔後人元豐乙丑十月戊子書孝女程氏墓志孝女程氏其第二十九有宋名臣諱羽之後故宗正寺丞皓之女幼而莊靜不妄言笑風格瀟灑趣向髙潔發言慮事逺出人意終日安坐儼然如齊未嘗教之讀書而自通文義舉族愛重之擇配欲得稱者其父名重於時知聞遍天下有識者皆願出其門訪求七八年未有可者既長矣親族皆以為憂交逰咸以為非謂自古未聞以賢而不嫁者不得已而下求嘗有所議不忍使之聞知蓋度其不屑也母亡持喪盡哀雖古篤孝之士無以過也遂以毁死病既革頤念無以適其意謂之曰爾喜聞道義吾為爾言之曰何不素教我今且惛矣我死無憾獨以不勝喪為恨耳盡召兄弟舅甥姪人人教誡幼者撫視頃之而絶嗚乎是雖女子亦天地中一異人也如其髙識卓行使之享年足以名世勵俗并前古賢婦垂光簡册不幸短命何痛如之衆人皆以未得所歸為恨頤謂不然頤與其父以聖賢為師所為尚一作常恐不當其意苟未遇賢者而以配世俗常人是使之抱羞辱以沒世頤恨其死不恨其未嫁也其生以嘉祐辛丑九月庚戌其卒以元豐乙丑二月丙寅葬於伊川先塋之東是年十月乙酉也叔父頤志為家君祭司馬溫公文嗚乎公乎誠貫天地行通神明徇已者私衆口為容於異論合聽則聖百姓曾無於間言老始逢時心期行道致君澤民雖有志而未終救弊除煩則為功而已大何天乎之不弔斯人也而遽亡溥天興殄瘁之悲明主失倚毗之望如其可贖人百其身死生既極於哀榮名德永髙於千古藐兹羸老夙被深知撫柩慟哀聊陳薄奠為家君祭韓康公文嗚乎惟公天賦忠義世推孝友忠以事君完始終之大節孝施有政作儀刑於四方樂善本乎至誠好學至於沒齒故有識之士無思不服垂老之年其猷益壯位雖極於將相志則歉於施為恢𢎞之度若海瀆之難量髙邈之風非世俗之可企推賢奬善惟日不足周急樂施室幾屢空方逢時之尚年遽奉身而勇退如何不弔奄及云亡忠義之表天不憖遺孝友之規世將安倣寒族有姻家之契二男蒙國士之知感恩德而未酬痛音容之遽隔兹焉歸葬復阻臨穴恭陳薄奠以寫哀誠為家君祭吕申公文嗚乎公禀則異得天之粹遘兹良辰出為嘉瑞生而富貴處之無纍幼而聰明充之能至學既知真仕則為道出入屢更夷險一操二聖臨御人望是從起藩入輔命相册公平日視公靜密恂恂國論所斷一言萬鈞謂公無位位為相臣謂公得志志存未伸然公心如權衡所以無間言於率土德如山嶽所以致敬心於人主從容語默之間人孰量其所補胡上天之不弔不一老之憖遺淵水無涯孰將求於攸濟百身莫贖為有識之同悲嗚乎哀哉羸老餘生辱知有素二男論忘勢之交不偶無酬知之路阻臨穴以伸哀姑托文而披露想英靈兮如在監丹誠而來顧為家君祭李屯田九縣君文嗚乎夫婦不幸皆終盛年美才不克究其施淑德不克久其芳此親戚交舊知聞所共悲也及兹歸葬去故鄉之沮洳得水土之深厚幽安顯慰其善之報而幸之厚與羸老不任逺之莫由臨穴盡於一哀聊為薄奠尚其來饗祭劉質夫文嗚乎聖學不傳久矣吾生百世之後志將明斯道興斯文於既絶力小任重而不懼其難者蓋亦有冀矣以謂苟能使知之者廣則用力者衆何難之不易也遊吾門者衆矣而信之篤得之多行之果守之固苦子者幾希方賴子致力以相輔而不幸遽亡使吾悲傳學之難則所以惜子者豈止從逰之情哉兹焉歸葬不克臨穴姑因薄奠以敘其哀祭李端伯文嗚乎自豫兄弟倡明道學世方驚疑能使學者視效而信從子與劉質夫為有力矣質夫於子為外兄弟同邑而居同門而學才器相類志尚如一豫謂二子可以大受期之逺到而半年之間相繼以亡使豫憂事道者鮮悲傳學之難嗚乎天於斯文何其艱哉官制有拘不克臨穴寄文為奠以敘其哀祭楊應之文嗚乎昔豫與君邂逅相遇於大江之南言契氣合遂從豫游歲將三紀情均骨肉忽聞來訃何痛如之嗚乎應之誰謂君而止於此乎髙才偉度絶出羣類善志奇藴曽未得施天胡為厚其稟而嗇其年人誰不死君之死為可恨也奚止交舊之情悲哀而已管城之原歸祔先兆屬豫衰年憚於長道不能臨穴一慟以伸余情姑致菲薄之奠魂兮其來歆此誠意祭朱公掞文嗚乎道既不明世罕信者不信則不求不求則何得斯道之所以久不明也自豫兄弟倡學之初衆方驚異君時甚少獨信不疑非夫豪傑特立之士能如是乎篤學力行至於沒齒志不渝於金石行可質於神明在邦在家臨民臨事造次動靜一由至誠上論古人豈易其比蹇蹇王臣之節凜凜循吏之風著見事為皆可紀述謂當大施於時必得其壽天胡難忱遽止於此嗚乎哀哉不幸七八年之間同志共學之人相繼而逝劉質夫李端伯吕與叔范㢲之楊厯之相繼而逝也今君復往使豫踽踽於世憂道學之寡助則豫之哭君豈特交朋之情而已邙山之陽歸祔先宅思平生之深契痛音容之永隔陳薄奠以將誠庶英靈兮來格二程文集卷十二

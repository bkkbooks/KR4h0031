body:
  text: 二程文集巻十三伊川文集宋程頤撰墓誌家傳祭文大中自撰墓誌程姓珦名伯温字姓源世系詳於家牒故不復書曾王父尚書兵部侍郎贈太子少師諱羽曾王母清河太君張氏襄陵太君賈氏王父尚書虞部員外郎諱希振王母髙宻縣君崔氏考贈司空諱遹妣追封趙國太夫人張氏冀國太夫人張氏予性質顓蒙學術黯淺不能自奮以嗣先世天聖中仁宗皇帝念及祖宗舊臣例録子孫一人補郊社齋郎厯黄州黄陂吉州廬陵二縣尉潤州觀察支使由按察官論薦改大理寺丞知䖍州興國縣龔州徐州沛縣監在京西染院知鳯磁漢三州事熙寕中厭於􅕄事丐就閒局管勾西京嵩山崇福宫歲滿再任遂請致仕官自大理寺丞十三遷至大中大夫勲自騎都尉至上柱國爵永年縣伯食邑戸九百娶侯氏贈尚書比部員外郎道濟之長女封壽安縣君先三十八年卒追封上谷郡君男六人長應昌次天錫皆㓜亡次顥承議郎宗正寺丞先卒次頤今為通直郎次韓奴蠻奴皆夭女四人長婆嬌㓜亡次適奉禮郎席延年次馮兒㓜亡次適都官郎中李正臣孫男五人端懿蔡州汝陽縣主簿監西京酒次端中治進士業次端輔早亡次端本治進士業次端彥郊社齋郎孫女八人長適宣義郎李偲次適假承務郎朱純之次適安定席彦正次未嫁而卒次為李偲繼室次適清河張敷次㓜亡曽孫六人昻昪昺易旻􅀢曾孫女一人元祐五年庚午春正月十三日己卯以􅍚終於正寢先居暖室旣得疾命遷正寢享年八十五越三月孟夏庚戌望𦵏於伊川先塋之次上谷郡君祔焉予厯官十二任享禄六十年但知廉愼寛和孜孜夙夜無勲勞可以報國無異政可以及民始終得免瑕謫為幸多矣𦵏日切不用干求時賢製撰銘誌既無事實可紀不免虚詞溢美徒累不徳耳只用此文刻於石向壁安置若或少違遺命是不以為有知也先公大中年七十則自為墓誌及書戒命於後後十五年終壽子孫奉命不敢違惟就其闕處事未至者皆缺字使後人加之加所遷官爵晩生諸孫及享年之數終𦵏時日而已醇徳懿行宜傳後世者皆莫敢誌著之家牒孤頥泣血書先公大中家傳先公大中諱珦字伯温舊名温一有其字字君玉既登朝改後名景徳三年丙午正月二十三日生於京師泰寕坊賜第性仁孝温厚恪勤畏愼開府事父兄謹敬過人責子弟甚嚴公纔十餘歲則使治家事事有小不稱意㫖公恐懼若無所容自少為族兄文簡公所器開府終於黄陂公年始冠諸父繼亡聚屬甚衆無田園可依遂寓居黃陂勞身苦志奉養諸母教撫弟妹時長弟璠七歲從弟瑜六歲餘皆孩㓜後數歲朝廷錄舊臣之後授公郊社齋郎以口衆不能偕行遂不赴調文簡公義之為請於朝就注黃陂縣尉任滿又不能調閒居安貧以待諸弟之長至長弟與從弟皆得官娶婦二妹既嫁乃復赴調授吉州廬陵縣尉時劉丞相沆已貴顯其子弟有恃勢暴横於鄉里者郡守以下皆為之屈公獨不與接劉丞相聞而愧之待公甚厚再調潤州觀察支使有侍禁曹元哲者挾權要勢與人爭田守畏逼囑公右之公弗為撓潤當途事繁劇多賴公以濟聲聞甚著部使者至無有不論薦者改大理寺丞知䖍州興國縣事䖍人素號難治而邑之衣錦鄉尤為稱首自昔治之與他鄉異前令欲以慘酷威之盛冬使爭者對立於庭以雪埋及膝而人益不服公善告諭之與他鄉一視人遂信服在邑㡬二年而獄空者歲餘江西狡民善為古劵契田訟最為難辨而䖍尤甚旁邑有爭積十餘歲不能决部使者以委公根連證佐囂然盈庭公獨呼争者前訊之不十數語盡得其情遂皆服事决於頃刻之間人以為神就移知龔州事時宜州反獠毆希範既誅鄉人忽傳其降言當為我南海立祠於是迎其神以往自宜至龔厯數州矣莫之禁也公使詰之對曰過潯州守以為妖投奉神之具於江中逆流而上守懼乃更致禮公曰試再投之越人畏鬼甚於畏官皆莫敢前公杖不奉命者及投之乃流去人方信其為妄在州二歲部使者未嘗入境時潘師旦為提㸃刑獄最稱嚴察一道􅋏畏嘗過境上以書謝公曰既聞清治不須至也遷太子中舍明堂覃恩改殿中丞代還在塗而儂智髙作亂破州城後守貸死羈置人皆以公獲免為積善之報授知徐州沛縣事㑹久雨平原出水榖既不登晩種不入民無卒歲具公謂俟可耕而種則時已過矣乃募富家得豆數千石以貸民使布之水中水未盡涸而甲巳露矣是年遂不囏食百丐於市者自稱僧伽之弟愚者相倡競遺金錢公杖之而出諸境遷國子博士賜緋魚袋歸監在京西染院遷尚書虞部員外郎知鳳州事鳯當川蜀之衝軺傳旁午毁譽易得為守者相承務豐厨傳主吏多至破產公裁減㡬半曰是足以為禮未為薄也㑹漢中不稔饑民自褒斜山谷而出公教於路口為糜粥以待之所濟甚衆遷司門員外郎丁崇國太夫人憂服除權判鴻臚寺英宗嗣位覃恩遷庫部員外郎知磁州事磁城趙簡子所築東南隅水泉惡灌濯亦不可用居民安於久習婦女晨出逺汲不惟勞且乏用風俗以之弊厯千餘歲無為慮者公度城曲之地曰此去濠水數歩之近漸漬既久地脉當變矣穿二井果美泉也人甚賴之時久雨自河以北城壘皆圮公言於帥府請發衆治之帥不敢主使聽命於朝公請於朝者三不報蓋自北朝通好未嘗發衆治城時韓魏公秉政使人諭公曰城壊州當自治何以請為公曰役大法不許擅興且完舊非創築何害乃得請後數月始槩命諸州治城每歲春首興役治河民間自秋成則為之傋貧室尚患不及是年二役并興人甚苦之獨磁先已畢工民得復營河役之用又築於未凍之前城得堅固遷水部郎中神宗即位覃恩遷司門郎中是歲城中瓦屋及濠水上氷澌盤屈成花卉之狀奇怪駭目郡官皆以為嘉瑞請以上聞公曰石晉之末嘗有此朝廷豈不惡之衆皆服代還知漢州事遷庫部郎中蜀俗輕浮而公臨之以安靜視事之翌日上謝表命園中取竹為筩衆吏持筩走白殺青而文見於中曰君王萬歲公知其偽不應吏懼而退中元節宴開元寺蓋盛逰也酒方行衆呼曰佛光見觀者相騰踏不可禁公安坐不動頃之乃定大興州學親視敦勉士人從化者甚衆漢守有園圃公田之入素稱優厚至者無不厚蔵而歸公始被命親舊以其素貧皆為之喜公擇而取之終任所獲布數百匹而已熙寧中議行新法州縣囂然皆以為不可公未嘗深論也及法出為守令者奉行惟恐後成都一道抗議指其有未便者獨公一人時李元瑜為使者挾朝廷勢凌蔑州郡沮公以為妄議公奏請不俟滿罷去不報乃移􅍚乞授代不復視事歸朝願就閒局得管勾西京嵩山崇福宫歲滿再任遷司農少卿南郊恩賜金紫以年及七十乞致仕家貧口衆仰祿以生據禮引年略不以生事為慮人皆服公勇决兩經南郊恩以子叙遷中散大夫中大夫今上即位覃恩遷大中大夫累封永年縣開國伯食邑九百戸勲上柱國元祐五年正月十三日以􅍚終於西京國子監公舎先居暖室病革命遷正寢享年八十有五太師文公彥博西京留守韓公縝今左丞蘇公頌等九人相繼以公清節言於朝詔賜帛二百匹仍命有司供其𦵏事以四月十五日𦵏於伊川先塋之次始少師厭五代河北之多亂徒𦵏少監於京兆之興平將謀居醴泉及貴賜第於泰寜坊遂再世居京師嘉祐初公卜𦵏祖考於伊川始居河南公娶侯氏贈尚書比部員外郎道濟之女封壽安縣君先公三十八年終追封上谷郡君男六人長曰應昌次曰天錫皆㓜亡次曰顥任承議郎宗正寺丞先公五年卒次頤也次韓奴次蠻奴皆㓜亡女四人長㓜亡次適奉禮郎席延年次㓜亡次適都官郎中李正臣公孝於事親順於事長慈於撫㓜寛於治民二歲䘮母祖母崔夫人撫愛異於他孫嘗以漆鉢貯錢與之公終身保藏其鉢命子孫寶之開府再娶崇國太夫人時方八歲已能親順顔色崇國愛之如已出奉養五十年崇國未嘗形愠色開府喜飲酒公平生遇美酒未嘗不思親頤自垂髫至白首不記其曽偶忘也遇人與開府同年而生者士人也無賢愚高下必拜之賤者亦待之加禮開府嘗從趙炎者貸錢五千未償公記其姓名而不知其子孫郷里終身訪求以不獲為恨始公撫育諸孤弟其長二人仕登朝省二十餘年間皆亡長弟之子九歲從弟之子十一嵗公復撫養至於成長畢其婚宦育二孤皆再世亦異事也前後五得任子以均諸父子孫嫁遣孤女必盡其力所得俸錢分贍親戚之貧者伯母劉氏寡居公奉養甚至其女之夫死公迎從女兄以歸教養其子均於子姪既而女兄之女又寡公懼女兄之悲思又取甥女以歸嫁之時小官祿簿克已為義人以為難後遇劉氏之族子於㐮邑偶詢其宗系知姻家也未㡬劉生卒其子立之纔七嵗公取歸教養今登進士第為宣徳郎矣公慈恕而剛㫁平居與㓜賤語惟恐有傷其意至於犯義理則不假也左右使令之人無日不察其飢飽寒煖與人接淡而有常不妄交逰於所信愛久而益篤在䖍時常假倅南安軍一獄掾周惇實年甚少不為守所知公視其氣貌非常人與語果為學知道者因與為友及為郎官故事當舉代每遷授輙一薦之聞人有慶樂事喜之如在已不為皎皎之行平生不親附權勢而請謁常禮亦不廢也至於親舊之貴顯者既不與之加親亦不示之踈逺故賢者莫不敬愛不賢者亦無敢慢寓居黄陂時主簿貪凶人也常曰諺云明鏡為醜婦之寃君居此照我何其不幸也遂頗自歛有歐陽乾曜者以才華自負多肆輕傲易公年少常以語侵公公如不聞後公官嶺下乾曜適倦道路公以人船濟之乾曜曰可謂汪汪如千頃之波也南昌黄灝有髙才名動江表然頗不羈稠人廣坐無所不狎侮公時最少獨見禮重常目公曰長者無笑我自少時徳度服人已如此居官臨事孜孜不倦厯守四郡温恭待下身率以清愼所至寮屬無有敢貪縦者自朝廷行考課法無歲不居上平生居官不以私事笞扑人公之親愛者常有所怒堅請杖之曰吏卒小人不加以威是使之慢也公曰當官用刑蓋假手耳豈可用於私也終不從謙退不伐善常欿然自以為不足所能者雖曲藝小事人莫知也平生所為詩甚多自謂非工即棄去退休後所作方稍編錄亦未嘗以示人也自少師以來家傳清白而公處已尤約官至四品奉養如寒士縑素之衣有二三十年不易者終身非宴㑹不重肉既謝事遂屏朝衣賓客來者無貴賤見之雖公相亦不往謝方仕宦時每歎曰我貧未能舎祿仕苟得早退休閒十年志願足矣自領崇福外無職事内不問家有無者蓋二十餘年居常黙坐人謂靜坐既久寧無悶乎公笑曰吾無悶也家人欲其怡悦每勸之出逰時往親戚之家㦯園亭佛舎然公之樂不在此也嘗從二子遊壽安山為詩曰藏拙歸來已十年身心世事不相關洛陽山水尋須遍更有何人似我閒顧謂二子曰遊山之樂猶不如靜坐蓋亦非好也晩與文潞公席君從司馬伯康為同甲㑹洛中圖畫傳為盛事年八十䘮長子親舊以其慈愛素厚憂不能堪公以理自處無過哀也頤時未仕闔門皇皇不知所以為生公不以為憂也及頤被召叨傋勸講人皆慶之公無甚喜也嘗有􅍚召醫視脉曰無害公笑曰吾年至此矣有害無害皆可也雖􅍚病服藥必加巾年七十則自為墓誌紀履厯始終而已書其後以戒子孫曰吾厯官十二任享祿六十年但知㢘愼寛和孜孜夙夜無勲勞可以報國無異政可以及民始終得免瑕謫為幸多矣𦵏日切不用干求時賢製撰銘誌既無事實可紀不免虚詞溢美徒累不徳只用此文刻於石向壁安置若或少違遺命是不以為有知也不肖孤奉命不敢違於𦵏既無銘述家傳所記不敢一辭溢美取誣親之罪承公志也上谷郡君家傳先妣夫人姓侯氏太原孟縣人行第一一作二世為河東大姓曽祖元祖暠當五代之亂以武勇聞劉氏偏據日錫土於烏河川以控㓂盗亡其爵位父道濟始以儒學中科第為潤州丹徒縣令贈尚書比部員外郎母福昌縣太君刁氏夫人㓜而聰悟過人女功之事無所不能好讀書史博知古今丹徒君愛之過於子每以政事問之所言雅合其意常歎曰恨汝非男子七八歲時常教以古詩曰女人不夜出夜出秉明燭自是日暮則不復出房閣刁夫人素有風厥之􅍚多夜作不知人者久之夫人涕泣扶侍常連夕不寐年十九歸於我事舅姑以孝謹稱與先公相待如賓客徳容之盛内外親戚無不敬愛衆人遊觀之所往往捨所觀而觀夫人先公賴其内助禮敬尤至而夫人謙順自牧雖小事未嘗専必禀而後行仁恕寛厚撫愛諸庶不異已出從叔㓜孤夫人存視常均已子治家有法不嚴而整不喜笞扑奴婢視小臧獲如兒女諸子或加呵責必戒之曰貴賤雖殊人則一也汝如此大時能為此事否道路遺棄小兒屢收養之有小商出未還而其妻死兒女散逐人去惟㓜者始三歲人所不取夫人懼其必死使抱以歸時聚族甚衆人皆有不欲之色乃别糴以食之其父歸謝曰幸蒙收養得全其生願以為獻夫人曰我本以待汝歸非欲之也好為藥餌以濟病者大寒有負炭而繫者過門家人欲呼之夫人勸止曰愼勿為此勝則貧者困矣先公凡有所怒必為之寛觧惟諸兒有過則不掩也常曰子之所以不肖者由母蔽其過而父不知也夫人男子六人所存惟二其愛慈可謂至矣然於教之之道不少假也纔數歲行而或踣家人走前扶抱恐其驚啼夫人未嘗不呵責曰汝若安徐寜至踣乎飲食常置之坐側嘗食絮羮皆叱止之曰㓜求稱欲長當如何雖使令輩不得以惡言罵之故頥兄弟平生於飲食衣服無所擇不能惡言罵人非性然也教之使然也與人爭忿雖直不右曰患其不能屈不患其不能伸及稍長常使從善師友遊雖居貧或欲延客則喜而為之具其教女常以曹大家女誡居常教告家人曰見人善則當如已善必共成之視他物當如已物必加愛之先公罷尉廬陵赴調寓居厯陽㑹叔父亦觧掾毗陵聚口甚衆儲傋不足夫人經營轉易得不困乏先公歸問其所為歎曰良轉運使才也所居之處鄰婦里姥皆願為之用雖勞不怨始寓丹陽蹴葛氏舎以居守舎王氏翁姥庸狡前後居者無不苦之夫人待之有道遂反柔良及遷去王姥涕戀不已夫人安於貧約服用儉素觀親族間紛華相尚如無所見少女方數歲忽失所在乳母輩悲泣叫號夫人罵止之曰在當求得苟亡失矣汝如是將何為在廬陵時公宇多怪家人告曰物㺯扇夫人曰熱爾又曰物擊皷夫人曰有椎乎可與之後家人不敢復言怪怪亦不復有遂獲安居夫人有知人之鍳姜應明者中神童第人競觀之夫人曰非逺器也後果以罪廢頤兄弟㓜時夫人勉之讀書因書綫貼上曰我惜勤讀書兒又并書二行曰殿前及第程延壽先兄㓜時名也次曰處士及先兄登第頤以不才罷應科舉方知夫人知之於童稚中矣寶藏手澤使後世子孫知夫人之精鍳夫人好文而不為辭章見世之婦女以文章筆札傳於人者深以為非平生所為詩不過三二篇皆不存獨記在厯陽時先公覲親河朔夜聞鳴雁嘗為詩曰何處驚飛起雝雝過草堂早是愁無寐忽聞意轉傷良人沙塞外覉妾守空房欲寄廻文信誰能付汝將讀史見姦邪逆亂之事常掩巻憤歎見忠孝節之士則欽慕不已嘗稱唐太宗得禦戎之道其識慮高逺有英雄之氣夫人之弟可世稱名儒才智甚高嘗自謂不如夫人夫人自少多病好方餌修養之術甚得其效從先公官嶺外偶迎凉露寢遂中瘴癘及北歸道中病革召醫視脉曰可治謂二子曰紿爾也未終前一日命頥曰今日百五為我祀父母明年不復祀矣夫人以景徳元年甲辰十月十三一作二十二日生於太原皇祐四年壬辰二月二十八日終於江寧享年四十九始封壽安縣君追封上谷郡君叔父朝奉墓誌銘叔父名珫字季聰贈太子少師諱羽清河郡太君張氏襄陵郡太君賈氏之曾孫尚書虞部員外郎諱希振髙宻縣君崔氏之孫贈開府儀同三司諱遹榮國太夫人張氏崇國太夫人張氏之子先公大中之季弟其上世居深州之博野累代聚居以孝義稱至少師顯於朝賜第京師始居開府先君𦵏祖考於伊川遂遷河南公天性孝友淳質不事文飾㓜孤事崇國能竭其力於宗族篤恩義愛㓜稚如已生事伯兄丘嫂如父母與人接傾盡心腑信人如已屢致欺而不變人多笑之而好徳者重之年四十五始以伯兄大中恩補郊社齋郎調懐州修武縣主簿秩滿受權澤州端氏縣令閲歲即眞用薦者改大理寺丞復四遷至朝奉郎積勲至上輕車都尉賜服銀緋厯河中府龍門汝州襄城縣事權管勾西京國子監遂致官事公當官竭力不擇難易盡心於愛民故所至民愛之嘗捕蝗徒歩執篲為衆人先其不愛力皆此類喜求民利病力可行者行之不能者言之上官雖沮却不恨年五十始有子傷從兄無嗣遂以繼之先君六得任子恩公與二子實居其三則公之見愛於兄與先君之厚於弟可見矣娶賈氏追封宜興縣君繼室張氏封壽光縣君子二人長曰頔郊社齋郎出繼從伯父後次曰顒太廟齋郎女二人長適承議郎劉立之次適進士王霂公生於天聖元年四月壬寅終於紹聖四年六月乙酉厯年七十有五是年十月某日𦵏於伊川先塋孤姪頤號泣而銘其穴曰孝於事親順於事兄質直而好義勤瘁以奉公家無間言仕有善效古之所謂躬行君子公其是乎歸全於斯嗚呼哀哉家世舊事少師影帳畫侍婢二人一曰鳯子一曰宜子頤㓜時猶記伯祖母指其為誰今則無能識者抱笏蒼頭曰福郎家人傳曰畫工呼使啜茶視而冩之福郎尋卒人以為畫殺叔父七郎中影帳亦畫侍者二人大者曰楚雲小者曰僿一作賽奴未㡬二人皆卒由是家中益神其事人壽短長有數豈畫能殺蓋偶然耳成都寺院皆無髙門限傳云少師脚短當時皆去之至今猶不復用少師卜居醴泉第舎卑狹頤少時嘗到宛然如舊諸房門皆題誰居先公大中所記也後十年再到則已為四翁名逢堯房子孫所賣更易房室不忍復觀矣自少師貴顯居京師醴泉第宅大評事諸孫居之後遂分而賣之先公未嘗問也劵契皆存以其上有少師書字故不忍毁去然收藏甚宻家中子弟有未嘗見者先公守鳯州時四翁問欲得宅否先公答以叔有之與某有之正同當善守而已又出一少師小印合示頤曰祖物也可収之頤曰翁能􅍖之足矣不敢受者所以安其疑心也又如太宗皇帝御書及少監眞像皆在亦未敢求見不意纔數年四翁卒比再至醴泉則散失盡矣思之痛傷後又二十年頤到醴泉改𦵏少師始求得少監段太君誥於三翁家少師犀帶於長安太監簿家少師綠玉枕於四翁女种家鞍兀於三翁家少師厭河北五代兵戈及宰醴泉遂謀居焉徙𦵏少監於縣城之西既顯雖賜第居京師囊橐至於御書誥勑皆多在醴泉從髙祖大評事四評事治生事皆淳儉嚴整大評事家人未嘗見笑惟長孫始生長安虞部也一老嫗白曰承㫖將軍也新婦生男微開顔曰善視之曽祖母崔夫人亦留醴泉與從曽祖母雷氏將軍之室奉事二叔姑晨夕敬畏平居必曵之長裾烹飪少有失節則不食拱手而起二婦恐懼不敢問所由伺其食美取所餘嘗之然後知所嗜太髙祖母楊氏前卒四髙祖母李氏主内事性尤嚴峻二婦晝則供侍夜復課以女工之事雷氏不堪其勞有間則泣於後庭崔夫人每勸勉之竟得羸疾而終崔夫人怡怡如也叔舅姑遂加愛之後外祖崔駕部過雍見其艱苦之甚屬少師取至京師不撤帷帳盡置囊箧云暫往省覲叔舅姑方聽其來少師之待兄弟崔夫人之事叔舅姑後世所當法也少師治醴泉恵愛及人至深其後諸房子弟既多不無侵損於邑人而邑人敬愛之不衰有爭忿者及門則止俟過而復爭小兒持盤賣菓為族中羣兒奪取啼而不敢較嘉祐初頤過邑去少師時八十年矣驢足病呼醫治之問知姓程辭錢不受昔時村婦多持香茶祈蠶於冡因搯取其土以乞靈後禁止之族父文簡公應舉来京師館於㕔旁書室惟乗一驢更無餘資至則賣驢得錢數千伯祖殿直輕財好義待族人甚厚日責文簡公具酒餚欲觀其器度文簡公訴曰驢兒已喫至尾矣文簡公一夕夣紫衣持箱幞其中若勑書授之曰壽州陳氏不測所謂以問伯祖殿直亦莫能曉後登科有媒氏來告有陳氏求壻必欲得髙第者問其鄉里乃壽州人文簡公年少才髙欲壻名家弗許伯祖曰爾夢如是蓋黙定矣豈可違也强之使就後累年猶怏怏陳夫人賢徳宜家夫婦偕老享封大國子孫相繼豈偶然哉叔祖寺丞有知人之鍳常謂文簡公公輔之器文簡公為著作佐郎時賈文元尚少一日侍叔祖坐曰某昨夜夢坐此有一人乗驢而来索紙寫門狀復乘驢而去坐中有一人指之曰此將來宰相也頃之文簡公乘驢而來索紙寫門狀復登驢而去正如所説之夢賈文元曰程六當為宰相歎羨不已叔祖謂曰爾無羡彼爾作相當在先及文簡公為兩制賈方小官及參大政風望傾朝衆謂旦夕爰立俄以事罷去比三易藩郡而賈已登庸方拜使相雖古之精於術者無以過也叔祖寺丞年四十謂家人曰吾明年死矣居數月又指堂前屋曰吾去死如隔此屋矣又數月指室中窗曰吾之死止如隔此紙耳未㡬而卒叔祖多才藝與人㑹射發矢能如其意常從主人之後主人中則亦中主人逺則亦逺不差尺寸伯祖殿直喜施而與人周一日苦寒有儒生造門即持綿袴與之其人大驚曰何以知我無袴也蓋於遊從間嘗察其不足也至晩年家資懸罄而為義不衰有儒生以講説醵錢時家無所有偶伯祖母有珠子装抹胷賣得十三千盡以與之明道先生宰晉城時有富民張氏子其父死未㡬晨起有老父立於門外問之曰我汝父也今來就爾居具陳其由張氏子驚疑莫測相與詣縣請辨之老父曰業醫逺出治疾而妻生子貧不能養以與張氏某年某月某日某人抱去某人某人見之先生謂曰歲久矣爾何記之詳也老父曰某歸而知之則書於藥法策後因懐中取策進之其所記曰某年月日某人抱兒與張三翁家先生問張氏子曰爾年㡬何曰三十六矣爾父而在年㡬何曰七十六矣謂老父曰是子之生其父年纔四十人已謂之三翁乎老父驚駭服罪明道主簿上元時謝師直為江東轉運判官師宰来省其兄嘗從明道假公僕掘桑白皮明道謂之曰漕司役卒甚多何為不使曰本草説桑白皮出土見日者殺人以伯淳所使人不欺故假之耳師宰之相信如此謝師直尹洛時嘗談經與鄙意不合因曰伯淳亦然往在上元某説春秋猶時見取至言易則皆曰非是頤謂曰二君皆通易者也監司談經而主簿乃曰非是監司不怒主簿敢言非通易能如是乎改𦵏告少監文維元祐六年辛未二月癸夘𤣥孫右承議郎權司管勾西京國子監輕車都尉賜緋魚袋珫謹遣姪頤就墳所以酒肴之具祭告於高祖少監髙祖母京兆太君段氏之靈秦人之俗以開發冡墓為事近年以来大評事四評事墓繼遭盗刼少師墓亦嘗有穴固不知完否苟不完矣理當改厝幸而尚完異日之禍不得不慮今将改𦵏少師而遷公丘封使後人不知墓之所在以圖永安謹具昭告伏惟鑒饗祭席仁叟文年月日河南程頤謹以香醪致奠於亡姊夫奉禮郎席仁叟之靈自我未冠與君為姻㳺從嬉戲不殊同隊之魚情好㤙義無異一門之親知吾心而丹誠相照信吾道而白首逾新仁叟晩年見信益篤於聚散之間尚不勝於悽慘况死生之隔何以喻其悲辛昔我姊之云亡望君舎而來奔悼彼中途之天逝各懐哀憤以難伸表情誠之不替遂婚姻之重論於是君之女以女於吾姪吾之息復歸於君門敦契義之如是豈淺薄之所存何其降年不永訃音遽聞相去千里徒增勞於魂夢逮兹三稔始克展於丘墳宿草雖久子哀未冺挈甥女以将歸叙中懐而告違清香一炷芳醪一巵君其饗之當鍳我心之悲祭張子直文妹夫故尚書虞部員外郎張君子直之靈嗚呼與君游從歲踰一紀情在睦姻我於君而既厚心存樂善君於我而彌隆㑹則盡盍簪之歡别則有索居之嘆信吾道而白首逾堅知余心而中懐靡間君在洛南我居畿甸常為命駕之約方切離羣之戀忽承置郵之書重有婚姻之願雖稚女之愛憐感君心之勤眷遽報諾音曾未㡬月走介歘來言君被疾觀遣辭之甚遽已驚皇而自失走十舎之修途冐如焚之赫日始及近郊已聞捐室撫孤孀而長慟痛死生之永隔嗚呼子直惟君之生為善是力臨官政有慈恵幹濟之稱居鄉里推謹厚淳和之徳謂所享之宜長胡降衷之莫測祐薄命短人之所悲母老子㓜禍兮何極雖道路以興嗟宜親朋之共惜何君命之若斯俾我心之重衋羇旅之次肴羞麤飾惟君之靈監斯誠而來格祭四十一郎文叔父頤令昂具酒餚致祭於姪四十一郎之靈嗚呼乃祖乃父世積慶善而汝兄弟姊妹皆不克壽天造差忒至如是乎惟汝資禀善和修謹無子弟之過期汝有成而遽死耶吾方以罪戻竄縶逺方生不獲視汝疾死不獲撫汝柩寃痛之深衷腸如割吾知汝有未伸之志抱無窮之恨吾當致力慰爾心於泉下又汝婦盛年自今當待之加厚冀其安室嗣子循良今已可見當教誨之期於成立則汝為有後矣此外吾無以致其力矣嗚呼吾將七十望汝收我而我反哭汝天乎寃哉祭李邦直文嗚呼惟公世推文章位登丞輔簡編見其才華廊廟存其步武固不待誄而後知也自與公别於兹九年既升沉之異迹望履舄以無縁惟期與公掛冠之後居洛之濱葛巾藜杖日以相親何志願之未諧遂音容之永隔追念平昔悲辛塡臆嗚呼哀哉頤也少服公名晩識公面重以姻媾始終異眷感懐知遇丹誠莫見一慟靈筵聊伸薄奠祭李通直文先生之婿嗚呼余周流天下閲人多矣求其忠孝仁厚如子者㡬希宜得其壽而遽死耶余老矣有賴於子而反哭於子何其酷耶薄奠致誠尚其來享二程文集巻十三
